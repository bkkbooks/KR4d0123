body:
  text: 摛文堂集卷二宋慕容彥逢撰五言律詩五排附贈宗室順國軍節度使開府儀同三司仲公儀比公槐峻恩分將鉞華楚詩能教子沛易自名家較藝聨千佛藏書閲五車風猷齊往哲豈謂史臣誇挽贈開府儀同三司朱公二首戚畹聨榮久三朝慕遇隆身雖居寵貴志益守謙冲聞譽揚中外哀榮備始終新阡標氏族官是漢儀同襄事涓辰吉華旌拂曉參車輿尊廣陌宅兆指遙岑寂寂泉扄閟冥冥隧路深堪傷純孝子揮淚血霑襟挽祕閣校理知湖州余使君二首桂籍冠羣英驚人在一鳴遡風淹鷁路擊水失鵬程已協三刀夢空嗟五鼓聲惟應文苑傳不愧史臣評惟昔都門别于今歲屢更周旋如昨日慷慨敘平生短牘方傳鯉長歌未報瓊仁賢何太嗇此理信誰明和劉著作偉明貢院即事韻簮紱千齡㑹朝廷百度明規摹追古治符瑞協炎精九叙民歌遂三階夜彩平秉文稱濟濟樂育詠菁菁經術漸摩久人材長養成禮闈參衆聽文鑒肅羣情預貢觀能吏來遊盡碩生胸襟窮底藴頭角競峥嶸蓛蓛珠璣墮喧喧虎豹爭氣衝牛斗動詞感鬼神驚收視疑無我湛思詎有聲𫀆紛晨霧委幘岸宿雲橫納試庭除晚遄歸步武輕身雖同脫鞅心亦類搖旌三級看鱗化千金想睇迎膏粱搜衛霍行伍擢韓英巧思憐金注塵言沮海行正迷花錦亂忽覩玉壺清奧義窺儒寢純音發帝莖鉛刀慙利割瓦釡失虛鳴已奏青錢選初聞白雪賡句從天外得思與海同傾相對一杯酒當前二尺檠詩壇瞻宿將筆陳却驍兵函劍騰秋紫霜鐘激夜鏗請降銜許璧引過負亷荆水落崖方露犀燃怪自呈川吟愁燕雀林嘯栗鼯鼪莫逆諧心賞相從與願并塵風傳勝語鼎浪閲名烹待報遲星使攄懷賴墨卿何當啓魚鑰寒食尚留餳蔣穎叔生日宗派源流逺家聲竹帛垂靈暉鍾嶽瀆吉夢襲熊羆夙擅鄉評美尋膺國士知文章追往哲學識判羣疑試若穿揚葉科如摘頷髭繡衣趨觀闕霜簡照軒墀諌拂龍鱗逆身探虎穴危忠猷聳鴛鷺直氣懾狐狸要路淹風鷁丹心比日葵使臺専漕挽帥閫肅邊陲久鬱公台望初還輦轂時缿筒爭訟恩囊橐冦攘衰蓮炬驚宵漏花甎候曉曦暫分方靣寄復演禁林詞廊廟先圖任樞衡遂倚毗雍容承晝接密勿奉疇咨已冠中樞府猶虛百斛姿兩轓將畫鹿五總舊名龜儒效流絃吹王功鏤鼎彞更增箕翼夀餘慶在庭芝許冲元生日良月當初吉昌時叶半千氣鍾奎壁粹夀稟角亢全殖學優前哲香名自妙年文章魁桂籍風采冠櫻筵要路諧先據清班閲屢遷藝書讎甲乙黼坐謁溫宣丹陛趨文石彤庭詠綺錢雲梯滋穩步風融正孤騫清切陪華蹕雍容進邇聨夜歸驚寶燭曉直候花甎餘力兼京輔能聲映簡編冦清桴鼓絶訟息缿筒捐入謝雖言邁徂齊遽式遄詞林俄再入政轄遂詳延鯁議違時去丹心許國堅賜環朝帝所曳履上星躔樞憲仍圖舊巖廊慶得賢珥璫鸞渚上鳴佩鳳池邊默識通倫類先幾炳眇綿龍輈迎舜日鼇柱拱堯天夾轂占轓鹿飛冠兆冕蟬鶴齡偕集木龜算等巢蓮丙魏君臣契韋平父子傳功成五福具永作地行仙七言律詩恭和元日受寶詩聖主規模冠百王考兹秦寶欲更張玉因天授來殊域工與神謀軼舊章羣辟竦觀稱萬夀廣廷昭受襲多祥宸慈特紀千齡遇詩似奎躔夜吐光層墀班序列華紳萬嵗聲中八寶陳映日浮筠盈黼座如虹佳氣繞楓宸珍符休顯光圖牒惠澤汪洋浹士民天佑聖神方錫羡從兹諸福與詩新恭和御製回鑾詩二首日轉蓬瀛詔蹕歸晚陰風色倍清微從教小雨霑花潤不放纎塵傍輦飛萬井歡心陪盛觀盈塗嘉頌紀鴻徽時和嵗稔民同樂古昔升平似此稀十萬宫花簇馬歸宜秋門道晚陰微雲隨香霧相縈去塵傍珠韉不敢飛盛事傳為堯壤頌薰風催入舜琴徽年年池苑春如許天子持盈燕幸稀恭和御製幸池詩案池字土原本缺乘時逰豫屬皇明芝蓋重臨太液清鵷鷺舊臣稱夀斚魚龍嘉戲出仙瀛長堤映栁千門啓翠水涵空一鑑平天意自同民意樂無知草木解欣榮恭和御賜陽德觀碧桃溪新竹詩三千迸籜拂朝雲想見坤祇夜駿奔嶰谷掄材聞古帝桃溪呈瑞屬神孫如犀亟應絲綸命帶粉初縈雨露㾗欲測九重宸算永㑹須億萬數靈根恭和御製朵樓特宴之什東闕岧嶤宴特頒樓前寶燭萬星寒鼓聲泛樂鼉靈震爐篆回風翠鳳盤積有嘉祥占嵗稔寵因芳夕慶時安厭厭既醉君恩重歸路繁華緩轡看次韻祝通直甘露詩二首聖心天意兩無違露灑文昌若應機北齊邢子才甘露詩云誰謂穹昊逺道合若應機甘自蜜房分瑞液瑩疑蟾窟借圓輝遍裝叢栁春爭麗髙應晴空午不晞豈止臣民胥鼓舞故應殊裔亦心歸露液無聲降自天清英含味滿丘園日中垂溜真珠落風後寒澌雜珮翻呈瑞未央曽紀嵗襲芬儀鳳亦更元廣寒應德彰嘉祉臣子相看眉宇軒恭和御製以節近嘉平時雪驟應詩翳翳同雲結晚陰六花宵降聳瑤林一犂共慶農疇足四海安知帝力深陽位涓成初奠玉真祠昭謝正齊心况當節紀嘉平近時雪時暘自溥臨恭和御製元㑹之次日嘉雪應候錫宴于公相之第詩三元盛禮冠年華翼日朝隄雪覆沙端為聖時調玉燭故當餘臘雨天花萬箱占瑞民胥慶青輅迎春節尚遐錫宴賜詩知有喜自應和氣浹潛芽恭和御製以嘉雪愆候躬致懇禱精意上孚靈貺昭格己卯庚辰降雪盈尺賜相臣詩皇心閔雪正傾祈盈尺呈祥靡願違潤浹土膏占嵗稔和生民氣敵爐輝千門瓊瓦連雲聳九陌瑤花撲靣飛聖德格天超曠古更須宸翰𫐠沉幾嘉平紀月近正端時雪時暘軫念寬雲色乍收銀闕角月華徐轉綵旗竿映階積素光相射迎吹餘花舞向䦨最是三農知嵗樂歡欣無復歎祁寒恭和御製喜雪需宴宸章次第頒祥霙宜入詠歌間心知旦暮千齡遇目覩聲詩六義還治格雨𤾉皆順序慶均朝野共怡顔微臣叨預承恩列賡和才菲若負山恭和御製觀儺詩日近新正臘已殘鼕鼕儺鼓響晴寒神資颯爽來羣祀舞節蹁躚應七盤門磔交修邦典備物疵銷盡里民安欲知聖主憂勤意深拜宸章仔細看次韻和吳右丞恭覽神宗皇帝御集詩永裕規撫映萬春孝思今見聖心循仁言盡集絲綸舊細札初刋琬琰新盛比鈞天張九奏麗如華衮繪三辰邇僚拜賜榮懷甚亦輟餘編寵諌臣次韻伯父元夕有感往嵗元宵寓帝京天光黯淡雪奔騰揚鑣公子羅千騎隨計書生對一燈舊事悠悠頻入夢新愁鬱鬱更填膺低頭懶看南軒月撥盡爐灰對好朋試燈日侍親逰戒珠寺雪花新霽玉雲閒慶侍來逰古蕺山稅駕且需明月上捧觴徐戲綵衣還樓臺燈火青冥外市井笙歌縹眇間膝下歡娛誰與共棣華相對醉酡顔和中書梁侍郎君臣慶㑹閣賜御筵詩巍巍層閣倚雲開閣上書從帝所來率土士民瞻慶㑹華筵樽爼幸參陪宸文正比天文麗春力應隨筆力回主聖臣賢千載遇欲形歌頌愧非才和中書梁侍郎喜雪賜御筵詩康莊雪景曜重關宴錫潭潭府第間愛日似隨人意出祥風時泛樂聲還歡謠已見喧民俗喜氣遙知動帝顔溫詔許持金斚醉戴恩同祝夀如山和蔣秀才牡丹次韻如霞如錦色何鮮映日欹風特地妍獨占一春疑得勢平欺羣卉若當權自知麗豔能傾國須放香苞趁禁煙花市試詢桃李價從今不直半分錢次韻阮承書詠桃花菊六月開怪來籬下欲成蹊菊似桃花賞客迷清郁雖同彭澤徑嬌紅全是武陵溪露沾宿蘂金絲潤日炙繁英玉葉低占斷春光與秋色薰風特地與留題和余秀才逰緑淨堂以詩見寄佳名誰為榜嶇岑牽惹詩翁躡屐尋緑外清風先見竹靜中新囀不妨禽沈酣山水真君事汩沒文書豈我心待撥頻煩聊一賞振衣閒坐洛生吟次韻題任承事清樂齊塵襟滌盡更無餘兩字名齊信起豫物外清標輕紱冕閒中樂事付琴書蘭生階砌青春好槐覆門庭過客疏更有孤吟寫幽思篇成渾似琢璠璵咏蔣秀才西軒詩園池佳處闢幽軒西揖湖光入坐筵藥本自生芳草地花陰長到夕陽天就閒頗似陶潛徑適意何須范蠡船此覽清虛有真趣不勞他境覔林泉和元卿水根山腳最荒凉子隱頽祠足感傷廊廡傾顛春草緑門庭寂靜野花香聞之自可成酸鼻見此如何不斷腸追想舊蹤徒悵望淡煙淺露忽斜陽荆吳豪俊最繽紛功烈平西自出羣節操不慙張御史功名終似李將軍安仁句語聊書實宣佩聲猷更襲芬豈謂千年有遺恨數間頽屋枕溪垠知縣沈奉議所至榜雙清于書室諸公篇詠甚多猥以見屬輒賦四韻燕居隨處榜雙清借問何修稱此名迹似壺中氷瑩潔心如潭底月澄明棠陰人散紅塵靜爐篆香飄翠霧輕不必林泉堪寄傲林泉雖勝尚關情和四十伯父見寄入夏情懷轉不中多愁多病愈乖慵匡詩該博終難繼蔣徑幽閒頗願從賴得古文消日月更無佳友話心胸時數交友皆外適吾宗幸有邊經笥却得時時一叩鐘比來維日捧詩筒久廢吟哦覺懶慵韻險不容更屬和意勤須索强隨從深思往往花盈睫得句常常汗浹胸萬事始知關習否賡酬本合類撞鐘答王賢良見寄仍次元韻一觀清表喜良儔三惠佳章歎暗投已駭談鋒傾海瀆復驚文怪埓蛇牛敢將晚路輕王述决有亨途待薛收君欲獻書真得計我今亦作董生謀逰天章寺陪越帥邵司業京東漕吕侍講通判錢承議行路轉湖天宿霧開碧霞深處涌樓臺山川到午晴暉秀林木先春緑意回舞鳳寶書藏琬琰換鵝塵跡鎖莓苔賤逰不畏風霜動擬看雲尖送月來和彥升聞更聲蝶夢回來側耳聽夜深風細轉分明嗟豫觸物徒勞感顧爾于人豈有情宰寺樓髙聲更逺楚天霜冷韻何清因兹却憶南軒宿兄弟之言悉至誠五言絶句題白沙驛壁未忍歌歸去行當獻子虛自嗟渥窪種垂耳服鹽車題婺州道傍水閣勞生成底事寸祿解縈人陽羡溪山好歸歟未有因留題婺州孝順鎮寺處靜未有計徒勞真可傷山僧應笑我只為斗升忙甲申十一月夢中詠假山欲雨煙雲凝經秋苔蘚多憑君莫拋擲留取伴吟哦七言絶句和王推官正月十三日逰戒珠寺竹軒詩誰種篔簹翠掃天擬將風月度流年當軒便是真如境到岸何須般若船積雪滿山寒不釋碧琅玕繞玉樓臺林稍清韻風吹到簷底踈陰月送來貢院即事自崇寧癸未叨備從班距今十有四年間五知貢舉文官花在試㕔前文官花畔揖羣英紫案香焚曉霧橫十四年間五知舉粉牌時拂舊題名醴泉觀宿齊詩并序崇寧三年正月十四日以中書舍人扈蹕至醴泉觀屬有公事免赴對御試草于道院之竹軒政和四年二月十三日被㫖奏告顧視齊館即曩者縯綸之地也屈指十有一年感而成詠昔陪清蹕欵靈真曽對疏篁縯帝綸十載重來渾似舊惟應雙鬢二毛新月夜偶成示翟公巽一杯誰與細論文對影成三更此君却憶當年少陵客空吟春木與江雲非關色相與聲聞此意如何舉似君真馬不須鞭影露本來誰道有迷雲和兵部何侍郎宜香閨五絶香如雲彩出無心一室初凝畫舫深靜對氛氲永終日誰知真相在清襟夕薰猶泛絳紗中曉炷重添翠繞空欲識芬芳何所似百花叢裏度香風暗窗日色鑒重幃香霧橫襟進講歸西學尚賢恩禮重惟將經術贊沈幾鄉賦䝉收一日長文闈恩地自宗房侍郎兩為常州考試官初榜伯父預選及再至彥逢幸出門下摳衣獲造芝蘭室猶認當年月桂香不問無言與有言香山何事解聞禪來詩有香山寂寂聽因緣之句須知篆縷搖空處便是重重說萬緣次韻上酬郭慎求長官金盆馳問請閽人郵信浮沈杳未聞二十八言還寄我一揮多謝管城君次韻上酬四十伯父南郭先生物外人鏘金佳製喜重聞寫成圖軸閒來展要似徽之愛此君寄單季隱别時新栁拂煙汀已見黃花照眼明却憶荆溪寒雨夜笑聽屐齒出相迎題婺州多福寺壁我僕雖勞日未央秋風行色稻花香歸心那解同元亮官况由來似偉長和衡姪題孫德明墨梅霜風栗烈砭人肌又是江南梅發時寫影尋真未端的此心隱處是南枝
