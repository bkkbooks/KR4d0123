body:
  text: 摛文堂集卷十三宋慕容彥逢撰書投獻書某聞君子之於天下非才之難也所以將之者難才出天而寓於性聰明智謀皆自是出舉而措諸事業無不可者然無以將之則居勢利必爭履危難必懾聞毁譽必亂處疑似必惑之人也方且逐事物於無所終窮雖才之有餘必困躓顛隮而後已故君子之用才昭之以識作之以氣而持之以德識以照之孰能蔽之氣以作之孰能禦之德以持之孰能搖之三者合併而後其為度也大故其為志也固度逺而志剛故誘之以勢利而不淫迫之以危難而不懼鼓之以毁譽而不移委之以疑似而不眩夫然後與萬物相偶而莫之能攖以心役萬物而不為物所役故將有為也足以盡已之才巗穴之思廟堂之議其所著見雖不同要之窮不失義逹不離道俾名教與天壤相終夫豈小哉故君子之度猶之海也望之不極即之不測故撓之不濁靜之不澄酌之不損增之不盈蛟龍聚焉風雲興焉彼潢汙行潦之水朝滿夕涸亦何能自致於此古之大有為於世者雖才之不可及然必有非常之度伊尹之耕傅説之築太公望之漁非不貧且賤也而不以為戚一旦舉而用之輔相人主而不以為泰其所養有大過人者故所建立若此其盛也推而下之凡以德業自進者莫不然西漢賈誼號為多才一不得志悲憤以死蓋有其才而無其度也閣下負天下名二十有餘年出入中外視後進與同升之在已上者而志不動顧先進與同升之在已下者而志不矜恢然有容毅然自守其讀書見古人若此猶欣慕之况與閣下並時又曩昔南宫奏名出自衡鑒今者以主生之禮求見左右閣下念某之勤恕某之狂一與之進不勝幸甚又某曩者天幸屢獲拜見辱下執事接之之顔甚溫誘之之辭甚詳執事之奬引後進亦已至矣是時某憂制方闋心氣未寧不獲有請於左右某幼好讀書及長益勤不愧躐等緬想古人之所聞而欲盡得之乃究觀經史諸子百家之言雖貪多務得不間精粗而性質顓蒙過目輒忘獨於古人議論施設之際與夫成敗興衰之由有激於心不能自已或沉吟深思或研味餘意或躍然自喜或惘然自失或可嗟可怨可為太息或可惡可怒可為填膺意不自已則發於聲聲之不足則紀之以文故自丱角以來家無兼日之儲而不知以為貧窮居閭閻而不知以為賤開卷有得足以自適舉在外者皆無足以纍此戊辰年春執事不以某不才備數奏籍獲齒官學今者為貧竊祿猥佐一縣乃釋向之所樂以從事乎俗簿領盈几文檄繼踵目覩手握米鹽瑣細進欲自拔於流俗而不能退欲翻然引去而不可檢身自潔與衆異趣則謗誹讒譖不約而會違已從衆與之無忤枉尋直尺所學非是將求執事一言以破所惑惟執事幸教之將書諸紳以朝夕從事焉僭易之罪伏冀矜恕又某碌碌晚進猥佐小邑沉迷吏役齷齪與轅下駒無以異也乃不自揆獻書下執事夫豈徒然哉竊自惟天下之才天賦之可謂艱矣而天下用之未必盡也夫有周物之智而用之不盡則有餘謀有過人之能而用之不盡則有餘技謀技有餘功業不極此有志之士所以激昂深悼不能自已也蓋士之仕也豈徒干祿而已固將有為也使之挂冠不出遁逃山林枕石潄流與麋鹿俱彼復肯念此哉既投迹有為之地欲自見於世乃無路以進求進而耻於自鬻雖甘心於自鬻而時未必售故士之有才者又以獲用於世為難也猶蠅飛不出墻宇附隼翼可以沖天蟻行不離步武得驥尾可以追風閭巷之士勢卑力弱非有所託不能自致於青雲之上古人之於晚進或倒屣以迎或下榻以延或比之古人或自以為不及嚬笑謦咳為之品題而聲價自定彼豈邀譽於時求德於所知而然哉蓋惟仁者為能進所知惟智者為能知所進仁智君子之所盡心焉觀古人之名卿相必有知人進賢之德使當時薦紳瞻望一眄以為輕重而後世想見風采恨不與之同時中間持祿患失避嫌逺謗無所薦拔自同寒蟬者不獨當時嗤鄙而史官譏貶後人詆訶臧文仲聖人以為竊位虞丘子婦人以為不忠指議所及百世之下不可磨滅顧不重歟雖然古人之知人大率以言孔子曰不知言無以知人也蓋言心聲也言之所鄉志之所在孔子之門人非不日見之也而謂二三子盍各言爾志雖曰失之宰豫猶堯之於鯀子産之於校人非智有所不及顧逆詐之非道也彼少正卯鄧析非不偽而辨蘇秦張儀非不巧於説騶衍公孫龍非不工於誕彼豈不欲文過飾非攘天下之美而有之而下流惡名欲蓋益著者理義之不可誣也故所謂知言者非多言之為美亦非寡言之為貴或以言得之或以默得之可以意會而不可以言傳此古人之妙也某竊觀執事以文學德誼負天下名二十有餘年回翔所至品題士類甄别精確取信天下某筮仕之初獲備屬吏瞻望履舄顧不幸歟雖然如某之愚何足以進見於下執事然竊自惟某幼承義方之訓妄有志於于學半塗為貧竊祿從官進欲深造而不能退顧碌碌者而耻之深念某之所賦尚可進邪抑不足教也而懵然不能自測今者請命典謁以質所惑閣下以默知人則不待某言較然判矣如以言則某之書可見矣幸閣下少留意焉謝人書某頓首再拜某官伏承執事不以某不肖逺貺手筆敘三代以上君子致身從道之方下及漢唐諸子且勉某以所輕重大率先逺者大者而近者小者無取焉某性質顓蒙雖不足議此而樂聞之誠願學之意猶之稚子而遇希世之寶目睹手握不能名之而知喜之雖知喜之不敢有之夫三代而上天下之士去古為近離道未逺君上之所率迪庠序之所教養父子兄弟比閭族黨之相與言以本勝末重內輕外氣完而不挫是以度量恢廓志操端潔見識髙明後世去古益逺士氣衰弱能不待文王而興者謂之豪傑之士孔孟既歿微言奧義泯滅幾盡戰國之風操捭闔之術演從衡之説身委勢權死而無悔故士日趨於詐西漢以奔競相髙朝奏尺牘暮被召命天子歎息恨相見之晚故士日趨於矜東漢以隱居放言為髙屢聘不就為廉刻意矯情甘足枯稿故士日趨於僻兩晉而降質幹戕盡枝葉雕零謂能談諧為風流外形骸為曠逹故士以浮華相耀譎怪駭俗唐有天下三百年士風幾類西漢然文雅醞藉不及漢逺矣下及五代廉耻道消不足比數嗚呼千數百年間如董仲舒賈誼揚雄王通韓愈之徒雖卓然自拔於時然以古義責備猶不得為完人况夫他哉夫古今殊時名實寖紊昔孔文子敏而好學不耻下問孔子以為文顔淵不遷怒不二過孔子以為好學今綜緝辭采則曰吾斯之謂文涉獵載籍則曰吾斯之為學豈孔子之所謂文學也哉某雖不敏考古論今有激於𠂻而下執事又幸獲教之敢不夙夜黽勉庶幾小人之棄君子之歸乎至於古人去就輕重之理皆執事自得於胸中者某恭聞命矣不宣某再拜謝人書某幼嗜學問稍長以博綜自喜貪多務得欲兼古人之聞而有之惑於疑似戰於豫奪如航大海罔識涯涘然不自以為非也伏承長丈特貺金玉之音俾先六經孔孟之學後子史傳説之言屏去異端之害道某始聞之而懼中得之而喜以謂擇之不慎思之不精泛濫之學幾不免為陋儒此某之所以懼也然以六經孔孟為權衡而諸子百家無所逃於輕重以六經孔孟為繩墨而諸子百家無所逃於曲直故言雖殽亂而折𠂻於聖習雖支離而統一於道夫亦何慊於博乎嗚呼六經孔孟猶日月之明衆星嘒嘒之光不足觀也猶雷霆之聲衆喙冥冥之音不足聽也日月之明而瞽者不得見雷霆之聲而聾者不得聞彼舍六經孔孟之學而曰多見多聞將焉用之某自今以往當研精覃思推原六經孔孟之書以求先聖之用心以之治身以之事親以之事君必有以副執事諄誨之勤更冀終始成就之論文書某欽服髙誼請命典謁執事愍兹區區見之甚數接之甚溫又於廣坐中過譽某之文竊自惟蠢蠢晚進無聞於時何足為下執事道者而樂善之誠動於顔色形於話言有意羽翼之使騰躍而上也然則大人君子之所存可知矣某聞之士伸於知己者而屈於不知己者某雖不足以言文然執事許之試為執事論之夫文章自古為難非為之難也知之難矣非知之難也得之難矣非得之難自得之難矣古之人無意於文或以明道或以敘事以為默則不足以自逹則宣之以言言必有紀則述之以文故古人之文渾然天成罔有凝滯猶渾金璞玉不見有追琢之迹後世不然務華者以侈靡為麗務巧者以雕刻為工務怪者以險僻為髙務豪者以馳騁為壯各揣所好互相標目其不淪於俗者蓋無幾也故斯文陵夷無復古人之盛孔子之門人顔回亞聖而文章不少見孟子著書七篇貫穿古昔上下數千百年而曰距楊墨放淫辭豫豈好辨哉豫不得已也故古之人可以無言則文與之俱熄有感於物而言則文與之從事焉緣督而言因言而文此古君子所以異於後世也某以為文之要如此是耶非耶下執事幸教之請益書某生長陽羡與執事同里雖門宇相望而前此未有承教之幸每缺然不饜於心今者不待請見千里獻書非有他求也竊自念某意讀書究觀經史諸子百家之言細大不捐必欲盡得古人之所聞以故博而寡要雜擾並進方且惑於疑似戰於豫奪如立九逹之衢而未知適從輒懷古人愛日之意冀得亟聞緒言以豁蒙鄙此某區區之懇也某聞之聖人之經有六而性命道德典章法度乃至天地鬼神萬物之理罔不畢具如大海水波濤起伏蛟龍出沒珍怪隱見廣博無涘淵深不測天變地化涵蓄萬狀又如寶肆望之粲然即之眩然有循墻而不得見者矣有窺見而不能盡者矣有置諸掌握而不能名之者矣自孔子孟軻沒後微言既息奧義不彰而諸儒人自名家貶黜所異乃至父子有不同之論師生有相誚之辭中間不移於流俗者蓋無幾也夫三代而上仁義禮樂之澤日以沾漬士大夫浩然之氣擴於所養世人所謂學者凡事親守身應物從政逺者近者小者大者無非學也凡立言以明理為文以紀言從容自得咸與道會或纍千萬言而不為辨或終身無所見而不為訥後世士失所養學棄本真區區口耳之習務投時好至謂取青紫為明經術之效豈不謬哉是以士大夫心與言相違言又與道相戾而古人之大體不復見矣子路曰何必讀書然後為學子曰有顔回者好學不遷怒不二過嗚呼彼去孔子之所謂學何逺耶某雖不敏尚論古之人竊有志焉而未聞承學之要執事與鄉里甚厚而貧家又沗葭莩之末或蒙不棄貺以諄誨俾適正審是不迷於多方某之佩德曷有窮已不宣某再拜啓謝教官啓班級雖卑報稱攸重載循譾陋伏積兢慙竊惟先皇帝躬上聖之姿超百王之右體元用妙明闡幽深惟風化之大原尤以膠庠為先務崇尚經術尊寵師儒增諸生之員創三舍之法下逮泮水咸建學宫雲漢為章皇矣作人之運規矩厥步靡然承學之流萬邦作孚一變至道暨今聖總攬之始念神考在宥之隆克監成憲於先王以治建邦之學政支起傾厦遏回狂瀾聿興斯文駿惠大業凡覩雲龍之作復見天地之純豈繄荒踈濫居教導如某學問不足以窺聖賢之奧辭章不足以暢理義之微初非語上之資徒有好髙之志特以聖世育才之廣先人教子之勤幼而讀書幾不知弄謬當弱齒偶玷榮科屬試麗詞薦塵異選方仰斗升之給敢辭簿領之勞不圗恩波俾依聖仭祿廪可以奉親養經籍可以味道腴優遊在公顧何殊於吏隱詰屈難困第有愧於師嚴此蓋伏遇某官為時真儒秉國大政茂贊乾坤之神富赫增日月之光明博求俊良靡問幽賤借齒牙至公之清議欲爼豆不肖於俊遊斡寒谷之孤根鼓朝陽之嘉律馴致僥幸獲被寵休某敢不遜志慎思砥節礪行斆學相長竊慕於前聞功名可為肯忘於異日改官謝啓帝閽引籍選部奏名簉足華紳欣雲天之在望脫身冗調幸綸綍之親聞豈謂孱微有兹叨沐伏念某奮身寒逺遭時盛明輕尺璧而貴寸隂雖云有志持千金而享敝帚殆不自量惟義命已決於胸中故窮通悉捐於度外為貧干祿以仕代耕初繇經術之科效官簿領逮玷藝文之選備數頖林爰暨更書猥塵薦格偶逃官謗輒與明聞朝著乍趨有小臣違顔之感臚傳驟及如當年唱第之儀仰冒隆恩靡安愚分此蓋伏遇某官廓包荒之度推樂善之誠品題一鄉夙借汝南之月旦楷模多士幸登元禮之龍門實賴譽言獲階榮路氣回黍谷方資春律之和海接星潢更假秋槎之便過此以往未知所裁謝試中宏詞啓試詞伊肇方搜頴出之才獻藝匪工猥被鼎新之選拜恩優渥揣分戰兢竊惟斯文盛衰與道升降五帝而上載籍蓋靡詳焉三王以還典章顧可考矣暨戰國干戈之擾及暴秦煨燼之災異端並起如蜂精義不絶如線操觚之士雕蟲是師景差宋玉唱於前枚乘鄒陽應於後務豪則推嵩岱喜怪則窮蛇牛競巧則較錙銖紛華則繡鞶帨雖賈誼節之以禮揚雄戒夫不為而氣力不足以回狂瀾故支撑不足以起大厦由漢及魏浸淫迄於六朝更隋與唐敗壞極於五代中間若建安之稱麗作正始之指名流咸髙冗長之辭無復中和之氣乃有不出月露之習相變宫羽之談或擊鉢責程或探囊按部或成章於七步或積思以十年率意者流離於口占湛思者妥帖於腹藁宏衍若張衡而以言艱為病敏捷如任昉而以才盡見譏異軌同奔去本益逺如孤峯絶岸者施之廊廟則駭如麗服艷粧者類之風雅則乖振葉討源盡掃彜倫之正沉辭浮藻徒滋誇競之風間有自奮而不移抑亦可數者無幾我朝鑒積世造士之弊先帝承纍聖復古之心登用儒臣緝明教典聿興經術之學斥去聲病之科焕乎人文一變至道淵然神化百聖不慙尚念應用之詞乃有設科之意逮今上之總政追神考之作人爰建新科以述前志昭示古今之體詳求辭理之優創置攸初勸率甚厚上意所注衆指為榮紛如簪裾粲爾翰墨或握靈珠以自謂或賤良驥而不珍豈容孱姿濫塵異擢伏念某學惟自信才不逮人補苴徒勞而少功濩落頗譏於無用檢身慎行初不求於世知聞禮言詩蓋第遵於家訓青氈惟舊白雲無心享敝帚以千金雖非審已漱芳潤於六藝聊可怡情謬當弱齡亟玷榮第斗升既竊於甘旨簿領敢殫於劬勞退食自公開卷有得樂分不競隨處而安勉試詞場實慰倚門之望爭先俊域退慙應敵之難偶兹褒甄出於僥幸此蓋伏遇某官命世英輔覺民真儒以道佐王為時籲俊謂凡馬既收則良馬必至謂假龍既好則真龍乃來容兹一日之長備於五人之列某敢不氷蘖勵節葵藿傾心許國之誠拳拳於忠義致君之業勉勉於猷為上副穆清次酬奬拔過此以往未知所裁謝中書舍人啓程篇甫上愧文采之不工恩典驟加驚寵靈之非據伏念某行能卑陋術業空疏預登經籍之科寖被師儒之選曩緣甄録辱賜燕間因誤褒嘉獲參讎校旋塵憲府繼陟諫垣俱莫效於涓埃顧徒糜於餼廪幸逃瘝曠初載筆於螭坳敢玷髙華遂代言於綸掖矧神聖述作之御方天人和同之時五星之軌循行諸福之物類至法良意美吏惟謹於持循民阜俗康邦已臻於熙靖赫兹盛際光於古初是宜深厚之訓詞克副休明之文物於焉循省豈不叨踰此蓋伏遇門下僕射相公業廣功崇道隆德峻齒牙餘論必慎擇於正人廊廟除書肆允諧於清議施及寒微之迹猥深特逹之知師席摳衣曽乏趨承之舊相門推轂實居薦引之先假以要途置諸法從積此銘藏之素罔知報稱之方敢不勤恪以赴事為靖共以安分義退免譴呵之及進惟驅策之從過此以還未知所措回謝黃學士啓伏審奉如綍之溫文擢登瀛之華序傾馳有素欣慰交深惟自昔讎校之資乃諸儒涵養之地蟫剔簡蠧藝披帙香映扣閣之青藜嘗聞往諜詠當階之紅藥多出此塗某官學逢左右之源文得中和之氣揚芬􅓺舍策足俊㕓陪藏室之遊名已書於蘂籍垂置郵之問銜初覩於冰條雖髙誼之曲敦豈微蹤之敢冀永言欽佩罔喻誠悰汝州到任謝兩府啓自貽罪戾宜正典刑尚玷朝恩俾分郡寄退循僥幸愈劇怔營伏念某家本羈單最為孤進仕安卑冗曽乏能稱遭遇聖明搜揚疏逺偶預擢序寖階清華自沗從臣逮今八載再苴詞掖兩二省曹陪經幄之後塵參禮司之末議迄無一得以效萬分惟是顓愚僅守區區之小諒至於兢慎每懷惴惴之私憂顧智無先見之幾而器有易盈之誚上孤任使亟致顛隮伏遇門下僕射相公德度有容仁心不忍念兹寒迹舊出髙閎秋賦掄才初備糊名之選晨朝接武久聨持槖之班深惻慈憐特垂善救終賴保全之力遂寬竄殛之刑恩比丘山雖銘肌而曷報心非木石豈感涕之無從又啓伏遇某官德度有容仁心不忍過私寒迹俾出髙閎簉羽鵷鷺之班初由奬借脫身風波之險每賴保全兹尤惻於慈憐用特垂於善救屬言章之薦至方公議之弗容終賴緒言得寬逺殛心非木石豈感涕之無從恩比丘山雖銘肌而曷報復修撰謝兩府啓右某伏奉告命復集賢殿修撰者省愆夙夜方懼怔營肆宥臣民與膺湔滌綸言俯逮雨涕交揮伏念某出本衡茅進由雍泮偶承人乏寖誤聖知陪鵷鷺侍從之班簉帷幄論恩之列寵私未報歲月滋多緬想厥初敢越巢林之分叨塵乃爾顧無橫草之勞唯求退藏冀甘孤拙暨積愆之既著匪公議之可容尚賴廷僉照知本末特寬朝憲俾竊便安兹因解澤之施俄復書林之選涵濡為渥報稱尤難此蓋伏遇某官本仁恕以翼贊大猷崇忠厚以表率庶俗凡士夫之小善罔或遐遺矧門館之舊遊倍加慈惻肆蒙甄敘出自記存某敢不益恪慎官針虔共吏治失之已往雖永咎何以追收之將來尚不辜於所學復修撰謝本監司啓伏念某迹孤地寒材薄能淺猥承人乏寖誤聖知陪鵷鷺侍從之班簉帷幄論思之列稽勞無補閲嵗滋多逮積釁之既彰匪常刑之可貸分符汝海已出優恩列職書林復叨甄敘此蓋伏遇某官用心平恕操術仁慈加問孱微曲垂休庇俾脫鰥曠獲冒深恩回謝新知汝州王大夫啓講聞風誼積有嵗時比奉更書獲承除命方修竿牘之問庶展腹心之誠豈謂勞謙先貽芳訊撫存良厚感悚交深伏惟某官蘊識髙明賦材閎廓任更中外著古人經國之猷事厯險易挺志士危軀之節用孚賢業自結主知某養拙此邦逮經纍月及瓜受代雖屈指而尚遙揚秕居前每捫心而自愧未諧參晤正切傾馳冀順節宣益隆祉福回謝貢士樂偲樂傳啓伏審上舍先輩較藝儒林策名貢籍周鄉論秀與聞造士之方漢郡觀能竊有得人之幸辱迂華轡仍貺長箋諒修桑梓之恭豈責瓊瑤之報聊塵謝幅并展賀儀伏冀隆私特垂深察與本路安撫鄧資政啓右某迹逺門墻念數更於嵗籥誠陳竿牘冀仰答於台躔恭惟某官氣稟山川辰逢旦暮奮揚賢業翊贊政機若時鹽梅用克和於鼎實為國柱石方永弼於邦基時近嚴宸升華祕殿西都守鑰曩顧重於師瞻中寧賜環行復登於柄任某羈孤寡與朴拙多違自拜車塵已周星紀橫經學省嘗先左右之容接武從班每借齒牙之論逮有陶鑄尤辱記憐收録於壠丘待盡之餘保全於風波幾覆之際雖懷銘感曷報恩私兹假邦麾實居率部坐縻符印阻屬槖鞬徒頌祝之交深非名言之可既寄江寧安撫啓已擇剛辰肇開雄府伏惟慶慰恭以某官道深造而自得氣直養而至剛謀合唐虞之都俞文追商周之訓誥闡揚六藝時之醇儒贊翼九重邦之元老比從懇請暫即便安民瞻愈傾公論胥鄉四牡奕奕佇觀入覲之儀八鸞喈喈將邁遄歸之頌某戴恩素厚圖報未能祝頌併勤名言曷既冬至賀啓氣應律鍾兹謂物生之始晷移星陸共欣日至之長伏惟某官業履瑞時材猷經國風望顯於中外詠歌流於士民方穀旦之載臨宜繁禧之並集某坐縻符竹阻造門墻顧敘慶之靡遑在馳情而曷已賀正啓四氣播時三朝啓朔陽居震而萌動物前寅而亨通伏惟某官重德鎮浮嘉猷經逺以忠恪享上之實興慈仁澤物之功當品彚之咸亨宜福祥之並集某方縻符印阻望門墻徒虔慶牘之馳莫預夀觴之薦賀館職到任啓右某伏審奉綈檢之溫文進蘭臺之清貫竊惟慶慰恭以某官早席問望自結眷知映扣閣之青藜暫勞是正詠當階之紅藥行被詳延特詣髙軒并擕大軸辱謙沖而過禮顧感悚以交懷賀曹運判就遷副使啓恭審就頒恩制擢正使名凡在統臨胥同慶慰伏惟某官深忠許國逺業映時材適變通顧何施而不可政先豈弟宜所涖之有聲用結眷知進膺褒寵乘軺劇部暫資均節之謀簉羽華塗行著論思之效賀本路監司到任啓伏審軺車臨部榖旦視章初奉使移已虔遵於條教坐縻郡紱阻竊望於光儀敢敘悃誠逺馳慶牘伏惟某官風猷華國業履瑞時材兼文武之全無施不可政得中和之樂所涖有聲用結眷知遂膺臨遣外臺刺舉暫為揚厯之階前席論思别迓詳延之寵跋跋僧懷素帖歐陽文忠公稱魏晉法帖初非用意自然可喜後人以學書為事業如懷素之徒疲弊精神不以為苦然六藝未有不學而工者魏晉書體皆有師承以意在筆前為法文忠不喜學書故詆之若此懷素行筆頗類羊欣梁武帝亦以欣終不似真云辛卯重九日題跋李伯時馬杜工部稱韓幹馬能窮殊相而畫肉不畫骨獨曹將軍為盡善豫觀二人遺迹信然伯時筆法蓋得於曹韓士大夫寶之為神品觀於通真西軒丙戌三月題道録黃大中書軸某自崇寧癸未以中書舍人扈蹕逮今十有四年又間緣祠事詣醴泉者不可勝記雖屢見淵靜沖和師曽不少欵政和丙申七月戊午始得造琴軒清談終日慰懌可量題遺教經後汝之後圃有山池水竹之勝此刻在圃之西小亭沿灘溜度危彴穿叢葦乃至見此默想舊遊如在目前云題青城瑞石文後政和五年三月癸巳上御集英殿第多士名近臣侍內出青城山瑞石尖圓黑色大如百斤稱錘有白文在石曰吕公天與之道急急吕公之行凡三十有三字分兩行石脈透徹文仄旁見字法比王右軍尤加清逸臣某與觀并賜模本得以寶藏豈不榮幸模本止得十之七八蓋石理溫潤字字精采殆若飛動非模刻所能盡也具位臣姓某謹題
