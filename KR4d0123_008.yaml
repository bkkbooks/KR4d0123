  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0123_WYG_008-1a, image: WYG1123/WYG1123-0387c.png}
body:
  text: 摛文堂集卷八宋慕容彥逢撰制皇城副使某與轉兩官制敕具官某清平之使惟爾禦敵追奔克有勞列進官二等以示寵嘉往其欽承無替忠恪可皇城副使沈貴與轉兩官西京左藏庫副使何先明供備庫副使董修古東頭供奉官馬制蕃官左藏庫副使吹忠可轉一官制敕具官某等惟爾决戰取勝功緒可嘉宜進官榮以示甄奬往承無替嗣有恩章可前內殿承制董厚與轉三官制敕具官某爾驍勇過人臨敵用命率先士卒以立戰多宜錫優恩昭示奬激進官三等其往欽承可東頭供奉官密桑與轉一官制敕具官某順寧之役爾預有功宜進厥官以勵忠敢往承無替朕不弭忘可蕃官皇城副使旺默星及蕃官左藏庫副使旺密桑各與轉一官制敕具官某等爾深入冦境决戰立功帥司以聞宜有甄奬遷官示寵於爾為榮可東上閣門使楊應詢可轉一官制敕疆場之臣朕所眷察録其勞列錫以恩章具官某材藝之優擢在邊要審於備豫斥候惟明不有褒升何以示勸進官一等其往欽承可東頭供奉官高士侯可轉一官制敕具官某爾被堅執鋭以立戰多閲級序恩昭示奬激擢升位秩其往欽承可左班殿直种師閔與轉三官制敕具官某爾深入决戰鷙勇可嘉帥臣奏功閲級第賞進官三等其往欽承可蕃官文思副使賽音與轉一官制敕具官某爾逢賊决戰以克有功鷙勇之資良可嘉尚按級序賞其往欽承可西頭供奉官田稔與轉兩官蕃官東頭供奉官斡明善與轉兩官蕃官供備庫副使香瑪與轉一官制敕具官某等爾等乘勢追襲誅馘强敵稽其功次擢進厥官往服恩章無替忠敢可右侍禁侯公瑾可轉一官制敕具官某惟爾祗事恪勤克有勞列宜膺懋賞擢進厥官往服命書尚多後祉可內殿崇班䇿喇卜沁與轉一官制敕具官某爾臨敵驍勇克有戰多擢進厥官以示嘉奬欽豫時命尚其勉旃可東頭供奉官張士廉西頭供奉官馬先賀世安左侍禁南信可各轉三官制敕具官某惟爾等逢賊决戰斬獲既多幕府以聞宜加優賞進官三等往其欽承可降授西京作坊使孫慶可轉一官制敕具官某爾斬馘既多仍執强敵帥司條上功狀甚明擢進厥官往承無斁可西染院使王元轉兩官制敕具官某惟爾奮武邊郵誅擊强敵兵無亡失閲級為多宜錫命書昭示嘉奬進官二等其往欽承可三班借職李通可特轉一官制敕具官某爾右選小臣而其姓名逹於朕聽擢升位秩於爾之所遇可謂榮也矣往服命書勉思稱塞可故供備庫副使張吉可贈三官制敕具官某惟爾效職邊陲死於行陳忠義之節朕心所嘉優進厥官以示褒恤魂而不昧尚克監兹可右班殿直王優可轉一官制敕具官某惟爾率職有勞宜加甄奬進官一等其往欽承可東頭供奉官劉振可轉一官制敕具官某惟爾殺獲凶寇勞列可嘉擢進一官往加勵勉可魯斯結族蕃官侍禁節斡結斯結可各特與轉一官制敕具官某等爾等忠義不渝奮身內附捕獲奸細達於朕聞褒進一官庸示奬激往加勵勉以副恩章可蕃官東頭供奉官索琳密密保默齊皇城使默實勒竒多伊內殿承制牛威名東頭供奉官威女篇鼎內殿崇班蒙伽恪各與轉一官制敕具官某某爾等奮身內附來造闕庭誠節若兹宜示奬激用加褒擢序進厥官祇服恩章勉圖忠報可東頭供奉官王正臣與轉一官制敕具官某爾出入行陳克有戰多序進一官庸示奬激往圖顯效以稱恩章可侍禁吳志可與轉三官制敕具官某惟爾奮武决勝誅擊冦攘閲級既多兵無亡失宜推優賞以勵遠臣用錫命書擢官三等往加勵勉務稱恩榮可奉職王谷可轉一官制敕具官某理寺修書既成來上惟爾預有勞績宜進厥官往承朕恩無替勤恪可文思使胡德淵供備庫副使耿臨供備庫副使曹歷蕃官西京左藏庫使蘇默可各轉兩官東頭供奉官張易文思副使張永德禮賔使曹修蕃官左藏庫副使將凌蕃官供備庫副使香瑪可各轉一官制敕具官某某爾等服在邊郵見謂忠勇斬馘强敵克有戰多帥司以聞按級第賞進遷位秩昭示寵嘉尚圖後功嗣膺褒擢可西頭供奉官陳殊可各轉一官制敕具官某爾屢膺賞典引例自陳宜進厥官以勸勞績往慎乃服勿替恪勤可供備庫副使李琰路璉西頭供奉官李希成右侍禁朱渙可各轉兩官制敕具官某等茶場奏課爾預有勞宜進厥官以示甄奬往加勤恪務稱恩章可供備馮熙與轉一官制敕具官某惟爾效職邊圉與有戰多抗章自陳朕命甄叙進官一等時乃異恩往懋忠勤以圖報稱可左班殿直劉湜三班借職朱渙右班殿直陳若拙太醫丞趙宗元翰林醫官趙嗣先可各轉一官制敕具官某等軍器建局工用不愆爾率職於兹與有勞勩進官一等往其欽承可右侍禁胡誼與轉五官制敕具官某爾奮武以忠抗賊决勝兵無亡失閲級為多帥司奏功朕所嘉懌進官五等時乃異恩往其欽承益思報稱可東頭供奉官李佐可轉一官制敕具官某爾統率所部禦敵有勞斬馘既多兵無亡失進官一等以示寵嘉尚其勉旃益彰後效可河東轉運判官王勤可轉一官制敕具官某爾奉使晉郊經畫鹺事課額增羡功緒可嘉擢進厥官以示甄奬往服寵命無替恪勤可奉議郎于彥佐可轉一官制敕具官某爾出宰百里克以材稱察其設施頗見成效宜膺褒賞擢進品階往承朕恩益思所稱可皇后閣祇侯使臣竇瑛祇應人石君許可各轉一官制敕具官某等爾以祗事克勤預膺慶典進官一等其往欽承可左藏庫副使閣門通事舍人劉公輔可轉二官劉慎內殿崇班李庠東頭供奉官王坪各轉一官制案劉慎上原脫官名敕具官某惟爾追襲西冦克有戰多宜進厥官以示褒賞往服恩命尚加勉哉可內殿承制魏舜臣李彭年供奉官郭彥趙令淘李永年彭汜侍禁葛鞏王汴張克敞李從古殿直李淑程輗李中正奉職楊畿道借職李南仲可各轉一官制敕具官某等比修北輔爾預有勞宜進厥官以示甄奬往承恩命無替恪勤可承議郎翟師中可轉一官制敕具官某朕設賞格付之有司凡子大夫趨事赴功利及吾民者不吝賞祿以寵之爾經畫渠堰克有成績宜進厥官以為能吏之勸往服恩命無替爾勤可西頭供奉官張和可轉一官大將康師顔可特轉三班借職制敕具官某等朕追懷恭懿録其舊人爾等俱以祗奉之勤錫茲恩典往加勵勉務稱恩榮可故淑妃張氏姪張琬張瑾可並補借職制敕具官某等故妃遺言祈恩近屬錫爾一命往其欽哉可婕妤張氏姪孫張承可借職制敕具官某宫闈進位以恩回授命爾官使往其欽承可故駙馬都尉曹司女夫進士時微可借職制敕具官某爾為倩于尚主之家獲備官使無忘勤恪以報恩章可醫官周道隆任景章楊處厚大將狄道淳韓中立書藝局藝學許成吳成翟易韓奕曹成趙永圖陳德之張友王從志蹇仲恭韓球圗畫局藝學元方卞士端元導尚從吉杜宗範郭惟簡可各轉一官皇城使榮州刺史宋渙姪男棫皇城使俞隨男儋左藏庫使杜公才兩姨弟劉渥已上三人各回授補借職制敕具官某等朕即英祖舊邸崇建寶坊爾等或與祇奉之勞或膺回授之典錫兹寵命往其懋承可景福殿使明州觀察使楊戩親堂姪茂實可借職制敕具官某侄某爾之諸父率職禁廷有勞當遷許其回授用錫爾秩時乃異恩宜懋忠勤往圖報稱可程植可三班借職制敕具官某爾以勇敢效用克有戰功錫兹官榮往加厲勉可故三班借職紀育弟紀震可三班借職制敕具官某弟某爾兄奮武戎行委身徇國嘉其忠節悼念不忘錫爾以官往惟祗服可兩朝佑聖太夫人重姪孫仲康仲弼可並三班借職制敕具官某等朕追懷恭懿褒恤其家錫汝恩章列于命秩往服事任無忘恪勤可太后殿掌箋奏耿茂直劉豫可並特授三班借職制敕具官某某爾等職在箋管預兹慶恩命以官榮往祇乃事可楚州解發到呈試武藝人劉决可借職制敕具官某爾試藝殿廷武勇可奬錫之命秩俾服事勞往克懋承尚有褒擢可百姓滑永全可三班借職制敕具官某惟爾敏于筆札祇奉有勞擢自民編錫兹命秩仍加餼廩併示勸能往懋恪勤以稱恩典可故右侍禁尚清思均坦可並授三班借職制敕具官某等朕推恩死事之孤以勸忠義錫爾命秩其往欽承可左知客押衙兼知進奏事崔通可三班借職制敕具官某爾以勞能達于朕聽錫兹命秩其往欽承可故右班殿直馬宣男可三班借職制敕具官某爾父死于行陳臣節可嘉優恤其孤維以示勸授之命秩仍錫美名往服恩章勿忘忠孝可故內殿承制李仙長男畯次男畯孫忠履可並與三班借職制敕具官某等爾父效職邊陲死于金革肆推恩典優恤其孤服兹官榮無忘忠孝可故太中大夫魏漢津親女夫張清可三班借職制敕具官某漢津之家祈恩于爾錫兹命秩其往欽承可皇后三從伯王子約可三班借職制敕具官某爾以戚屬之良預兹慶典官于武列往恤事功圖稱所䝉莫忘忠恪可故右侍禁張安民男思賢思忠可並三班借職制敕具官某等爾父奮不顧身死于金革推恩子姓惟以勸忠服兹命書無替厥紹可故三班借職紀育男塔達克與三班借職制仍賜名紹按永樂大典原本此題上有蕃宦三班奉職李琮男永誼可三班借職制十七字文不相屬與制詞亦不相符顯係當時繕寫誤衍今謹刪正附識於此敕具官某男某爾父奮身疆埸效死戎行有司以聞朕所悼念録爾命秩并賜美名移孝為忠兹為克紹可潭州都知兵馬使張繼隆可三班借職制敕具官某帥臣上言爾有勞效命以官使往其欽承可茶園班殿侍鄭永立可三班借職制敕具官某爾父監督有勞宜加甄奬以資回授時乃特恩錫爾官榮往思所稱可虎翼右第一軍都指揮使秀州刺史陳興男寶文御龍直長行李謹可並三班借職制敕具官某等朕推恩死事之家以勸忠義命爾官使往其欽承可三班差使房從壽可三班借職制敕具官某爾久服事勞宜有褒叙命以品秩往其欽承可故右侍禁王卞女夫薛安靖可三班借職制敕具官某爾之外舅以身徇忠推恩其家爾名來上錫兹命秩往務欽承可故右侍禁王卞男錫可三班借職制敕具官某惟爾父奮不顧身死于金革宜推恩典優恤其孤錫爾官榮往圖報稱可睿思殿御前文字外庫書寫文字郭景倩可三班借職制敕具官某爾以書札之勞宜加甄奬錫兹命秩其往欽承可大將軍發運司前行徐楷可三班借職制敕具官某惟爾久服吏勤克有勞列錫茲命秩其往欽承可入內內侍省內東頭供奉官周莘可入內內侍省內殿崇班魏國惠和康佑夫人薛氏親姪薛敏政太后親舅女之夫姜天祐可並三班借職制敕具官某等天寧錫慶國有舊章爾等或祗事內庭或綴名外屬咸預恩典進服官榮圖稱所䝉毋忘勵勉可皇弟故荆南武寧等軍節度管內觀察處置等使守太師開府儀同三司荆州牧兼徐州牧蔡王贈太師尚書令兼中書令加冀州牧改封韓王可特追封楚王餘如故制敕朕賴神考之貽燕承上帝之降康薦獻祠宫奉衣冠而永慕顧瞻甲館思居處以如存方深追往之誠爰有因心之感具官某禀姿和粹迪已慈祥肅恭克著於朝儀謙讓不愆於侯度育德雖厚享年弗遐宜加增恤之章昭示褒崇之意是用相攸大國益侈真封務極哀榮優加愍飾光靈未泯歆懌在兹可皇兄故河東山南西道節度觀察處置橋道等使守太師開府儀同三司太原牧兼興元牧陳王賜入朝不趨詔書不名贈尚書令加徐州牧改封燕王可特加贈侍中追封吳王餘如故制敕朕永懷孝思念兹皇考瞻衣冠於原廟如奉睟容覩梁梠於寶坊是為甲館欲申雨露之感用推手足之恩於其淪亡尤所傷惻具官某藴慮淳靜禀質惠和閲義理而無充詘之心循法度而有柔嘉之則積德雖厚享年弗遐宜增褒恤之章昭示友恭之意是用加隆名數錫左省之貂蟬大啓土疆建全吳之茅社再推愍飾務極哀榮尚想光靈亦知歆懌可皇兄故河東山南西道節度觀察使守太師開府儀同三司太原牧兼興元牧陳王賜入朝不趨詔書不名可贈尚書令兼中書令加徐州牧改封燕王制敕朕立愛以始基王化因心以敦叙天倫乃眷近親莫如同氣生則體貌盡其禮殁則哀榮稱其情爰錫愍書特優贈典具官某禀資忠孝持己謙恭作德而心日休遜志而學時敏東平為善高密任真謂宜壽考之遐永綏福履之茂比云寢疾亟往幸臨方决冀於有瘳胡奄罹於不淑聞音哀慟觸緒感傷非極褒崇曷伸顧恤是用峻加異數增煥寵章位冠上公名兼兩令恢土疆於奧壤併牧徐方徙茅社於大邦改疏燕國以示賢賢之義以隆貴貴之恩尚想英靈克知歆懌可右驍衛將軍有奕可大將軍遙郡刺史制敕具官某追往撫存務隆恩紀閔豫同氣爰恤諸孤惟爾休慶所鍾夙有令聞宜遷位秩加以郡章仍詔有司優其餼廪併兹異數昭示眷懷祗服命書永綏祉福可故燕王第三男賜名有常可右武衛大將軍制敕具官某追往撫存務隆恩紀閔豫同氣爰恤諸孤惟爾休慶所鍾生有淑質宜加顯秩錫以美名仍詔有司優其餼廪併兹男數昭示眷懷祗服命書永綏祉福故燕王第二女可封郡主制案封燕王第三女制與此制同茲不竝録敕具位某氏朕痛念天倫奄其淪謝推恩息女用稱情文惟爾鍾慶有源夙著婉淑宜疏湯沐主兹大邦仍命有司繼其廪給往綏祉福以副眷懷可安康郡主趙氏可封兩郡主制敕朕謁欵祠宫永懷祖烈念濮園之息女實先帝之諸姑申錫寵章特頒異數具位某氏柔慈純靜淑慎謙恭譽優圖史之傳動協聲詩之訓宜加爵命增衍郡封是用考兹輿地之名隆其湯沐之奉庶幾褒揚於懿德豈唯敦睦於近親往對恩榮益綏壽祉可皇叔右千牛衛將軍仲瑥所生母楊氏可封瑞安縣太君叔右千牛衛將軍仲愙所生母陳氏可封長安縣太君叔嘉州防禦使世膺所生母永安縣太君李氏可封咸安郡太君制敕具位某彌月慶辰天畀純嘏均休屬籍時庸展親恩如所生錫以封爵其綏壽考茂對寵榮可皇伯故太保節度觀察留後仲臯可贈開府儀同三司追封榮國公制敕朕於屬籍之親哀榮終始務稱情文所以本人倫教天下也具官某禀資和粹持己端莊序于內朝樂循矩則奄其淪謝有惻朕心用錫寵章追加愍飾贈官開府仍錫公圭尚其有靈克知歆懌可中大夫守尚書右丞梁子美故曽祖任翰林學士右諌議大夫贈太師中書令兼尚書令周國公皓可贈開府儀同三司追封燕國公制敕朕登用忠賢與之共政中外交慶僉曰得人因其拜命之初寵以褒親之典具官某文章華國論議佐時官厯諫垣職聨詞禁積德深厚是生曽孫克以才猷位于近弼推原所自宜有追崇開府隆名禮同三事易封燕土增衍舊邦服兹茂恩尚其歆懌可故曾祖母唐國太夫人閻氏可贈冀國太夫人制敕仕宦而至近弼其淵源所自豈一日之澤哉故褒崇之恩上及於三世所以慰孝子慈孫之心也具官某曽祖母某氏禀質慈祥宅心敦厚德配君子化行閨門錫祚流光慶鍾後裔擢與大政師言允諧推原厥初宜加寵命相攸大國有此冀方增衍舊封以賁窀穸尚其不昧亦克歆嘉可故祖任太子太傅致仕贈太師中書令兼尚書令秦國公適可贈開府儀同三司追封鄆國公制敕朕眷禮大臣恩數優異褒親之典稱其情文所以為在位者之勸也具官某佐佑昭陵實惟先正像列原廟名紀册書勳德顯融澤流後裔致位近弼紹休前人宜錫寵章追加愍飾開府顯秩汶陽大邦增衍舊封以慰窀穸英靈雖逺尚其如存可故祖母越國太夫人任氏可贈曹國太夫人制敕朕紹隆孝治禮優輔臣追榮其先務極崇顯禭章愍册國有典常具官某祖母某氏柔順慈祥動循訓則儷德先正慶鍾後人是生慈孫佐佑幾政宜膺寵命增衍舊封濟隂大邦俾為湯沐殁而不昧尚克知歆可故父任尚書職方員外郎贈光祿大夫彥昌可贈太子少師制敕朕惟執政大臣望實顯隆致位近弼義方之訓自其前人追加表揚用錫休命具官某材猷閎廓器識高明揚厯仕途積有隱德潛于郎秩官不滿能源深流長慶鍾子姓朕所柄用師言允諧東宫之孤名寵秩峻舉兹賁飾期稱情文尚想英靈克知歆懌可故母東平郡太君張氏可贈清河郡太夫人制敕君子之念其親跬步不忘閔豫執政大臣位雖顯矣而親弗見其榮祿雖豐矣而親弗逮其養肆有追崇之典以慰孝思之誠具官某母某氏柔明肅雍婉懿冲靜婦道以順母儀以慈積厚愛隆鍾于子姓擢在廊廟惟豫得人宜錫茂恩加隆封爵清河大郡為爾相攸尚克歆承永綏厥後可妻文安郡君宋氏可封文安郡夫人制敕朕惟卿士大夫其業履顯聞于時者必有內助矧執政大臣勳德之盛乎故疏榮之典及於閨門豈特示朝廷之恩亦以為室家之勸具官某氏禀資靜專率禮恭恪內行敕備宗姻所賢來嬪慶門克相君子夙夜警戒致位近司婦貴從夫國有彞制文安大郡時汝舊封登崇號名視品為峻膺兹異數壽祉維寧可昭信軍節度觀察留後駙馬都尉郭獻卿可贈節度使制敕位列駙馬國之姻戚奄兹殂謝有惻朕心宜優褒恤之恩以盡哀榮之禮具官某宅心淳靜操行恪恭自膺選掄允彰譽處謂宜壽祉胡不永年作鎮大邦建旄秉鉞舉以追錫用稱情文尚其有靈亦克知享可高永翼特贈正任防禦使制敕具官某疆場之臣奮武行陳朕念其功閔其勞未嘗須臾忘也其或不幸以死則褒恤之儀在所加厚爾忠勇自效積有戰多方膺寵嘉俾䖍武服云胡不弔遽以疾終禦侮隆名特優贈典尚其不昧享此顯榮可正議大夫致仕宋喬年特贈金紫光祿大夫龍圖閣學士制考終天命享有死生哀榮之隆追錫爵名相其春秋窀穸之事凡今恤往孰盛與夷乃眷賢勞特隆異數具官某名臣之後尚有典刑近侍之華鬱為國器方將顯用以究逺圖曽不有年嚮用兹福然自古有死疾沒世而無稱太上立言惟托名為不朽其加五命之寵以慰九原之思嗚呼傷哉蔑之命矣反席於寢嘉爾易簀之言納書於棺副爾乘車之錫可武勝軍節度觀察留後王厚可贈節度使制敕疆埸之臣朕所眷恤於其淪謝宜示褒崇具官某曩膺選掄往督西旅前人是似於國有勞品秩寖隆寵榮未艾云胡不淑遽以疾終追錫使名俾建旄鉞時維優典以慰九原尚其有知亦克歆懌可宫人掌記張氏可封大寧郡夫人制敕具位某氏朕念兹恭懿保佑兩朝奄及淪亡夙夜傷惻褒崇賁飾既極情文録其舊人益彰異數惟爾列于宫寀勤毖可稱昔事神考獲興潛邸疏封之典在爾為宜相攸大寧啓茲湯沐往承恩命務保寵榮可兩朝佑聖郡太夫人親嫂同安郡太君蔡氏可封郡太夫人制敕朕永懷恭懿保翊纍朝始終毖勤年高德邵自其淪謝虞悼不忘爰舉恩章施于近屬具位某氏閨房育秀婦德惟優宜膺寵嘉隆進封爵往其欽佩益介壽康可耀州華原縣五臺縣真人廟封妙應真人制敕某山川勝境仙聖所居其盛德懋功顯聞于世者朕必秩而祀之惟真人生於有唐見謂隱逸應物之迹具載史官廟食華原時乃鄉縣祈禳休貺美利在民肆加褒崇特建榮號尚其歆懌永福此邦可臨江軍清江縣閣皂山景德觀葛仙翁壇封冲應真人制敕某山川勝境仙聖所居其盛德懋功顯聞于世者朕必秩而祀之惟真人言行所稱咸造宗極出入無畛與道翺翔壇于琳宫積有年所祈禳休應美利在民肆加褒崇特建榮號尚其歆懌永福此邦可光州孫叔敖廟祈禱感應擬遺愛侯廣信軍遂城縣班妃廟祈禱感應擬文惠夫人制敕某朕稱秩祀事廟食之神既載諸有司又賁以封爵所以教天下之恭也惟神有德有功靈貺昭著宜從民欲申錫褒章尚克歆嘉永福兹土可
