body:
  text: 摛文堂集巻四宋慕容彦逢撰制龍圖閣直學士朝奉大夫林攄可開封尹制開封典治京師總漢三輔事任雄峻葢難其人具官某心術疏通材猷閎逺曩以詞學揚歴要塗出守大邦益練民政今予命爾尹兹浩穰輦轂之下耳目所及設施之要朕得以觀焉可不勉與可朝散郎新除太僕少卿李罕可開封少尹制勑具官某輦轂之下民俗浩穰推擇俊良徃貳内史惟汝風力彊敏克以材稱比膺選掄擢佐司僕屬謀副尹僉曰汝諧祇服寵章益加勵勉可宣徳郎尚書司封員外郎王孝迪可太常少卿制勑具官某太常之長常缺不除而少卿實總寺事典朕三禮任屬匪輕惟爾學術行能夙有聞譽為郎華省亦既閲時宜膺選掄進踐厥次服兹寵命尚加勉旃可祕書省正字蔡嶷可起居舎人制勑具官某聨職兩省均曰侍臣而載筆螭坳兹為親近以爾問學詞藝夙著譽言奉對廣廷嘗冠多士議論勁正風節可嘉是正蘭臺涵養益粹不次之擢蔽自朕志其服命書進陞右史尚多後祉往惟欽哉可殿中丞某官可祕書丞制勑具官某藏書内閣昔比道山為丞于兹秩任清美以爾性資開爽職業靖共學識行能士論推尚曩膺考擇贊治殿中夙夜克勤久而愈勵惟䇿府育材之地肆予命爾涵養優㳺以備除擢往其欽佩益懋厥修可左司諌劉正夫可起居郎制勑具官某載筆之臣記朕言動職清地顯選授惟難以爾學有師承文知體要擢在諌省僉論允諧朕所簡知進陞左史惟克祗服尚茂寵榮可祕書郎劉煥可起居郎制勑具官某左右史臣記朕言動執簡載筆日侍軒墀惟爾問學淹該行義端潔擢司祕籍涵養益嘉其服命書進直東省夫華要之職兄弟迭居爾之膺此可謂榮矣往懋厥修以稱眷遇可祕書郎趙思誠可著作郎制勑具官某譔述之臣尤資望實史館之長常缺不除惟爾力學有文擢在清貫典司祕籍亦既閲時石室紬書金馬遞宿古人榮之今以命爾蔽自朕志爾往欽哉可奉議郎祕書丞胡伸可著作郎制勑具官某朕招延俊良處之内閣而史館以譔述為職其選尤慎爾學問詞藝夙有譽言為丞蘭臺閲日既久紬書石室往佐討論祗服朕恩尚加勵勉可承事郎京東西路學事司管勾文字蔡佃可祕書省校書郎制勑具官某東觀圖書比于藏室典校之選時為清途以汝經術能行夙有聞譽副朕親䇿名在甲科賜對燕朝載詳厥藴敷奏有序陳義可嘉儒館優㳺宜以命汝試用自此往惟欽哉可祕書省正字俞㮚可校書郎制勑具官某朕藏書東觀招延畯良以備異日公卿之選爾問學行義升選于鄉名冠貢書朕所眷拔為郎典校時迺序遷爾尚益尊所聞副朕育材之意其勉之哉可宣徳郎劉煥可祕書郎制勑具官某朕招延時俊寵以清途使之優㳺藝文不累以事葢將養成其才以備選擢惟爾學行之美達于朕聞召對燕閒陳誼可采為郎東觀蔽自朕心爾其益懋厥修以稱朕命往欽念哉可朝請郎權發遣轉運副使張莊可除直龍圖閣依前朝請郎制勑具官某朕考覈羣臣務先效實疏榮示寵資以勸能爾擢在外臺見謂敏濟修和新境宣力惟勤延閣清華選任攸重舉以褒賞時乃茂恩往克欽承嗣有推擇可奉議郎守殿中侍御史徐處仁可左正言制勑具官某兩省諌臣以言入侍實朕耳目之任非有猷有守忠亮不囘者未易居此爾問學之醇操履之潔揚歴憲屬閲日既多糾肅在廷雅志可尚用加褒進處以近班朕于庻言惟是正聴爾能言之無慮朕之不能行也往踐厥官益思報稱可通直郎試中書舎人侯綬可給事中制勑給事中號東臺舎人以糾正違失為職肆于推擇必惟端良具官某學術純明文采該贍擢自柱史置諸詞垣建明居多抗議鯁諤論駮之任汝往為宜其體眷知益加懋勉可中書舎人鄭久中可除給事中制勑朕為官擇人以熈庶績内外任使必惟材能矧東臺侍從之臣出納所繋選用之慎宜難其人具官某學術醇明操履端潔比采素望擢置詞垣論通古今之宜文得制誥之體肆加褒進以示簡知夫閲讀之繁論駮之重惟忠惟恪迺罔有愆汝往欽哉無怠兹訓可左正言徐處仁可除給事中制勑給事殿中典司論駮職親且要選授匪輕具官某業履清優氣節强毅比自憲屬延置諌垣造膝獻言灼見忠慤不次之擢蔽自朕心具節東臺超陞夕拜徃祇乃服無怠建明可宣徳郎守監察御史沈畸可殿中侍御史制勑具官某殿内御史以糾正官邪為職凡在廷之臣與夫羣有司違法慢令罪當按劾者皆得論列其任可謂重矣以爾操修端潔問學貫通比縁簡知擢置臺察振肅綱紀風望甚髙處以副端蔽自朕志爾尚思職守之宜抗論以公毋或枉撓是為報稱可不勉歟可宣徳郎新除守左正言沈畸可侍御史制勑具官某朕慎擇臺端㕘掌風憲紀綱所繋得人為難以爾問學純明氣節剛勁擢在言路忠讜日聞宜自諌垣延置横榻朕方綜覈名實緝熈治功尚懋爾猷以副寵命可宣徳郎辟廱博士陳禾可監察御史制勑具官某御史六察之臣分糾官邪紀綱所繋選用之際必惟其人以爾質直端良䆳于經術燕朝賜對敷納詳明是用命爾往踐厥次惟既乃心察有司之不䖍以聞于朝副朕綜覈名實之意是為稱職爾其勉哉可宣徳郎新差權開封府祥符縣韓筠可監察御史制勑具官某朕綜覈名實考較在服而御史六察以分按有司為職非得其人夫豈輕授惟爾學術行義達于朕聞肆加襃揚俾踐厥次爾尚克既乃心糾正官邪以副朕訓迪之意朕將釐爾之成可不勉哉可朝請大夫朱維朝散大夫行大理正王㲄並可刑部郎中制勑具官某朕明慎用刑教民祇徳故刑官之選不以輕授爾等講聞憲令練達事為兹用寵嘉擢置郎省爾其體朕欽恤之意使情法兩得下無侵寃時乃稱職尚勉之哉可朝散郎新除司勲員外郎郭權可尚書司勲郎中制勑具官某自都官遷勲府職任為清以員外陞郎中品秩加峻朕之待爾亦已厚矣其益勵勉以稱所擢可吏部員外郎宋聖寵可右司員外郎制勑具官某朕惟尚書政本無所不總而左右司分贊省轄循名考實其選甚髙以爾服采銓曹休有譽處用加褒擢俾踐厥官尚既乃心副茲明陟可宣徳郎尚書庫部員外郎趙霆可工部員外郎制勑具官某起部掌營造繕葺之衆務為郎于茲葢以材選爾以夏官之屬引嫌自陳宜錫命書昜踐厥次往加勵勉稱朕意焉可都官員外郎郭權可司勲員外郎制勑具官某司勲掌羣吏之勲級凡有勞列于朝者委之論定資秩清優選授惟徳以爾久服事任能譽可嘉是用擢自都官俾踐厥次尚思敏于稱職朕將考爾之成可朝奉郎户部員外郎黄徳裕可戸部郎中制勑具官某朕循先帝之法視郎吏資任而進之今有司考爾閥閲法當甄陞其即本曹叙位厥正往加勵勉以稱茂恩可宣徳郎新差權發遣提舉兩浙西路學事路權可禮部員外郎制勑具官某朕惟禮樂學校之政令總于春官為郎于茲考擇尤甚以爾經術行誼夙有譽言宜錫命書擢踐厥次往加勵勉務稱所䝉可江西提刑何宗範可户部員外郎制勑具官某文昌六曹民部為劇郎選之重必惟材能汝比膺選掄往分使指率職有譽達于予聞惟茲望郎宜以命汝尚其勉勵克稱寵休可朝散郎尚書虞部員外郎蔡承可除主客員外郎制勑具官某惟爾服職省部閱嵗既多其自司虞昜兹典客凡諸蕃朝貢之事命爾總之宜務欽承毋或怠忽可朝奉郎都隨可都官員外郎宣徳郎王澤可膳部員外郎宣徳郎趙霆可庫部員外郎宣徳郎李康彦可職方員外郎制勑具官某等中臺諸司職總内外遴選郎吏必求端良爾等咸以望實之優達于朕聴賜對清燕敷奏可嘉蔽自朕心擢踐厥次惟爾克勤無怠協濟事功時乃稱秩尚加勉哉可朝奉郎陸偕可比部員外郎制勑具官某中臺諸郎司計為劇其職周知内外經費而審覆之非材術敏明未昜稱此惟爾學識行治達于朕聞賜對燕朝敷納可尚用加褒擢俾踐厥官爾其夙夜究心䖍共毋怠副朕綜覈名實之誠將釐爾成嗣有明陟可宣徳郎新除少府監丞李熈明可司封員外郎制勑具官某中臺諸郎考擇攸慎而司封掌邦之封爵時謂清曹必惟畯良乃允公論爾以材譽達于予聞賜對燕朝敷納有序宜服名命擢踐厥官往其欽承勉思所稱可朝奉郎黄徳裕可戸部郎官管勾右曹制勑具官某民部右曹所總為劇郎吏之選朝廷遴焉惟爾舊服事勞嘗擢華省以喪去位終制還朝宜錫命書俾踐厥次往承無斁務稱恩榮可承務郎前知婺州沈錫可吏部郎官制勑具官某中臺六官職總内外考厥官屬必求畯良惟爾材術之優嘗擢銓部宜還故職申錫命書往務欽承副予甄奬可承議郎著作佐郎陳噩可司勲郎官制勑具官某中臺六官職總内外考厥官屬必求畯良惟爾學識之優擢于東觀宜膺郎選處以名曹往務欽承副予甄奬可朝奉郎成都府路提舉常平王谷可户部郎官制勑具官某中臺六官職總内外考厥官屬必求畯良惟爾出分使軺能譽可尚宜膺郎選佐劇民曹往務欽承副予甄奬可承事郎守光禄寺丞張邦憲可宣義郎光禄寺丞制勑具官某爾父嘗與修書例有褒賞以恩囘授朕所嘉從進爾一官俾仍舊職無忘忠孝廼副寵榮可通直郎編具興復所㸃檢官徐閎中可衛尉寺丞制勑具官某九寺置丞皆以能選惟爾静而務敏宜踐厥官其服命書往贊司衛尚加勵勉務稱所䝉可承事郎邢京可司農寺丞制勑具官某今予命爾往丞司農凡倉儲委積之政令爾實佐之其加勉哉可承議郎吳翬可大理寺丞管江右治獄制勑具官某九寺之屬雖職任劇昜不同皆朝廷養材以備異時之用今予命爾往丞大理典治犴獄其勉之哉可承議郎郭瑗可大理寺丞制勑具官某諸寺置丞皆贊寺事而理官之屬職任為劇惟爾練達吏才宜膺茲選欽承予命益懋厥修可承議郎試殿中監鄭乆中可朝奉郎依前試殿中監制勑考績之政計其嵗月稽其功緒而後進之雖吾邇臣亦率是法具官某學識純正才猷敏明揚歴清華望實休顯有司㑹課茲惟典常宜進文階錫以明命往祇乃服務稱恩榮可給事中鄭久中可殿中監制勑朕追述先猷建中御府總六尚之政令職任親近必資端良具官某業履靖共學識純粹夙以望實揚歴要塗掌誥西垣詞知體要進陞瑣闥居多建明惟盾省汝昔嘗為之貳矣考慎厥長莫知汝宜往究乃心副朕循名責實之意尚加勉哉可宣徳郎守尚書司封員外郎王孝迪可殿中少監制勑具官某朕建中御府總六尚之政令而少監為之貳為官擇人任屬尤慎以爾學術行誼夙有令名聮職麟臺進備郎選靖共藴藉朕心所嘉用錫命書擢踐厥次往思報稱尚加勉旃可右正言盧航除殿中少監制勑具官某置監殿中總六尚之政令掌予御服任屬匪輕惟爾學術行能夙有聞望囘翔言路宣力為多宜服命書往貳厥事尚加勉勵以稱寵榮可起居郎劉炳可殿中少監制勑具官某置監殿中掌予服御職任親宻品秩優隆以爾學術文詞夙著時望操修端潔論議有餘宜自螭坳往貳厥事體予眷任其懋承之可朝請大夫都水使者梁子野可左中散大夫行都水使者制勑具官某名器之貴以示等威慶賞之優以觀勞列比縁新壘畢工寵進汝秩雖官有常格弗以序遷朕方褒善録勤非汝何遴往服新命圖稱所䝉可朝奉郎吳縝可朝散郎制勑具官某新壘告成稽其功次汝以外臺屬官嘗預供億進官一等其往欽承可進士李公衍可將仕郎制勑具官某宫省之臣出領使事惟爾謹恪往從其行併陳典御之恩乞以囘授錫茲命秩其克欽承可通直郎富紹榮可奉議郎制勑具官某朕建外宗正于别都其財用供億嘗命有司掌之今復茲廢官以汝舊膺推擇擢進品階俾踐厥次往服恩命尚其勉哉可將仕郎充詳定一司勑令所刪定官邢倚將仕郎充詳定一司勑令所刪定官曽詢並可宣徳郎差遣如故制勑具官某等士之選于吏部者朕必引見于廷親閲其行治勞列而後命之今朕就進爾秩俾仍舊服朕之待爾非常調比往其欽承勉思所稱可太史局保章正吕琦可太史局靈臺郎制勑具官某爾父推測有勞宜膺賞典許以囘授序進厥官往服寵恩無替厥藝可文林郎新羌州州學教授柯棐可辟廱錄制勑具官某爾名在甲科學行有譽比膺朕命掌教頖林進直辟廱益爾選擢往踐厥次尚加勉哉可西寧州教授歙州進士黄庭瞻可將仕郎樞宻院闗黄庭瞻吏部供到今年七月内奉聖旨西寧州蕃學措置就緒其蕃族子弟甚有能書漢字通誦孝經漸習論語皆知嚮方慕義化革獷俗所有蕃學教授黄庭瞻與假將仕郎以為訓誘不倦之勸本部取家狀未到未曽給付身奉聖旨黄庭瞻特與將仕郎仍疾速出給付身制勑具官某朕建蕃學于西寧既克就緒爾以進士預講授之選訓誘為勤今蕃族子弟能通書文誦習儒典嚮方慕義俗由化革雖朝廷聲教所暨爾預有勞宜錫官榮昭示勸奬欽承恩命尚其勉哉可通仕郎充詳定一司勑令所刪定官元時敏可特授宣徳郎差遣如故制勑具官某朕設局命官刋定有司之政令爾率職于此亦既閲時近臣建言并舉近例進爾禄秩往其欽承可宣義郎陳效可御史臺主簿制勑具官某憲府肅正朝綱肆于簿領之臣考擇惟賢以爾材實之美宜踐厥官錫茲命書往承無斁可承務郎梁楊祖可國子監主簿制勑具官某簿領之官以勾檢稽失為職凡材質可尚而未試于用者朕于此養成之今命爾于國子往其懋哉可朝散大夫徐申奉議郎宋彧可並大晟府樂令宣徳郎李遘將仕郎吳叔賢可並大晟府恊律郎制勑具官某等朕復大晟府名禮樂異職各迪有功以追治古之盛爾等咸以通于聲文擢踐厥屬欽承無怠嗣有寵嘉可皇叔慱州防禦使仲并可特授府州管内觀察使制勑朕永懐孝思念茲祖考推原所自褒顯近親豈惟示敦睦之恩亦以彰忠厚之化具官某列于屬籍夙奉内朝恪謹有常祇循憲度宜賜金書之寵進陞亷察之崇尚體眷勤克綏祉福可衛州防禦使仲􅔲可蔡州觀察使制勑具官某爾毋遺言祈恩子姓朕所矜允已詔有司而爾服喪于家既克終制宜加申命擢進厥官亷察大邦名秩滋顯務先恪謹迺稱寵休可皇姪右驍衛將軍有恭可正任觀察使制勑朕永念神考孝慈靡忘推恩天倫逮其子姓具官某性守淳懿謹恪夙成宜膺寵章擢進厥位大邦亷察名秩寖隆服茲命書克綏夀祉可宣政使金州觀察使李某可宣慶使依前金州觀察使制勑朕褒勵庻工恊濟萬務凡以勞列聞于朕者雖在疏逖賞不淹時矧宫省近臣克有勤績耳目所及其可弭忘具官某賦材敏眀迪已莊慎業履之美朕所眷知曩資其能總按戎器製作犀利工用不愆宜錫恩章昭示嘉奬宣慶置使品峻秩隆往其欽承勿替忠恪可延福宫使福州觀察使梁從政可觀察留後依前延福宫使制勑朕奉先追往孝思靡忘迺眷先帝之臣逮事潛邸寵陞位秩示不弭忘具官某稟資慈祥檢身勤毖踐揚事任積有譽言茲修謁欵之儀欲伸懐舊之感擢總留務錫以命書其益體于眷知克永綏于祉福可觀察使馮世寧可節度觀察留後制御批馮世寧已歴省試八年有餘檢身靖共端潔清亷左右恪勤公忠有補兼係哲宗朝攀附之臣宜加恩奬特與除節度觀察留後敕兩使隆名兼總留務秩優品峻授受匪輕具官某趣尚靖共持守毖宻公忠有補勤恪不愉攀附先朝克彰譽䖏服職内省八年于兹端潔清亷久而益勵用加奨擢以示寵榮往承朕恩無俟多訓可皇叔黔州觀察使知西京外宗正事仲忽可觀察留後制勅具官某任職之臣凡以勞列聞於朕者雖在疏逖賞不淹時矧邦族之親恩紀宜厚乎爾於屬為尊朕所眷遇比建外宗正於洛師命爾總之既克就緒宗子近善罔不肅戢雖朝廷教養之備爾預有勞宜錫恩章特蠲常格擢陞留後以示褒崇往服命書勿替恪恭可福州管内觀察使鄭紳可除安徳節度觀察留後制勅朕膺祜於天宫闈嗣慶推恩外屬兹有典常具官某仁厚温恭世載令徳是生内輔位冠四妃宜因莞寢之祥申錫命書之寵兩使留務品峻秩隆為擇大邦併示優奬往其欽佩益介繁祉可明州觀察使陳永成可節度觀察留後制勅朕富有萬邦親養靡逮迺眷舅氏如母之存申錫命書以示褒寵具官某宅心端靜毓徳粹和欽慈之兄朕所優禮渭陽之感夙夜不忘宜益峻於恩章俾進陞於留務往其欽佩豈假訓言可權發遣河北路轉運副使王博聞可轉一官陞充轉運使制勅具官某惟爾材力之優奉使朔部供億新壘役不愆期考諸事功又加辦集將命若此朕心所嘉宜正使名仍遷位秩倂推恩典以示眷懷往其欽承無替爾守可朝散郎河北轉運副使康位可集賢殿修撰河北轉運使制勅具官某河北被邊帶河將漕於兹任屬攸重惟爾自膺臨遣勤恪不渝職業交修達於朕聴宜加寵命擢進使名仍陞書殿之華益峻外臺之寄往思所稱尚觀爾能可左朝議大夫提舉西京崇福宫宋喬年可依前京畿轉運使制勅具官某京畿將漕之臣權任視他路為重朕於用人考擇攸慎以爾性資純明材力强濟曩膺臨遣風望甚優宜解琳宫俾還舊服體兹申命無替前勞可熙河蘭湟路計度轉運使降授朝請郎充集賢殿修撰洪中孚可顯謨閣待制本路都轉運使制勅西清次對資望高華選惟賢能夫豈輕授具官某夙以材術揚歴外臺敏於赴功往克稱職比因奏計灼見恪勤蔽自朕心擢參從槖仍遷都漕俾峻使權其體眷知愈加懋勉可户部員外郎呉擇仁可發運使制勅具官某發運置使㑹東轉輸以助經費其任可謂重矣惟爾出按邊郡入踐民曹宜知邦國調度之詳是用選於在庭擢總六路爾其夙夜究心圖以効實稱予寵命尚加勉哉可刑部侍郎曽孝藴可顯謨閣待制發運使制勅具官某夙膺選掄寖更要劇貳予憲部亦既閱時惟六部轉輸爾嘗總領其加申命寵以使權次對西清時惟舊職往圖効實尚肩乃心可朝散郎淮南運副張勵可兩浙運副制勅具官某吳越俗阜事繁朕思得良使者往率列城究宣恩施惟爾比膺臨遣將漕淮壖刺舉之能見於已試易兹劇部朕所選掄尚其懋承毋或怠忽以稱朕命可
