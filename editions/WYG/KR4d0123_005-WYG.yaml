body:
  text: 摛文堂集巻五宋慕容彦逢撰制龍圖閣學士左中􅄆大夫新差知太原府陶節夫可知江寧府制勑一路㑹府總轄庻邦任兼兵民必擇資望具官某易帥全晉既錫命書睠兹建康望冠左右與予共治汝往惟宜聫職西清實長卿部往懋治行以稱寵榮可左朝議大夫直龍圖閣權發遣慶州錢昻可權發遣延安府制勑具官某髙奴右地控制羌戎師帥之臣考擇尤慎惟爾材資開爽風力精彊擢守慶陽聲績兼茂就更閫寄益賴壯猷往圖膚公以稱朕命可龍圖閣直學士知太原府鍾傅可知延安府制勑朕推擇時才付以戎閫撫循經制委任匪輕具官某夙膺超除揚厯方靣聲績之茂朕維汝嘉延安大邦控制西鄙謀帥尤慎僉曰汝宜往勵壯猷以稱朕命可新知青州胡宗囘可知開徳府制勑澶淵重鎮初錫府名師帥之臣考擇尤慎具官某器識恢閎踐歴邊要命守青社詔墨尚新揣材之宜易兹北輔往宣恩施以輔士民祗服訓言愈加勉勵可兵部侍郎王漢之可顯謨閣直學士知成都府制勑坤維大邦外控蠻徼師帥之重輟予侍臣具官某夙以選掄揚歴要路召貳兵部亦既閲時宜直禁塗往紆華紱無謂蜀逺務悉乃心綏寧厥民尚觀報政可朝􅄆大夫試尚書户部侍郎徐彦孚可顯謨閣直學士知太原府制勑朕輟中臺貳卿出領方靣兵民所寄眷任匪輕具官某夙以才猷揚歴華要比還民部亦既閲時廼睠全晉之雄為國屏翰總䕶諸將務壯中權選於在廷爾往惟允仍陞禁直式遄其行尚懋爾忠勿替朕命可龍圖閣學士知延安府陶節夫可知太原府制勑朕輟中臺貳卿出領方靣兵民所寄眷任匪輕具官某夙膺襃除揚歴事任出殿西鄙閲日既多全晉之雄為國屏翰布宣威徳往維汝諧其逺乃猷以稱朕命可工部尚書兼侍讀錢適可樞宻直學士知潁昌府制勑朕輟華近之臣付以蕃宣之任中外雖異待遇維均具官某曩自中司長予起部進陪經幄亦既閲時潁川大邦自昔優寄其以樞直往臨彼民朕修先帝遺意制作法度布之四方惟悉心推行俾徳澤下究於民廼有譽處汝其勉哉可劉仲武特轉四方館使遥郡刺史升權本路鈐轄潘逢特轉東上閤門使依舊遥郡刺史制勅具官某等朕丕承先志疆理西陲慎擇忠勇之臣分總師旅以備討擊爾等乘機决戰挫賊鋭鋒斬䤋既多羣醜奔潰捷奏將上朕用嘉之爰次厥功第加褒擢益思奮勵嗣有寵休可入内皇城使忠州刺史任珪可遥郡團練使入内皇城使梁昭慶可遥郡刺史制勅具官某等朕賴帝錫羡弓韣告祥祗奉之臣宜均慶澤爾等禀資謹恪涖職専勤録其事勞與兹恩命或進陞於使秩或兼領於郡符祗服邦榮益思報稱可入内洛苑使某人可化州刺史依舊洛苑使制勅具官某朕操慶賞之柄以襃勵庻臣稽其事勞未甞輕授惟爾服在禁省久著恪勤累膺選掄往使邊圉條奏利害悉有建明宜錫恩章俾領郡紱體兹優奬無怠欽承可青貴裕勒葉與皇城使遥郡刺史制勅具官某惟爾驍勇之勤著於族部奮身效順朕心所嘉正使隆名加以郡紱錫兹恩典以示襃榮往其欽承勿忘報稱可皇姪右武衛大將軍有常可依前右武衛大將軍遥郡刺史制勅具官某朕追懐天倫推恩子姪惟爾生而粹美性質可嘉宜膺寵章擢陞品秩其自環衛遥領郡符往服命書益綏祉福可兩朝佑聖太夫人姪和州防禦使張維周可觀察使西上閤門使張維國可遥郡刺史制勅具官某等宅心仁厚毓徳粹和服寵益莊休有譽處宜陞位秩併示褒崇或自禦侮而陞亷車或以華問而紆郡紱兄弟聫進同錫命書是為顯榮往其欽佩可皇城使張大中可遥郡刺史制勅具官某惟爾率職邊陲克著勞列逮兹閲試宜有褒嘉郡紱之華俾爾兼領服兹茂渥尚加勉旃可西京左蔵庫使張得臣可文思使遥郡刺史制勅具官某爵禄等差時乃公噐校功第賞惟以勸能爾頃由選掄往涖戎械工用不爽宣力為多宜錫恩章以示甄奬擢陞厥位仍領郡符其克欽承益思報稱可左蔵庫副使魯瓊可文思使遥郡刺史制勅具官某惟爾英祖舊臣逮事潜邸兹因謁欵有惻朕心用錫恩章擢進爾位往其欽佩務保寵榮可青貴倫正結轉遥郡刺史制勅具官某惟爾事上忠精臨敵驍勇勲績之茂朕心所嘉宜錫恩章寵以郡紱往其祗服朕不弭忘可皇城使全惟㡬可遥郡刺史制勅具官某陵臺置使所繋匪輕逮其終更法有襃賞用遷位等以懋爾勞往服恩章益思報稱可崇儀使提舉河東路保甲兼提㸃刑獄何權可遥郡刺史制勅具官某朕眷遇武列擢領郡章資望之優所蒞増重惟爾夙以推擇久服事勞奉使晉郊肇膺臨遣錫兹恩命昭示寵嘉體予異恩勉思報稱可西京左蔵庫使新差髙陽關路走馬承受公事鄭子竒可遥郡刺史制勅具官某惟爾奉事潜邸勤毖可稱朕不弭忘錫兹寵命往加勵勉以稱恩榮可右監門衛大將軍士雋可依前右監門衛大將軍資州刺史制勅某朕嘉宗室能以惇睦保其富貴宗正上應遷者吾每有以襃寵之今兹爾由門衛之列陞摠郡符班著増峻而稍廪有加非虚名也往欽厥㫖無替前修可皇弟右監門衛大將軍叔董可依前大將軍蘭州刺史制勅某持節以䕶方州列第四奉朝請可謂榮貴矣以爾久叅環衛修飭有聞膺此寵遷無替厥服可皇城使帯御噐械凌文昞可依前皇城使康州刺史差遣如故制勅具官某爾擢自神考從軍逺方克懋忠勤綽有實効録其嵗閲爰錫寵章刺舉隆名選授維慎今以命爾往欽念哉可左蔵庫副使劉承緒可禮賔使充嘉州刺史制勅某爾以肺腑之親叅侍帷幄稽勞閲嵗宜有褒遷矧建安先帝同氣宗女之貴今莫盛焉顧厥夫家宜均慶澤正聫内使遥綰州符是曰異恩其思報稱可皇城使鄜延路都監耿端彦特除遥郡刺史制勅具官某羌首内附爾有顯勞效職若兹惟朕以懌特加褒進遥刺郡城祗服命書益思忠報可王端復集賢殿修撰差知廣州制勅具官某朕賴天鑒臨中外康靖嘉與臣庻道迎休祥爰因改元之初特施作解之澤惟爾曩擢帥閫聫職從班坐廢閲時更兹恩宥宜加甄叙錫以左符畨禺大邦作屏南土参華書殿以寵其行尚克懋承無忘報稱可故朝奉郎直龍圖閣游師雄可特贈集賢殿修撰制勅具官某守正之臣國是允賴雖其淪謝朕不弭忘以爾元祐之初抗論邊事力沮棄地之議獨全享上之忠乃至生獲大酋威震强敵權臣排抑賞不酬勞書殿華資特推贈典仍官一子俾世厥家尚其有知服我休寵可淮南江浙發運使劉何可集賢殿修撰差遣依舊制勅具官某中外任軄之臣凡以勞列聞於朕者必序其勤而賞之故悦於見知人用胥勸惟爾將漕六路趣辦不愆奏計燕朝嵗額増羡宜陞華於書殿俾益峻於使權往服恩章愈加勵勉可朝􅄆郎河東經畧司管勾機宜文字李成允可陜西轉運判官制勅具官某諸部要劇莫如陜郊將漕之臣臨遣尤慎惟爾甞從戎幕詳練事為寵以使軺宜克稱職往加勵勉尚觀爾能可宣徳郎新除大理寺主簿王萬可京畿轉運判官填創置闕制勅具官某京輔轉輸視他路為劇比降詔㫖増遣使軺俾貳厥事爾以推擇預兹新命豈不榮哉往悉乃心務底功實千里非逺民言日聞朕得以考焉可新湖北路轉運判官劉損可江東路轉運判官相度湖南北路採木初爕可湖北路轉運判官制勅具官某等朕以良法美意加惠四方推行未淹已著成效部使者惟克遵奉察吏之䖍時乃稱職汝材力有餘久更事任選於在列往佐外臺汝其思朕所以臨遣之意毋以便文僥倖朕將觀汝之能而以寵榮加焉汝其勉哉可户部員外郎周紳可淮南轉運判官制勅具官某朕緝熈法度布之四方部使者唯逹於朝廷思意志慮乃克稱職爾比以材選為郎劇曹長淮之南往分使指爾其遵奉詔令察吏之不䖍俾惠澤下究以副朕命尚其勉哉可通判乾寧軍晏㡬道可開封府推官制勅具官某開封府浩穰任兼三輔往佐府事必惟材能以爾更練事為積有聞譽選於在列俾踐厥官毋忘恪恭以佇明陟可朝請郎刑曹叅軍潘逈可開封府右司録承議郎開封府叅軍王叔堪可士曹叅軍宣徳郎開封府叅軍張仲綱可兵曹叅軍朝奉郎開封府叅軍張摠可工曹叅軍制勅具官某等開封典治京師事任為劇比復舊制備建屬官而爾等咸以薦揚逹於朕聴往踐厥次務底功實稱朕意焉可潘羅溪除忠州刺史充湟州管界蕃部都廵檢制勅具官某爾天資武勇雄於邈川效欵元符甞加命秩中遭棄外識節不玭國而忘家兹復來附宜優奬擢以勵逺臣領刺名邦俾察蕃部無忘忠報嗣有寵嘉可錫伯中族大首領隆戬補皇城副使帯本族廵檢錫伯上族大首領嘉勒斡補皇城副使帯本族廵檢錫黙族大首領倫珠卜補左藏庫副使帯本族廵檢制勅具官某某等爾等驍勇之資雄於種族輸忠内附志節可嘉宜錫官榮兼領廵邏往圖報稱嗣有恩章可崇儀使何灌可就差提舉河東路保甲兼提㸃刑獄制勅具官某爾進由武列材美可嘉賜對燕朝敷納有序河東要郡擢領使華按予民兵兼糾庻獄資其宣力事任匪輕往懋乃功以稱推擇可崇儀使威州刺史提舉河東路保甲兼提㸃刑獄何灌可除西上閤門使依舊遥郡刺史差髙陽關路兵馬鈐轄兼知滄州制勅具官某朕惟名噐之重不以假人凡爵禄之馭羣臣必計其嵗月攷其功緒然後授之耳比分使指於其陛辭之初寵以郡章賛書方下又擢守景城陞華上閤旬日間三錫恩命朕之待爾豈羣臣比哉爾其夙夜激厲圖以効實稱朕不次之舉可朝請郎同管勾成都府等路茶事兼提舉陜西等路買馬公事龎寅孫可依前官除直祕閣差遣依舊制勅具官某爾以材力之優往按茶事收息饒羡勞列可嘉芸閣寵名選授惟慎増華使指為爾之榮往其欽承益圖効實可翰林書藝局藝學李倚可翰林書藝局直長充待詔制勅具官某惟爾服勤藝學以甄陞叙遷資示恩其加勵勉可翰林書藝局藝學呉端可翰林書藝局硾紙待詔制勅具官某九鼎告成當推慶賞與兹恩典於爾為榮執技翰林無替勤恪可祗候孟懐乂轉猫邊花待詔制勅具官某餼禀稱事以勸百工汝執技尚方服榮靡懈宜加叙進為汝寵榮往承新恩益勵後效可從事郎新除太學博士郭敦實可依前試辟雍博士制勅具官某朕親御翰墨刋定學制付之有司以教飬多士爾於此以問學行義預辟雍之選豈不榮哉往踐厥官朕將考汝之成而進寵之可不勉與可從事郎權辟廱正陳詢可辟廱博士制勅具官某爾經術行能夙著聞譽曩膺考擇掌教頖林行法究心克有成效終更還闕權職辟廱論議純明多士推尚博士之選爾往為宜其逺乃猷尚多後祉可將仕郎試辟廱録陳汝錫可辟廱博士制勅具官某博士以經術訓廸多士盖周官師儒之選也惟爾服在學校休有譽言宜膺命書進踐厥次往加勵勉稱朕意焉可儒林郎裴宗元可醫學博士制勅具官某朕因能任使各當其宜訓醫之官肆以命爾往加懋勉務稱恩章可尚醖奉御馮澤可改差充尚食奉御制勅具官某六尚奉御之臣職任親近選於左服必求端良惟爾敏濟恪勤見於已試掌予膳品宜稱厥官往其欽承以佇褒陟可延福宫使奉國軍節度觀察留後郝隨可依舊知入内内侍省事制勅朕於左右近臣任無重輕必惟審擇矧禁省之長冠於内司典領至隆擢授宜遴具官某材資敏濟心術䟽通陳力宫廷積有勞勩朕用眷録召復舊班惟三代盛時侍御之選罔非正人出入起居資其承弼今朕命爾總䕶厥官期紹前修無俾専美可入内内侍省皇城副使呉徳仁可依前入内内侍省皇城副使充殿中省尚舍奉御制勅具官某六尚奉御事任親宻必擇勤恪敏給之臣今予命汝往踐厥次凡幄帟供張汝其掌之宜悉乃心以稱朕意可中書省額外守闕主事魏伯誠可西頭供奉官出職制勅具官某爾祗事省垣閲嵗云久錫以命秩俾服官常是為寵恩往承無怠可西頭供奉官錢景振可依前西頭供奉官閤門祗候制勅具官某祗奉上閤武列為華惟爾舊膺選掄追今十稔宜加兼職進服事勞往務欽承勉圖效實可左班殿直黄􅈯可依前官兼閤門祗候制勅具官某上閤祗奉實贊朝儀惟爾擢自右銓預兹榮選往思所稱無替恪勤可西頭供奉官夏大中可特授宣徳郎制勅具官某爾惟務學不懈逹於朕聞召試西垣辭理可採宜膺名命優易文階往服茂恩務先忠恪可通仕郎撰厯所恭議官謝中美可宣徳郎制勅具官某汝進由經術典教頖林而博綜多聞明於象數刋定厯紀閲嵗有勞薦章以聞并舉近例命汝禄秩往惟欽哉可右侍禁徐位可特授西頭供奉官大將杜觀可特授三班奉職制勅具官某等姦民犯法罪孽必誅爾等告捕有勞宜加賞激往服恩命無替忠勤可故三班奉職梁權兄髦可三班奉職制勅具官某惟汝天倫死於金革宜推恩典優䘏厥家用錫官鈐汝其祗服可開封府職級李湍可奉職開封府額内守闕府典事于士明可借職制勅具官某等軍噐建局爾與有勞錫兹官榮往其祗服可三班借職孫宷可三班奉職制勅具官某爾諳練獄事推鞫有勞擢進一官以示嘉奨欽予時命尚加勉旃可故如京副使石福男堅可三班奉職姪男珪保姪孫成可並特授三班借職制勅具官某死事之臣朕所閔惻肆推恩典以䘏其家命爾官榮往思報稱可將仕郎侯叔可左班殿直制勅具官某爾捕獲强冦功次可嘉擢寘武班時乃懋賞往祗乃服以稱朕恩可都水監署押官李士定可右班殿直制勅具官某爾以年勞應格朕又録其祗奉之勤併錫恩典擢兹命秩其往欽承可奉職楊逢原可右班殿直制勅具官某爾父率職不懈以勞當遷乞移恩章屬於子姪進官一等爾其欽承可將仕郎趙逵可特授左班殿直制勅具官某爾獲强冦勞烈可嘉易進武階昭示甄奬往加恪慎以稱茂恩可招箭班姚永寧可補右班殿直制勅具官某爾服事勤勞宜有甄録其蠲夫籍進序官聫往務亷勤以需選擢可辰州漵浦縣百姓黄順特與右班殿直制勅某蠢彼山猺既克討蕩執訊獲醜汝預有勞帥臣以聞宜加奬激寵汝命秩往其欽承可涇州廣鋭第三十一指揮都虞候李吉秦鳳路嵌補廣鋭都虞候齊貴可並特授左侍禁制勅具官某爾久服戎行積有勞勩帥司條奏宜易前班命爾官榮往其懋焉可王材因殺逆賊王闢郭希賊馬立功授進義校尉制勅爾頃以捕賊有功應賞申錫書命祗服官榮可左班殿直侯舜賢可右侍禁制勅具官某宫闈進對厥有恩數乞遷爾秩朕豈不從錫兹命書往維欽服可三班奉職韓武可右侍禁制勅具官某死事之孤朕所閔恤肆推優典超進厥官往其欽承無忘忠孝可左班殿直張琰可右侍禁制勅具官某朕既寳藏宸集推賞使臣爾奉行文書亦有勞勩進官一等往其欽承可齊勒巴族東頭供奉官本族廵檢阿瓊男倫布與右班殿直制勅具官某男爾父奮武戎行委身徇國有司具奏悼念不忘録爾以官往惟秪服可畫學録張晞顔可將仕郎依前畫學録御批進過花果三十品筆法頗有可取制勅具官某惟汝巧於丹青筆法可取宜加甄奬用錫官榮往承朕恩益精厥藝可内殿崇班張永年可特授内殿承制制勅具官某爾殺獲㐫醜勞効可稱宜錫恩章以示嘉奬進官一等往其欽承可故秦國夫人林氏孫閤門祗候李克忠可内殿承制制勅某仕縁恩閥籍在禁閽予哀保母之終且有緒孫之託宜進承於殿制益視峻於朝聫當務欽修思荷褒寵可右班殿直梁誼可依前右班殿直閤門祗候制勅具官某朕念爾父被遇先朝服勤邊陲聲績兼茂宜推恩典寵録其孤聫職閤門選授攸慎今以命爾維以勸忠往務欽承無替厥紹可右班殿直閤門看班祗候同提㸃承受張士文可閤門祗候制勅具官某惟爾事朕潜宫謹恪可尚宜加甄奬示不弭忘往服命書益思所稱可借職閤門祗候鄭綬鄭絳可並右班借職依前閤門祗候制勅具官某等朕仰膺帝祉莞寢告祥推恩外家兹有彞制爾等列於戚屬勤毖可嘉宜服命書序陞品秩往其欽佩務稱寵榮可内殿承制郝琳御批故殿前都指揮使郝質孫男琳為係勲臣之後可特與閤門祗候制勅具官某惟乃祖昔侍殿陛為國勲臣肆加表揚録其世類祗事上閤汝往欽哉可右侍禁劉閎可閤門祗候制勅具官某爾右選小臣而姓名逹於朕聴擢廵邊徼寵以職名於爾之所遇可謂榮矣毋替忠勤尚多後祉可西頭供奉官焦大祐可除閤門祗候制勅具官某朕永懐欽慈眷優外屬爾其陳出宜與恩章宸閤華資選授惟慎今以命爾其懋承之可左班殿直閤門看班祗候劉敏可依前官閤門祗候制勅具官某惟爾祗班宸閤勤毖不愆宜錫寵章擢進厥序仍蠲常直以示褒優體予異恩勿忘報稱可東頭供奉官汪慈明可閤門祗候令再任制勅具官某爾執勤疆埸久著勞能論薦交章逹於朕聴宜加奬擢率勵逺臣錫以榮名寵之舊服往承新命無替厥忠可閤門看班祗候夏大中曹晞賈詵潘臨任尚賢吉希孟可各轉一官並罷閤門看班祗候制勅具官某等閤門員多慢於祗事汝宜罷遣尚進厥官往服命書勉圖自效可轄木沁扎實錫喇卜䇿進奉人大首領都軍主奔巴凌阿衮轉軍都指揮使小首領三人節斡存温伯竒軍主制勅具官某等爾等奉其方物來貢闕廷載考乃成宜有褒賞特加遷叙往惟欽承可楊晟男進果與補右侍禁進穏與補三班奉職制勅具官某男某等爾父納地效順既服寵於朝又獻山林之材以祈恩於子朕念其誠恪享上嘉從其言錫爾官榮往祗惟服可虎翼左第二軍都指揮使徳州刺史楊吉可除左領軍衞將軍致仕制勅具官某爾執勤公家積有勞列以年歸老宜錫恩章環衞隆名昭示褒寵往錫壽祉克享厥榮可四方館使康州防禦使荆湖北路兵馬鈐轄黄忱可引進使依舊遥郡防禦使致仕制勅具官某爾効順熈寧累著勞績今其告老宜有褒優禦侮隆名寵之舊秩仍遷使額以榮其歸體予異恩往綏福祉可
