body:
  text: 摛文堂集巻十五宋慕容彦逢撰墓誌朝奉大夫致仕驍騎尉賜緋魚袋石公墓誌銘越之新昌石氏考諸譜錄蓋萬石君之後也石氏初徙新昌㷀然一身而子孫蕃延自咸平以來繼以文辭行誼起家於今宦學愈盛歲時歸謁章綬相耀宗屬數十百人絃誦洋洋貢於鄉選於學射策於廷曾靡虚籍以故為東南望族公諱景衡字叔平新昌人也曾祖渥隱居不仕祖待舉祕書丞累贈朝散大夫父衍之大理寺丞累贈中大夫公幼有俊譽長益䆳於學儀狀端穆進趨翼如也神宗皇帝初以經術造士公試太學數中優等嘗詣丞相王文公特見器重謂中大夫曰石氏名家信不乏人中熙寧六年進士第調台州天台尉海濱多剽攘民以為病公設方略逆制之亡敢竊發方歲大饑流寓屬於境賴公賑卹以全者不可勝計移和州烏江令公材力精健奮厲自彊察蠧弊根穴必去之吏雖猾亡以為也士族有倚勢凌民既奪之産反以搆訟有司觀望不決使者諉公公不為勢撓歸産於民兩造咸服時詔諸路議免役法公於淮西多所裁定入見改宣德郎知福州長溪縣長溪廣袤千里民事劇甚令率以罪去公至若無足治者部使者以積欠繩下輸限峻迫追究煩擾公詣郡白狀請俟中覆迺行使者聞之怒將中公以法會察訪使至以閣欠不當治他縣悉被劾使者始媿謝境有彊寇公親捕獲之賞中優格公曰為民除害令職也殺人以幸遷予誠何心哉卒平反之寇以減死論公之所存蓋如此居官五年民繪像以祠之當路交章以治最聞衆冀拔擢公曰吾母老矣豈貪仕進時必求所以便親養者遂監楚州糧料院公雖處閒局而郡有疑難事輒藉公參決他郡守下吏獄久不具本路以詔旨選公覆按公原情定罪得輕重之中被訊者自以不寃也秩滿丁外艱服除通判秀州未幾轉運司表充管勾文字此官久廢文牘猥積公為條目區别之一路財賦出納迺至牒訴纎悉如視諸掌使者不勞以治就遷通判常州丁内艱不赴服除通判歙州下車奠謁廟學顧牆宇庳陋慨然以身董役闢而新之識者謂公為政知所先矣嘗攝郡事獄有淹繫百餘遇暑多斃公既閱實歎曰論罪皆當笞耳何至是耶立辨出之頃之以疾得謝杜門里居一室蕭然宴坐終日見者咸悚伏焉公晚聞内典益進此道視窮達死生不以置欣戚畏慕於心故於進也恬於退也勇緜歴三紀位不過佐郡而年未六十遽乞身以歸自屬疾却醫不問預治斂具為書戒諸子一夕命盥沐既畢而逝實崇寧三年九月九日享年五十有八以四年九月庚申葬於新昌蘭峴山之原公官至朝奉大夫勲至驍騎尉以元符元年郊恩賜五品服娶虞氏故集賢校理諸王府侍講太熙之女封永安縣君子二人公弼以䕃補太廟齋郎公望舉進士女二人長適承務郎簽書池州判官韋夀卿次適進士張垂有文十卷詩二十卷曰南明集公葬之明年予初免喪未親筆硯而公弼來速銘予弟叔畸公之從女夫也數夢公具衣冠請銘於予語極諄切予聞愴然為序而銘之嗚呼公雖亡有不亡者存若公孝於親友於兄弟施于有政蓋古所謂躬行君子者公弼公望爽邁不羣人知公之有後以為積善之報云銘曰顯矣石氏初自衞卿衞卿維碏國之純臣駘仲繼出時亦衞族得嗣以龜喪不珮玉族逺而徙散處四方奢奮苞鑒聲烈相望新昌之別實維近世譜録綿延萬石之裔儀儀大夫色莊以温孝悌忠信有學有文施於為政恭寛敏惠談笑指麾民嬉吏畏飛不盡翰孰使之然秩祿豈多謝不待年曰維小臣匪私於佚負薪之憂義辭以疾疾不訊醫亡不怛化迺如之人奚往不暇維慶之詒既克有子天之報施故將在此朝奉郎致仕武騎尉賜緋魚袋葛公墓誌銘崇寧三年十有一月己亥朝奉郎致仕賜緋魚袋葛公終於京師諸孤䕶喪歸常之江隂將以五年十月某甲子葬於青𤾉鄉郭里之原卜既吉迺敘公世次行治泣來請銘某公之子婿也知公本末該盡宜無愧於辭謹拜手泣為之序曰葛之先嬴姓夏后分封以國為氏唐天祐中公之六世祖濤自廣陵南徙初有籍於江隂濤再世生詳詳生惟甫累贈吏部尚書尚書生密中慶厯進士第有高行卒官承議郎累贈朝請大夫為公之皇考大夫娶胡氏贈建德縣太君繼室陳氏懐仁縣太君公胡出也諱書思字進叔學識恩性在孺有聞既長博考羣經旁搜百家之說世父兵部尚書宫語大夫曰是子名第不足言後將以文義顯嘉祐中試開封府王文公為考官得公事道論稱之再試為陳公襄所知擢第三一時羣進士歆慕誦公之文自以得所矜式諸公要人交口贊譽聲聞藉藉傳四方中熙寧六年進士調睦州建德縣主簿時大夫既得謝里居公不忍違去投劾侍養十餘年晨暮在側意有所鄉輒逆得之夜暴雷雨亟起問安退不敢寐凡食飲藥劑迺至服用纎悉必躬省之大臣有嘉公志節者表學官弗就居久之大夫勉公仕且樂從之行始以吉州司户參軍監湖州新市務公喜祿釜逮親顔色自得不知關市之卑期年大夫䘚孺慕以泣哀動行路尋得臂疾或告有疾食肉五十不致毁禮也宜稍進肴味弗聽終制如始喪者服闋累年迺調開封府封邱縣主簿移和州防禦推官知楚州連山縣丞公悃愊無華事必逺慮不以便文自幸歴佐兩邑令荷以治歲葘按田蠲貸以實無所顧望數令他邑及決旁郡滯訟皆以能稱淮南議穿支家渠沮和相半計司諉公公條上便宜與所當經畫者渠成人以公為有賜也入見改宣徳郎故事當任親民公委資考求閒局里中遂監常州酒遷奉議郎上即位遷承議郎加武騎尉賜五品服差知婺州永康縣不赴改監秀州鹽稅務課羨中賞格匿不自列會序遷朝奉郎歎曰吾任事之日淺褒贈及親賞延於子君恩厚矣尚何求遂致仕公宇量奥廣恥自表暴仕不遇合回旋筦庫晏如也所至以安遇名軒自號虚遊子居官無秋毫墨染其所用舉者常沛然溢格性謙畏惟恐忤物至持法守正雖大吏欲干以私辭氣不奪馭下寡譴罰冀以至誠格物然人自不能欺也公田歲入輒推予民在家無聲色玩好齋莊愼獨不愧屋漏遇人無疏戚惟謹尺牘必楷片言必信卹孤賑乏惄如己私大夫沒後追慕白首不替常以所告戒者自警語及之必嗚咽流涕新未薦不敢嘗歲時怵惕如見所祭昆弟若從子孫内外千指公處尊卑間友愛惇篤無不順適諸妹擇命士之賢者歸之問撫饋餉戀戀靡懈善教子言諭而身率之以故諸子秀拔有立俱為清議所重而次仲勝仲遂為同年進士鄉閈歸美焉自居大夫喪日課内典黙契於心晚益喜持誦既屬疾神檢不亂時勝仲以太學官迎養能致國醫公不聽顧告以死生常理遺書戒毋侈葬疾七日而逝享年七十三娶侍其氏右正議大夫泳之女克有閨範是儷是相先公十四年䘚贈北海縣君子次仲通仕郎吉州州學教授儀仲早䘚和仲將仕郎勝仲試太學正女長適某次適侍其鍔次適張漴孫男九人立隆立方立悌立中立大立師立器立象立受孫女五人有文十卷號安遇集覽者以是服公之所養也銘曰葆醇履坦睟然慈良有如葛公南方之强公初筮仕舒華煒煌友生愕眡疇敢比望事違願始以退為常玉韞亦潤蘭幽自芳循陔之感白首不忘奉盈之戒燕居益莊維此卓行千古有光行成名立位卑奚傷晚通朝著寵有身章引年歸老既夀而康儀儀子姓命服在傍天之報施於焉孔彰謂公云歿不朽者良納銘幽竁萬世之藏孫氏墓誌銘奉議郎知貴州軍州事贈朝請郎邵公潛之夫人孫氏父曰秉陽蓋常州宜興人夫人恩性淳至幼讀書至父母之年以喜以懼輒俛首揮涕或問之對曰言中吾心是以感而泣也親有疾夙夜侍左右寢食俱廢居喪水不濡唇者累日歲時致享泣薦所嗜既歸邵氏舅姑猶在長幼千指夫人上承下拊罔不歎韙臨財辭豐取薄不為苟得姻戚有患難衆所畏忌弗顧夫人必往賙急賑匱若己有之善教子幼課以讀書長誨以行己自熙寧以經術造士夫人之四子相繼擢進士第長曰材薦開封第一為元豐御史歴銓部學省出長大邦入位少列崇寧四年上追懐之贈典優異次曰梂試有司亦中選首曰梃曰榑皆有聲於太學而榑廷試高等鄉閈言教子者以邵氏為能夫人自中年不事脂澤與朝請公同受籙於龍虎山道服誦經事觀音像甚勤嘗苦臂疾夢白衣女人按穴刺之出白氣丈餘翌日乃瘳將終神鑒不亂召諸孫至前遺以奩中物從容飲歠而逝時居襄之官舍實崇寧五年十月二十五日享年七十有六以大觀二年十二月二十有七日附於邑西大蘆山朝請公之墓夫人初封仁夀縣君改封夀昌又改仁夀縣太君材官至朝奉大夫贈右諫議大夫梂承議郎魏王宫大小學教授梃瀛州防禦推官知河南府潁陽縣事榑從事郎襄州錄事參軍一女適登仕郎桂州茘浦縣令曾繹材梂梃及女皆先夫人䘚孫十有四人曰勲曰然曰熊曰熹曰藨曰譙曰㸃曰羔曰緯曰緝曰紳曰縡曰絳曰縪勲熊皆將仕郎餘未仕孫女七人曾孫六人曾孫女四人銘曰君山之下兮荆溪之濱山秀溪深兮卜祔惟寧體魄雖瘞兮魂氣則升降祉於家兮蘭玉在庭疏封未艾兮沒有餘榮謂予不信兮來監兹銘陳君墓誌銘君諱思齊字景賢饒之鄱陽人曾祖某祖某皆不仕父某三班奉職君幼聰警誦書一再過不忘三班君異之既長以家難廢學慨然投筆歎曰藝文致身夫豈不願晦迹方劑亦仁術也乃以醫技翺翔江湖間悅常之宜興山水清麗遂家焉君診治按古雖疾沈痼他醫未能治至君指日決愈遇求療者心惴惴焉如己苦之有貧不自給復賑以薪菽賴是全活者甚衆宜興士族盛君從薦紳遊罔不歎韙性喜酒選勝引滿笑談自得見者欲傾家釀也自以學不遂力教諸子夜坐燭下身率之不三鼓不寢聞四方賢君子俾從之學故阜成少有士譽未壯中第邑人善教子者以君為能元祐八年八月辛酉終享年六十有二以紹聖元年十有二月某日葬於邑西某鄉之原娶高氏生四子曰存曰阜成授廬州舒城縣尉曰敏成曰彦成皆應進士舉一女適唐原本缺孫男三人季長季升季友孫女四人阜成予友也泣以銘請義不可辭銘曰善必有慶孰云嗇之命邪非邪我儀圖之弗嬴於躬必昌厥嗣丹桂一枝本根有自惟影惟響報施如之誰疑弗信監此銘詩單君墓誌銘君諱照字擇之婺州金華縣人喜誦習衆謂明晤凡隂陽卜筮方術之學無所不曉事寡嫂如事母至老不懈家貧無兼日之儲有子皆使就學紹聖初知微貢於鄉為第一中進士科崇寧三年擢温州州學教授鄉里善教子者以君為能四年某月某日以疾終於温之官舍享年五十有九以大觀元年十月某日葬於邑東某原娶某氏子四人知微通仕郎知彰知柔知剛皆舉進士女適姓某孫四人曾祖某祖某父某知微有賢行予女弟歸焉將葬請予為銘義不可辭銘曰性淳謹行淳良善積在躬宜吉祥受祉未豐今也亡天之報施窅難量詵詵子孫來者長有如不信考銘章單季隱墓誌銘君諱鍔字季隱其先金陵人曾祖誼初有籍於常之宜興祖熙考應俱以德善稱其交游多名卿賢士君少有志操從胡翼之先生肄業頗見推重長益䆳於學著詩易春秋義解博考諸家之說斷以胸臆他經及子史皆手自抄纂篇帙盈􅍥筆札細楷幾若摹印其為文務辭達事舉不喜浮靡論議衮衮可聽尤能言呉中水利以為荆溪當宣歙廣徳下流東注震澤而震澤自呉江入於海今江隄連亘水勢壅閼古人濬治遺跡堙塞殆盡誠能通海浦溝港以道呉江增江隄橋梁以決震澤又復故百瀆以疏荆溪則積水皆下譬如人身去鯁於咽口腹通矣有獻其說於朝者事下部使者使者諉君按行君察其屬忌之弗往也性樂易遇人傾蓋如故聽言置虚實一切傾信久知其玩謔弗愠也客至無疎戚留飲醉輒假寐頃刻即醒未嘗為酒困間有所感賦詩見意可傳錄者積數百篇年既高氣體益健請謝不避寒暑他人當疲劇而君處之自若崇寧中予憂居里閈君過予日三數雖大雨雪聞外有履聲曰此必季隱也既而果然時君年七十有餘矣相見慰勉已必自敘所得經傳新意大編長卷常以自隨據案諷誦援筆改竄其心思目力非少年可及大觀四年正月十有三日壬子以疾終於家享年八十娶同郡余氏先君十有二日䘚享年八十有四子三人曰源先䘚曰子發曰端子發予友也有文行兩薦於有司又預崇寧貢籍鄉人舉遺佚又舉八行嘗為宗子學長女四人進士余安節蘇掖劉迪周邁其壻也孫三人曰世南曰世英曰澤孫女二人冬十月二十有七日壬戌其孤遵治命以季隱及余夫人之喪葬於邑南羅漢峰之原予幼聞縣鄉尊長言君之考好賑施平日徜徉閭巷遇貧民不能自給密置鏹於門凡賓旅干丐親舊急難隨多寡各厭其意資以全濟者甚衆咸謂單氏家資雖匱慶在厥後而君之兄錫中進士第儒術吏方有過人者乃䘚於州縣君與弟鎭又皆老於場屋論者疑之然予觀自昔隂徳之報遲速雖不同而未嘗不效觀子發士望及諸孫秀拔異日必有華顯者銘曰嗟嗟季隱初激昻事與願違心永傷如彼楩梓材之良宜備雕刻塗青黄匠石弗顧委道傍百年孤幹摧風霜物有合舍維其常命邪非邪窅難量優游里閭夀且康以彼易此奚否臧維天報施久乃彰有子有孫來者長單氏夫人墓誌銘深州文學余充甫之室曰單氏常州宜興儒家女也充甫學行夙成甫弱冠以經術傳授迨今逾五十年門弟子發策決科踵登華顯而充甫蹭蹬以老其安於義命不以得失介意休休然樂道忘倦曾不知老之至者夫人有以相之也夫人少孤事其母田夫人盡子道既嫁事其姑裴夫人盡婦道而所以相夫者又如此故里之人施衿結帨以訓其女必以夫人為法余氏素貧凡晨昏伏臘乃至吉凶婚娶凡資以供億者皆出於夫人處畫故其夫及子惟知專精於藝文而弗知家之有無至於問遺親戚拊養貧族嫁遣孤女沛然若有餘力而實無旬月之積蓋其天資好德遇所當為力行之雖勞心曲體弗憚也平居與人言孜孜以和孝為本於事迎機立解分別是非利害如指白黑其居田夫人喪孺慕摧毁躬修佛事於潤之金山即夕夢田夫人乗舟而至笑語如平生識者以為孝誠所感政和二年五月十九日以疾終於家享年七十有二明年某月日葬於邑之某鄉某之原曾祖某祖某考某生六子亡者四人曰拭曰京曰大亨曰大受而京元符三年賜進士出身存者二人曰授再薦於鄉又預大觀升貢曰撝為州學内舍生女三人其壻海州沭陽縣主簿李端方進士孫壎焦翊孫五人曰似曰侑曰佽曰仍皆從學曰傔尚幼孫女五人某之先妣太淑人蔣氏裴夫人之甥也與夫人厚善相視如母子某以是知夫人之詳謹泣為之銘曰士有貴賤取之自躬嗟彼女子祗繫所從乃如夫人老於衡泌惟其為善在約彌厲宗姻尊仰匪服匪車天爵之貴豈繫其夫善積慶貽理不終晦追賁九京予知未艾慕容叔孚墓誌銘吾弟叔孚名彦喜以元豐七年七月壬寅生於常之宜興以崇寧二年十有二月庚午終於京師以明年十有一月甲申葬於宜興篠嶺之原叔孚爽俊夙晤恩性天至五歲居先考喪哀毁如成人平居奉事母兄怡聲柔色禮無違者初就外傅黙識彊記閱書一再過不忘稍長益嗜學問紬繹經旨剖析疑滯出人意表善談論衮衮不休聽者忘倦於文無所不能自進士舉業乃至應用詞藝落筆數千字若不經意衍裕宏博不疵於理年甫弱冠進此方未艾也而不幸以死嗚呼哀哉天既賦叔孚以才矣胡嗇厥施而至斯極也維我先考養志閭里非義弗為非道弗取潛德卓行輝映今昔捐館之日以六弟付託俾某撫育訓成之諸弟嶷嶷自立講習琢磨芝蘭並秀當崇寧造士之盛太學選試更占殊等月書歲考曾靡虚籍祭酒博士相與嘉歎聞譽翕然歸之今叔孚捨我去矣念叔孚之不夀與夫名宦猶未遂也某與有罪焉而理歸於無可奈何至於未克授室嗣息不立則某曷敢逃責言而及此摧裂肝膽嗚呼痛哉嗚呼痛哉謹誌碑故朝奉郎尚書職方員外郎通判徳順軍兼管内勸農事輕車都尉賜緋魚袋累贈太子太師梁公神道碑大觀元年正月今中書侍郎梁公初拜尚書右丞有司遵故事擬三世贈典以聞二月辛酉降制其略曰朕惟執政大臣望實顯隆致位近弼義方之訓自其前人追加表揚用錫休命尚書右丞子美故父某可特贈太子少師九月宗祀禮成又降制其略曰朕饗帝合宫翕臻純嘏均神之惠普逮庶工眷予近臣宜推異數追崇親廟實國彝章中書侍郎子美故父某可特贈太子太師既告第又賜子美以副焚於墓中書公拜賜泣謂某曰子美幸承先人遺訓備位政府賴天子慶施贈官一品而墓隧之碑未立夙夜怵惕不敢怠遑惟先人出處終始之大節可考不誣敢請銘於子某義不得辭謹論次太師之官階政治而為之序曰公諱某字得之漢陵鄉侯統之後五世祖夏國公惟忠嘗任天平軍節度判官因家焉故今為鄆之須城人曽祖文度贈太師中書令兼尚書令封魏國公祖顥翰林學士右諫議大夫贈太師中書令兼尚書令開府儀同三司封魏國公考適皇祐中位宰相終太子太傅致仕贈太師中書令兼尚書令開府儀同三司封徐國公諡莊肅曽祖妣鄒氏韓國太夫人祖妣閻氏魏國太夫人妣任氏徐國太夫人公辭采學問在孺有聞稍長就試有司名擢高等初補將作監主簿累官光祿寺丞至和初仁宗皇帝嘉公故相子嘗舉進士召試學士院賜進士出身未幾復廷賜五品服遷祕書省著作佐郎自著作五遷至尚書職方員外郎累階朝奉郎勲輕車都尉歴監在京鑄䥱務管勾專勾同監布庫知汝州梁縣簽書天平軍節度判官事通判徳順軍公誠信篤實常以是守身亦以是施於政在梁縣時郡守將闢廳事風屬邑以材木獻公曰是必取於民吾寧被譴豈希合以擾吾民哉䘚拒之守坐法罷郡諸令皆得罪公獨免焉鄆視他郡為劇公裁處精確下無隱情民有辨訟懐牒宿留公至當職而後出葢信服之若此嘗有禁䘚之妻背夫以逃雖遇赦自首法猶不原帥吳文肅公矜之將貸以輕刑公不從立議詳盡切於事宜文肅竦然以為正論獄既決即薦公於朝倉米數百萬紅腐不可給軍食安撫轉運使夏某欲亟以元價貸民公曰倉吏失職宜正厥罪而後減直貸之不然民將有辭䘚用公策民輸稅於官吏不時遣因緣為姦部使者諉公公度弊所從起制之日入萬斛民至鼓舞相慶乞公在任東平監馬政廢弛朝廷遣使馳視公條十利以奏諸使者美之徳順並邊素號難治公居歲餘寛猛交濟俗以綏靖創立治平城寨經始有度下不告勞嗚呼公之為政雖古循吏何以加此昔左氏謂臧孫達宜有後於魯而漢史亦稱于公多隂徳子孫踵為公卿公任不踰佐貳而奉法守公愛民澤物常不替於志宜流慶於今也性清謹無他嗜好獨喜為詩有集十巻曰汝陽雜藁研練精切眞深於詩者平居陶寫情性風調清逺遇有所感詞氣激昂銳然有志於進為葢稟之也全積之也厚守之也固而不克大顯於時今有子以儒學事業受知明天子擢為柄臣制書褒揚以為義方之訓自其前人是豈終不顯哉公以熙寧元年十一月二十日終於徳順軍之官舍享年四十有八四年九月三日葬須城登庸鄉執政里從莊肅公之兆娶張氏開封人樞密副使宏之孫少府監可道之女有賢行事舅姑以孝聞元豐元年八月六日終享年五十有六以三年二月二十六日祔於公之兆初封夀安縣君累贈嘉國太夫人子五人子駿故奉議郎子美今為太中大夫守中書侍郎子建故太常寺太祝子履今為通直郎簽書開徳府判官事子博今為通直郎通判興元府女二人長嫁朝奉大夫劉斐次嫁從事郎田宜孫十三人希祖宣義郎修祖太學上舍生承祖昭祖皆將仕郎求祖未仕揚祖承務郎恭祖師祖皆太廟齋郎早䘚餘尚幼孫女十三人銘曰曄曄梁宗源自柏翳統侯陵鄉晉臣之裔維莊肅公公之皇考相我仁宗為時元老公生相家考翼是嗣學則通儒政則循吏帝嘉莊肅子以材聞給札詞禁明試以文擢踐世科揚芬桂籍佩服之華寵有申錫公懋承之以忠以孝位雖不充志克允蹈徳善之積慶祉之詒及子而顯報施在兹制書若曰惟予大臣義方之訓自其前人東宫之師膺此追賚源深流長疏榮未艾里曰執政鄉曰登庸刻銘隧道過者改容露布擬試宏詞露布聖人為度以天下恩靡間於華夷王者居一於域中法尤嚴於誅賞惟彼無知之黠虜自干有赫之明威爰興問罪之師五道並進克殄反常之黨隻輪不還猶乾坤覆載之無私而春秋生殺之有序彼孽自作兹無赦於邦刑我伐有名葢龔行於天討恭惟皇帝陛下掌觀萬國子惠庶民令出等風雷恩施同雨露接武堯舜比肩禹湯凡諸含血而有生孰不推心於弗忍獨拓拔之遺種擅呼韓之故區蟻穴至微不當國家之一縣狼心相繼敢肆蜂蠆者百年啖以金帛而益貪錫以土疆而愈恣間出剽掠恬為兇殘忘涵貸之至恩逞陸梁之大憝人神同憤華裔弗容梟首藁街未正不庭之戮游魂蔥嶺尚安匪茹之居臣等材力弗彊智能無取謬當分閫豈縱虜以求全弗共戴天誓與賊而俱斃擁鐸號令仗鉞馳驅初屯横山進薄靈武景星燭王旅天狗墮賊營以仁侮亡奚孤虚之足考自上伐下顧主客以何施士氣鼓熊羆兵威摧嵩岱或東衝以張我左翼或西擊以斷賊右肩月羽翳空霜鋒耀野魚甲粲爛獸旗玃挐伐鼓震天揮戈迴日腹背合擊首尾分攜我師益張賊衆大潰僵尸滿原谷棄仗等邱山草木類人而覘虜魂驚風鶴有聲而奔馳足蹶六師乗銳掃瀚海之妖氛萬炬俱燃焚賀蘭之聚落邦封盡復民俗咸新臣等躬執干戈名聨士伍憑社稷無疆之慶遵廟堂必勝之謨時未及瓜已詠勞還之什功無横草預聞鼓愷之音不勝慶快之至
