body:
  text: 摛文堂集巻十二宋慕容彦逢撰頌神宗皇帝聖政頌并序臣某言臣幼釋耒耜為諸生學問辱在鄉選逐竊名第紹聖二年初立宏詞科有司以臣程文奏御䝉先帝誤恩擢備學校於兹七年矣惟臣質薄材下行能亡異循循黙黙罔克稱塞獨觀自昔大有為之君其宏休偉績必有俊傑之士馳騁翰墨鋪張揚厲以警動天下傳之無窮恭惟宋興百有餘年神考以天縱之資崛起於五聖之後内修法度外寕邉徼日月所照生息理極巍巍乎典謨所陳奚以尚此陛下踐阼推原太平之自發德音下明詔尊崇廟祏百世不祧建景靈西宫以顯承為館御之首其永紹裕陵之言形於聲詩繼志述事之意揚於訓辭學士大夫宜廣陛下孝思之誠為雅為頌以形容神考之盛德大業如維清執競長發之詩臣是以不勝惓惓復自念漢永平徼外蠻夷槃木白狼獻詩歌德譯在史館矧臣自託於藝文待罪國子雖語言淺陋不足自効夫豈蠻夷之不若哉謹齋心滌慮撰成神宗皇帝聖政頌一篇顧辭不稱事未究萬分之一亦臣之極思也如䝉陛下假清閒之頃特紆睿覽臣退入溝壑死且不朽謹昩死繕冩隨表上進以聞臣無任瞻天望聖激切屏營之至臣誠惶誠懼頓首頓首謹言頌曰有宋受命卜年維億前羲後昊配天作極於赫神考紹休五聖篤實輝光剛健中正考古驗今慨然有為手撓顧指雷厲風飛秦漢以還因陋就寡樂變於夷禮求之野下及五代十有三君朝弗慮夕遑恤典刑爰自建隆寖明寖昌一變至道以詔後王神考若曰惟天祖宗既以命予予曷不從迺收羣䇿斷以不疑乾旋坤轉咸蹈厥機王政之行越有先務水利土工惟民是裕既勸相之申以保息懋遷有無平頒興積孰謂民逺如手撫摩遣使宅牧究宣惠和昔在祖宗賦力於下校登夫家以令施舍行之百年民執官功法乆必弊唯變乃通神考念兹先定等籍嵗均厥輸官為僦役商農工賈咸奠爾私毋擾牒訴毋虞鞭笞昔在有周士貴以肄賔興賢能惟德惟藝既望終魄弊極於隋雕蟲取士壯士不為神考念兹罷黜聲律論秀烝髦選取經術賢關載闢斆學惟醇鋤荒剔蠧統一道真昔在有周六卿分職區區宇文嗣修品秩唐室建典圮於朱梁名實紛貿狃為故常神考念兹董正在位參稽周唐以辨官治若網在綱小大相維循名責實百工允釐昔在有周稱秩祀事惟郊配天惟饗配帝曲臺失職淪胥異聞或陳九祭或創兼尊神考念兹章别隆殺靈神一天聿嚴專配惟聖饗帝惟孝嚴父發揮祲容以格神祜昔在仁祖作宫永安名曰㑹聖以游衣冠厥惟京師數奉神御散於羣祠禮若未具神考念兹迺卜景靈隂藏陽耀寳祉萃興像設嚴嚴飈馭降格妥侑孔時祼獻維則昔在寳元元昊陸梁爰暨熈寧交趾亂常惟羌惟蠻乍臣乍叛羈縻涵養習為驕悍神考念兹迺伐仇方南潰楚越右復河湟河湟既復羌失右臂揚武横山往城要地昔在有隋釃河為汴控引淮泗夐逹江漢濁流千里洶洶電激舲摧艦覆間不容息神考念兹迺導洛水繹繹清源來自熊耳盈科而進匪亟匪徐風航雨楫既安既舒惟昔刑書編次散勅與律並行時損時益凡目寖廣疎宻不倫輕重牴牾罪失厥情神考念兹肇修品章科條金玉以約御詳蒐補闕遺刋正謬誤芟夷潤色制例兼著猗歟偉歟經始熈寧迄於元豐展也大成鈞衡鍾龠車服旗常軌量以度物采以彰金石按協厯象考證以諧八音以齊七政藥劑有任工技有程緝熙庶績罔不勵精賞必選勞罰匪作惡播告不匿俾克畏慕俸優公家交屏私室砥礪亷隅以清回遹議刑左學訓武西序博延數塗疇逸銓叙課試任子甄用公族較短較長俱收並蓄聨民鄉遂寓以伍符爰糾姦慝爰比追胥井鉞參旗百將分戍前茅後勁既閑統馭簡稽戎器搜閲材官帑廩備預廏牧阜蕃惟時惟幾規模宏逺神而化之用藏隠顯於乎神考誠明生知終始典學道心精㣲肆筆成書吐辭為經河洛之瑞雲漢之明明明廟謨出入韜鈐鍾靈聖武天動神潛外絶進獻内擯聲色覽奏夜艾聴斷日昃苑囿弗繕宫室弗營城池襲固府寺増宏迺對草萊褒進嵓谷一藝必庸小善必錄賔禮耆舊省納諫諍以鎮澆浮以激柔佞追美先正表揚厥勲圖形原廟如漢麒麟睠言閟宫義爽同几升祠四后式燕祖妣明發不寐有懐二宗祇嚴徽册維極顯崇奉事東朝恩性天至輦道安居懋昭孝治友睦同氣華萼相輝神禎匪効羽翼在兹惟功與德儷蹤典墳規重矩疊不可殫論十有九年休應以類海不揚波逺人慕義惟時臣子薦號中天謙冲退托詔無復言介丘壇壝日月以冀獨觀昭曠抑而弗議惟天祐之聿生元聖永明孝思答揚光訓迺尊廟祏百世不祧若武之穆若文之昭迺建西宫列峙中經比隆皇武冠以顯承祖功宗德既克兼之作聖􅄒明惟其盡之子子孫孫率迪大猷無有後艱永孚於休記甘露記予守汝海以堂宇敝甚徙寢室於訟㕔後之凉堂上舊隔舍為予書院凉堂之後隔舍之前有竹數十竿予出入㕔事日盼此君一夕夢有人告甘露降矣子奚弗省也予次日曉偶記所夢往視竹上露顆圓瑩如珠㸃綴甚宻嘗之味甘如飴時大觀四年十有一月晦也自經晴日或暴風大霧又三雨雪雪既釋露凝如故予初折示郡寮留賔几案竹葉已瘁而露益明潤既乆味若糖霜然至十有二月晦竹間粲然猶不晞云香山天寧觀音禪院新塑大阿羅漢記汝為州當嵩山之陽縈帶汝水土脉膏腴旁近郡旱潦不登汝輙豐稔以故民力優裕地左許右洛南襄北鄭而非舟車衝道賔旅自遠至視其閭里愉愉舒緩謂之樂郊然僑寓者多晉人習尚儉嗇室宇僅蔽風雨不厭庳陋車馬衣服大率稱是而獨崇信鬼神祭奠獻施無所吝惜其奉佛尤為勤至雖五代干戈擾攘日不暇給而境内禪刹號古道場者三四其名僧機縁見於載錄者踵相躡也香山寺在郡城南百餘里唐宣律師嘗聞之天人以是為觀世音菩薩化身之所士民重趼瞻禮罔有虚日竟有祈禱佛光現前或小或大或遠或近或多或寡合散轉移不可測度乃至現於大雨霧風雪之中其靈應顯異蓋若此大觀三年住持比丘法成謂其徒曰兹地殊勝邦人欽奉而像設故壊散列於埃壒之下網絲之間四方來觀者生慢易不可不易迺命工造夾紵縷金大阿羅漢十有六從侍十有四龕帳供器皆備費凡三百萬出常住贍衆之餘間有助縁者初未嘗干丐也四年秋設齋慶成有光現於塔頂經数日乃散嗚呼色見聲來釋氏以為邪道至莊嚴布施則又以為必若是然後為信心成師有得於宗乘者於此宜辨其説矣然今天下山林勝處皆建道宇佛祠而佛祠尤盛如香山光景效靈又天人顯告見於宣律師傳甚詳非它叢林比也成師方舉揚真諦而不廢土木之餙此非徒然為演其意而説偈言諸佛之示現如彼水中月影隨霑潤生豈復有量數羣生欲見佛亟以聲色求如攫水中影圓明散何有莊嚴具百寳佛子所當知閔兹迷妄心方逐萬境轉瞻言一念起如土布嘉種因縁能發明長養至成就香山勝妙地觀音嘗降身精廬聳摩雲神物隂䕶衞土民輕千里聞所聞而來佛光應宵矚讃嘆世希有復覩像設姿樂説無窮盡如是展轉聞咸發歸依誓不思議功徳上以賛宸躬遐算等乾坤萬邦均慶頼笏記集英殿春宴笏記祥風應律兹為布徳之辰湑露零廷爰舉示慈之宴恭惟皇帝陛下乾坤化育日月照臨有壬有林咸序九賔之列如山如阜共稱萬壽之辭又誠心昭格沴氣消収凡在照臨敷同鼔舞恭惟皇帝陛下如乾獨運與日並明治功方叙於九歌䘲異宜消於十煇臣等夙膺榮禄䆮冐近司獲被休祥實均慶頼又誠格上穹變消内壤凡居覆燾均被榮懐恭惟皇帝陛下丕叙九功誕膺百福方珍祥之沓至宜沴氣之潛収臣等叨備近司與聞休應奉千齡之瑞祝肩四海之懽心序御製論大道文後序臣某拜稽首言曰道若大路然凡麗乎聲色象數孰不由之近取諸身嚬笑顧指起居食息無非衆妙之所寓惟其由之而不知故逐物轉徙去本益逺聖人於此立言開明俾聞之者如索塗冥行廓然見曉隨其性分各即所安嗚呼非博大真人孰能與此恭惟皇帝陛下躬藴道真懋建皇極所以配神明享天地丕冒羣倫者既自得之方且深根固蒂長生乆視以同乎太古又親御翰墨叙大道之要昭示訓迪自羲畫禹疇與夫琳札所紀瓊笈所藏於焉發揮言約理盡萬邦臣庶伏讀睿文迷者斯復窒者斯通是訓是行同焉皆得將見還淳返樸如太古之時顧不盛歟邇英閣無逸孝經圖後序臣竊觀國家承五季之後太祖太宗經綸草昩南收江湘西定蜀漢北翦汾晉盪滌妖祲天步廓清迄於太平厥惟艱哉真宗繼之中外嘉靖緝熈百度文物粲然仁宗承三聖之後念創業之難與夫持盈守成之不易也業業兢兢常懼一事一物之失宜不足以駿惠前烈其黙而為思言而為議見於施設法度政教所以照臨海島甚盛所以加惠元元甚厚猶以終始為一者帝王所深慎也於是考先聖人之言尤切於治者以自勵乃命近臣書無逸圖於閣之左又書孝經之天子孝治聖治廣要道四章圖於閣之右朝夕顧瞻若周孔在焉昔周公作無逸陳古先后之盛與夫稼穡之艱難盤樂游田之害政以戒成王而其務以勤為先孝經之四章稱先王至德要道所以和同天人之際者而其原以孝為本是二者人主正心修身以御家邦無以尚此夫仰天而天不倦俯地而地不怠則成位乎兩間者孰過於勤在天有經在地有義則成能乎兩間者孰大於孝且有天下者非謂以天下奉一人也天下之大以一人治焉以至衆望至寡則其責備以至靜視至動則其慮深得失在於九重而利害及於四海善惡垂於萬世故人主必金玊其言規矩其行德合天地明並日月然後足以垂無疆之休然則周孔之訓其可須臾忘邪雖然此豈有他哉顧在心術之間而已誠能處堂陛之廣而思天下之民有不安其居膳膏粱之㫖而思天下之民有不飽於粟服綺紈之美而思天下之民有不足於帛臨鐘鼔臺榭之樂而思民之所以憂享宴安優游之逸而思民之所以勞日旦坐朝鵷鷺在列而思賢士或有未進章奏在前聴决可否而思事情或有未通念前人之所以託於後萬邦之所以願乎上者夙夜不替曰若是而後為古先王之勤又若是而後為天子之孝也惟勤與孝一舉兩得而天下不治風俗不美頌聲不作天瑞不至者未之有也仁宗允蹈之是以盛德成功格於上下詒燕後世比隆唐虞其效豈不彰明較著哉夫尚論其人於寥寥千有餘年之前求其遺言置諸左右若朝夕納誨然願治之意深矣逺矣嗚呼盛哉臣拜首稽首謹序送呉顯道序熈寧元豐間某為兒童時聞顯道名至㑹稽始幸交焉厥後紹聖某年山隂令闕顯道攝邑事士大夫往觀焉時婚田務開牒訴盈庭吏抱案牘列廡闐溢顯道隨事剖决筆不停綴吏唱判辭燥吻續以他吏辰漏未盡盤錯一空頃刻間聲譽沸騰顯道先領府從事至是猶兼之往來兩間綽有餘裕大率明而不苛嚴而不暴以意犯法者雖細弗宥過誤者哀矜而出之人被其鞭撻再拜讃謝自以為不寃也毎視事曰某人某日嘗以某事來吾弗直今奚復訟某事某日嘗以某名來吾弗直今奚更名被訊者恐懼首伏吏白事顯道曰某事於法不當治某人於法不當逮輕重緩亟吏不得舞手邑境大悦往往圖像以祠之於乎顯道以學問文章為荆公門人髙弟當先帝盛際物望輝赫視青雲與平地等耳而自珍太甚不少降意世變互更晦迹不耀春秋髙矣屈佐百里涵蓄深厚未嘗發泄治山隂數月政績可驚使之得志功烈宜如何哉人知顯道學問文章而弗知從政之才故論次為送行序云議𤣥圭議玉質温潤赤與黒雜真𤣥色也以古尺攷之其長尺有二寸唯天子之圭為然考工記稱鎮圭尺有二寸天子守之是也周之鎮圭以四鎮山為飾今圭之首其左右刻四鎮山與周制同然周之鎮圭剡上今圭首雖剡而為椎形椎首乃大圭之制蓋自唐虞至於成周沿革損益大同小異猶登龍於山登火於宗彛也其瑑為雷雨之文者三代以前禮器類以雲雨為飾尺有二寸之圭以周制考之為六瑞之首其瑑雷雨以象天子法天以施澤於天下也其中為圓空者考工記稱天子圭中必注必讀如鹿車縪之縪其訓則縫也天子之圭中為穹縫以組約防失墜也三代天子之圭與夫公侯之所執乃至用以禮神者其玉或青未有以元為色今圭色𤣥則其為堯圭也明矣蓋天以𤣥圭授禹而禹以錫堯𤣥天色也堯以天道治天下故圭之色象堯之治符瑞志稱水泉流通四海㑹同則𤣥圭出蓋水泉流通則水得其性水為五行之首言水得其性以明五行皆得其性也四海㑹同以言中外嘉靖無一民不被其澤也五行得其性兆民被其澤則行天之道同於帝堯萬邦時雍同於陶唐此𤣥圭所以出也五行傳以宗廟禱祠祭祀天時為水潤下之應以謂聖人建宗廟以安祖考春秋祭祀以盡孝道王者郊祀天地禱祀神祇望秩山川懐柔百神罔不宗事致其齋戒鬼神歆鑒以獲福佑以和神人至於發號施令順協天時則隂陽調而終始成如此則水得其性皇帝奉若天道紹述先猷祭祀禱祠吉蠲盡禮政事設施格於上下臣民慶賴遐邇惟一以故大河澄清守臣屢奏逺夷効順史不絶書所謂水泉流通四海㑹同者在於今日此𤣥圭所以出也䇿問治法問蓋聞法不獨立推而行之存乎其人猶規矩繩墨雖設必有舉而用之者然後方圓曲直物莫能遁古先聖王以道制法御事不以法從人也而人惟法之從不以人擇官也而官惟人之擇官治其職而人足以任之然後以類舉而事功立焉主上念文昌政本自神考肇正官聨小大承式迨今三十有餘載實德在民頃者清蹕俯臨天旋六部又親御翰墨延見庶工而訓迪之亦惟元豐良法美意垂裕乎後而行之在人嘉與在事之臣欽承彛憲以隆太平伏讀明詔曰其慎爾止無載爾偽以制議事以公滅私無瘝厥官無怠忽荒政修舉憲度罔有不孚大哉王言與詩書所載若合符節其丁寧戒敕至誠惻怛播告之學士大夫其亦與聞之矣今欲有官君子體上之德意志慮䖍共夙夜無或便文官修其方法行其意各以行能功實仰稱詔㫖若之何其可試為有司言之人才大雅有言濟濟多士文王以寧又曰藹藹王多吉士古先哲王創業受命與夫太平守成未嘗不求端於人才而人才之衆必自人陶冶而成之棫樸之作人菁莪之育材此其成之之效也恭惟皇帝若昔大猷恢崇學校以率教天下烝髦論秀而臣使之豈惟寵榮其身意者迪以經術則義理明董以師儒則道德一待以曠日持乆學優行敕而命之以官則其才皆足以有為其志皆足以有守夫以禮樂法度之備付之有官而任官者皆陶冶已成之才太平之基所以永永無極也然則上之期於多士蓋若此雖然知自貴而後外物不能挫其恒知自信而後邪説不能干其正茍輕重取予與俗轉徙而欲以所學為天下國家之用一出焉一入焉曽不足以美其身烏在其有為有守也士被教養而從政於此知所安矣不然則援其失祛其惑益其所不能亦必有道願著於篇史材問史官之權甚重褒貶所及傳之無窮不可磨滅唯學至博識至明而文足以形容之然後議論不詭於古人詞采可傳於後世由漢以來言史者稱司馬遷自劉向揚雄許可以後皆稱遷有良史之才諸儒韙之罔有異説而唐蕭頴士獨深罪遷不編年而為本紀書表世家列傳失史之法然自遷合言動為一分史目為五後世因仍不能加損而頴士獨深罪之何也古人有言智者作法賢者更禮隨時制宜不必一道使遷之法誠是何必泥古以為失史之法邪後世不能易何哉諸生試陳之禮制孔子曰安上治民莫善於禮唐虞夏商周之盛禮之損益見於載籍人主美化善俗流澤子孫蓋本於此世衰道㣲典章隕缺嬴秦以降因陋就寡君臣勅戒不過簿書獄訟之間雖有仁心仁聞不可為法於後世故漢宣帝時詔書毎下民若更生而王吉以為可謂至恩未可謂本務也神宗皇帝監積習之弊親䇿多士命官討論主上丕承先志申命有司設局建官講求一代之制惟宫室之度器服之用冠昏之義祭享之節學者所宜深考願與聞之將以獻於上焉學術問勸學以風化四方太平之原也先王之盛時制成均之法合國之子弟而教之下至五黨之州有序以㑹民而諸侯之教又命於天子所以一道德同風俗作成人材以趨事赴功雅有菁莪既醉其原自此神考勵精庶政求端於學以追治隆古訓經術恢館宇増弟子員其流及於郡國廣建學官以教多士洋洋乎成周之治宜無以進此今太學月書季考陞舍限年率舉熈寧元豐之舊士固鄉風承德矣而學之在郡國者防範糾督之法疑若未備也夫惇講授之選博延多士供億仰於公家而命之曰學豈徒徇虚名哉惟熈寧元豐成式具在事之未究者嘗許條列以聞將推原美意稍嚴課試選出之法使士知所勸若之何其可願與聞之宗學問荀子之於勸學有言曰德操然後能定能定然後能應學者至於能應則其有為也若决江河沛然孰能禦之古之人或延以三旌之位而弗顧或乘田委吏而安之或享以萬鍾之禄而弗受或簞食瓢飲而樂之彼輕重在我而不在物故進退取舍處之裕如若然者其君用之則安富尊榮其民從之則孝悌忠信蓋存乎中者素定故建之行事若此主上留神宗學所以訓迪之非止應有司之選而已淵源經籍涵養道義其操術既定則守身從政將無施而不可諸公子仰承聖造其自得於心者宜有可言古之人能定能應者世有其人頌其詩讀其書其志可考以所得於今論所聞於古試為有司陳之將以觀所學焉
