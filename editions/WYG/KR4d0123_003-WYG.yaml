body:
  text: 摛文堂集巻三宋慕容彦逢撰詔賜仁福帝姬辭免册禮許允詔朕膺祐上靈占祥右帨爰當初晬肇賜美名申父子之至恩既揚孚號篤邦家之多慶敢替舊章兹上奏對亟辭册禮載詳謙挹良用歎嘉特徇䖍祈永綏遐福賜少保太宰兼門下侍郎鄭居中辭免男億年直秘閣允詔朕搜揚俊乂靡間䟽逖惟卿以道德勲業翼贊大政而其子力學篤行達於朕聽不有褒嘉何以示勸是用寵以芸閣之華卿抗䟽懇免朕親御翰墨既却其請矣今復有陳迺以待試學校為言朕嘉卿徇公忘私遵奉法令足以率勵在服特從其志兹永有辭賜少保太宰鄭居中辭免册命允所乞詔卿時之先覺以道德謀謨佐佑大政兹延登於保輔寅亮天地師長百寮任重禮隆肆命宜允賜新除太傅致仕何執中辭免册禮允詔卿位宰輔引年得謝以三公就第列宫師備文物而發命焉所以優禮元老為在廷之勸也今卿抗䟽懇避辭肫意切朕勉從之以成爾撝謙之美戒勵百官遵奉法度詔朕承先帝休德永惟熈寧元豐之盛以紀綱則肅以政事則修以典章則備官師共恪民物阜安蠻夷率俾雖二帝三王之治未有以進此也朕嗣守基緒監於成憲冀緝熈潤色之以垂無疆之休故首命輔臣慎簡乃僚講論庶績凡先帝之所議而未行或已行而廢於元祐者朕於此繼其志述其事唯恐其弗逮故惇睦宗族以隆親親恢崇學校以一道德董正官儀以辨職守刋憲令以明禁戒欲下不加賦而國用足則理財以義欲邊不告警而疆土闢則禦戎以威小大精粗本末具舉其效彰明較著者盖不可以一二數也廼者太史獻言五星循軌考之故實時惟休應朕用嘉之樂與卿大夫守此法度優㳺無為承天之休以享太平繼又肅儀衞考星辰正衣服下至百工技藝罔不興飭将討論治定之禮功成之樂以明繼述之效若此凡百官君子其同恊心遵奉法度堅如金石信如四時以副朕至誠惻怛之意其或志在傾巧而以浮言動搖習於怠惰而以便文僥倖朕得治而懲之咨爾在位明聽朕言朕将垂拱仰成於兹爾亦有辭於永世賜延康殿學士强淵明辭免恩命不允詔卿操履端靖問學醇明再直禁林進承密命文詞議論朕所褒嘉兹抗封章累以疾請察其誠確俾即所安祕殿髙華祠宫優秩併為汝寵昭示異恩宜止謙詞亟祗成命賜新除顯謨直學士依前永興軍路安撫使賈炎辭免恩命不允詔朕以卿才資䟽通風力强濟往膺閫寄方竚壮猷爰進直以寵行俾増華於所涖勉圖報稱勿事謙辭賜新除翰林學士承㫖馮熈載辭免恩命不允詔禁林詞臣以重德夙望獨承密命盖極儒學之選卿經術醇深文辭典麗明於大體議論有餘俾踐厥官時乃親擢抗章引避未體眷懐成命已行宜祗受之賜翰林學士馮熈載辭免恩命不允詔北門視草朕所慎選以卿經術深美文詞典雅踐揚清要綽有華問乃兹親擢俾踐厥次抗章祈免未體眷懐朕命惟行宜即祗受賜少保太宰兼門下侍郎鄭居中辭免外甥朝奉郎知大宗正承事李伯達除尚書度支員外郎恩命不允詔文昌諸郎必資材望以伯達揚歴有譽俾踐厥次而卿抗章引嫌祈寢成命秉公守正朕惟汝嘉惟官擇人時乃親擢於義無慊勿復有陳賜太傅何執中辭免恩命不允詔卿以甘盤舊學輔相朕躬勲德兼隆為時元老今兹得謝惟優恩異禮乃稱始終待遇之厚廩餼之入頋何足辭宜體朕懐勿復祈免賜新除翰林學士承㫖鄧洵仁辭免恩命不允詔詔鄧洵仁省所奏辭免恩命事具悉禁林承㫖儒者至榮久缺不除盖重其選卿志操端靖學問深醇議論文章夙有華問典司内制朕所眷知兹用褒嘉俾奏密命趣宜祗服毋復有陳賜新除翰林學士許光凝辭免恩命不允詔視草北門極儒人之選人惟求舊申命用休以卿學識髙明文詞典雅曩踐厥次休有譽言召自逺邦再入祕近宜體朕眷往楙承之賜大司成陸藴辭免恩命不允詔大司成摠學校之政令非望顯於時多士信服者不以輕授卿術業行誼朕所嘉尚是用輟自詞掖俾踐厥官宜體朕懐往祗成命賜新除翰林學士劉嗣明不許辭免詔北門學士潤色論思為職考擇之慎必惟其人卿學有淵源辭知體要揚歴華顯業履兼隆乃兹新除俾踐厥次胡為謙避宜即欽承賜新除工部侍郎方㑹不允辭免詔六官之貳資望髙華卿學識淹該履行醇茂揚歴有譽宜踐厥官胡為撝謙尚勤訓告朕命惟允其往欽承勅賜龍州知州彭允宗等進奉賀端午節溪布勅書汝逺有邦土久衞邉陲聿當時序之臨来效物宜之貢載詳勤恪深用歎嘉賜保大軍官吏等示諭勅書朕以某人稟資沈勇䕶塞忠勤進築新城大殱羣冦旌其師律錫以将旄􅃡懐吏民爰及師旅兹聞渙號諒惬輿情賜修武郎趙子噩奨諭勅書朕恢建黌宇聚衆姓而教之惟汝三子年尚幼也而能通誦羣書與夫八行八刑之文小子有造在於屬籍義方盖有自矣朕用汝嘉朝請大夫行大理寺丞馮大鈞可大理正勅勅具官某書曰非佞折獄惟良折獄故朕於刑法之臣選任尤慎爾丞於廷尉克有譽處宜能體朕欽恤之意惟詳正之官實佐卿貳今以命爾尚其懋哉可賜䕶國軍官吏人道士僧尼百姓等示諭勅書勅某人等朕以某人氣節忠純材猷閎廓比膺詔㫖往撫邉陲克有顯庸宜加寵命俾聨班於上宰兼視秩於貳公爰昜将旄仍陪封戸逖聞孚號諒惬羣情賜知安州向萬嚮等進奉賀天寧節并端午冬正溪布勅書爾祗服朝恩介居邉裔爰因嘉節克謹彛儀載省勤誠不忘嘉歎賜保静州知州彭儒武等進奉天寧節并冬祀冬正溪布勅書爾世服朝恩嗣修貢職爰因令序克講彞儀載念恪勤良深嘉尚賜保静州知州彭儒武等進奉賀端午節溪布勅書汝邈在裔居克綏世守當端辰之紀節修逺貢以効勤載念忠誠益増嘉歎誡諭三省樞宻院修舉先朝政事勅父作子述繼明以照四方君令臣共相待而成一體朕承右序之重思保艾之艱若渉巨川罔知攸濟若構大厦遹求厥成深念熈寧元豐之間髙越貞觀開元之上以謂先皇帝聰明睿智齊聖廣淵旋乾轉坤奮無前之偉績深根固蒂建不㧞之宏基十有九年一新百度都俞吁咈謀謨至詳緝熈儀刑典則俱備恩洽動植威暢蠻夷大聲如雷霆可聞而不可象其震為章如雲漢可仰而不可繪其光肆朕繼統監兹垂裕爰詔列位悉復舊章惟徒法不行必得人而後舉而美意所寓蓋流澤於無窮尚懼科條雖設而考覈或遺敷繹徒勤而發揮靡究不足以揚不刋之典垂無疆之休恭黙以思怵惕若厲咨爾執政時予仰成逮事先朝與聞彞訓循名考實揆往騐今孰戾而弗修孰委而未舉於焉匪迪罔或愆忘一物失宜曰予之咎庶邦作乂惟爾之賢其慎乃猷各倡厥屬率時昭考予将比跡於周成格於皇天爾無専美於商尹故兹誡諭其往率循批荅賜皇后賀冬祀禮畢批荅勅皇后鄭氏朕夙駕齋輅親祠泰壇格兹熈事之成實亦柔儀之助方還詔蹕遽閲慶函載味勤誠良深嘉歎賜内中夫人郡君已下賀冬祀禮畢批荅勅某人等朕聿修元祀祗見上穹熈事迄成休祥類至載詳慶牘良悉柔誠賜皇弟燕王越王賀冬祀禮畢批荅勅朕聿修大報爰舉明禋熈事迄成景貺昭格有嘉同氣實相盛儀及兹詔蹕之還首閲慶函之奏勤誠斯至歎尚良深賜大長帝姬賀冬祀禮畢批荅朕涓選靈辰稱秩元祀祗膺純佑獲厎熈成兹閲慶章備形善頌䖍誠斯至嘉歎良深賜新除宰臣鄭居中辭免恩命批答仍斷来章朕承列聖之垂裕膺上帝之降康遹求厥寧考重其相盖賴股肱之助克濟宵旰之勤以卿道術純明器業閎廓行髙而志潔論正而謀嘉以文武之兼資有忠孝之大節踐揚政路於兹十年賛翼治功允惟一德用延登於宰席既敷告於朝倫胡為撝謙尚形遜避賜新除宰臣劉正夫辭免恩命批答仍㫁来章朕祇循考翼聿承天休永思萬化之原必資一德之輔詢謀至重授受豈輕以卿學識髙明器能宏博慮經逺而不競言厎成而可稽自擢近司於兹八載其忠亮足以式百辟其通敏足以賛大猷肆膺注意之公用錫揚廷之寵朕命不昜爾勿固辭賜新除知樞宻院事鄧洵武辭免不允批答朕惟本兵之府天下武政總焉嘉與不二心之臣圖囘萬務以靖四方卿學術宏深器識髙逺端亮之節著於朝倫忠讜之言簡於朕志迺以舊弼擢長樞廷宜體朕懐往祇厥服何為謙挹尚勤訓詞賜宰臣鄭居中辭免册命不允批答仍斷来章卿以忠恪端亮簡在朕心擢位宰衡進秩亞保已戒有司涓日陳儀班百辟於廷而册命之位重任隆禮惟其稱豈特褒嘉輔臣将以為卿士大夫之勸也往祇寵命無或重陳賜新除知樞宻院事鄧洵武辭免不允批答仍斷来章朕以卿帷幄舊臣謀謨之嘉素履之美睠察盖有素矣擢長樞筦方佇進為撝章繼陳殊咈朕志毋煩訓告往懋承之制除檢校少保充䕶國軍節度使開府儀同三司依前中太一宫使加食邑食實封差遣如故某制朕經武以綏萬邦信賞以勵羣辟有懐寧考不忘疆埸之虞肆命信臣爰整干戈之衞總䕶諸将屢奏膚公誕揚猷告之言寵錫勞還之禮具官某直方莊重敦厚裕和器任大而有容謀經逺而克繼秉忠自奮内宣心膂之勤仗義不囘外著爪牙之助頃膺中詔往撫西陲事靡辭難言皆底績出入韜鈐之略縱横帷幄之籌日百里以開疆新城列峙月三㨗而獻馘狂敵殄殱招来逋逃懲革奸矯黠羌請命逺夷鄉風兹聆奏凱之音特舉疇庸之典視秩上宰聨衮繡之盛儀易節雄藩峻旌麾之寵寄名進貳公之貴封陪多户之優凡厥恩章時惟褒律蔽自朕志恊於師虞於戯吉甫以伐玁狁之功来歸自鎬召公以平淮夷之美告成於王迺眷壮猶無愧前哲往綏祉福豈俟訓言可武康軍節度使除開府儀同三司某制朕率時昭考建社稷無窮之基若昔大猷謹疆埸不虞之戒修嚴武備賛恊治功選於臣鄰既得詩書之帥授以麾節俾宣道德之威逮閲嵗時宜疇功次肆優品秩進視公台丕告治朝顯揚休命具官某器愽足以任重才髙足以濟繁憂勤百為有忠精享上之實險夷一節無循黙養交之心夙被甄陞亟踐華要令聞令望民言維休嘉謀嘉猷國是允賴曩付六纛往臨三軍井鉞參旗増壯爪牙之衞龍韜豹畧獨専帷幄之籌念爾宣勞加予注想未申褒典殊欝眷懐是用按厥舊章錫兹寵號惟開府建自魏制而儀同本於漢名階序尊崇禮文貴重簡在朕志僉謂汝諧於戯名器不以假人爵祿所以厲世惟兹異數匪曰私恩視爾師寧爾邦期克邁於彞訓修乃職考乃灋佇益奏於膚功除保大軍節度使充熈河蘭湟路經畧安撫使兼知熈州某制周官以八柄詔王莫先馭貴左氏以七德經武亦曰定功迺睠爪牙之臣克勤疆場之衞涓辰錫命孚號揚庭具官某器宇沈雄性資嚴翼竒謀必中擅玉帳之威名義勇無前禀金行之勁氣久共武服積有戰功兹統鋭兵往築新壘悉乃心力濟予事機誅斬冦讎曽隻輪之無返肅清邉徼方百堵之皆興用答殊庸特頒優賞洛郊顯鎮俾進秉於将旄狄道雄藩兼寵専於帥閫益隆寄任并示褒嘉於戯往城於方出車所以美南仲用錫爾祉江漢所以命召公無替前修尚觀逺業可皇叔府州管内觀察使仲憪可特授昭化軍節度觀察留後皇叔閬州管内觀察使仲撙可特授建武軍節度觀察留後制勅朕永懐孝思念兹祖考推原所自褒顯近親豈惟示敦睦之恩亦以彰忠厚之化具官某爾等列於屬籍夙奉内朝恪謹有常祗循憲度宜錫命書之寵進陞留務之崇尚體眷勤克綏祉福可除少保某太宰制朕承列聖之休緒臨九有之嘉師遹求厥寧考慎其相若構大厦必資柱石之强若濟大川必假舟航之利乃眷良弼夙著顯庸宜申注意之公用錫揚廷之寵具位某道深造而自得氣直養而至剛材周萬務之微真古賢佐學洞六經之藴為時儒宗恢恢文武之資顯顯忠孝之業囘翔政路於兹十年翼賛治功允惟一德慮經逺而不競謀底成而可稽師言克諧國是永賴宜自斗樞之貴延登鼎鉉之崇兼總東臺升華亞保加以爰田之賦陪之真户之輸併錫寵章式昭異數於戯舉臯陶而選於衆朕不昧於知人迪髙后而暨乃僚爾無忘於報上往服成命期邁前聞户部尚書梁子美可尚書右丞制勅昔在神考若稽周唐正名百工以熈庶績惟中臺二轄分總六官參賛機衡實聨近弼具官某賦材閎廓藴識髙明夙由儒學之華歴試事為之劇望實俱峻朕所簡知比自民曹領職天府寬猛交濟治狀顯聞是用酌於師言擢與大政俾攄逺業修輔朕躬於戯惟虚厥心乃不惑於是非之正惟常厥德乃不牽於好惡之私往服朕言毋昜素守可朱諤除尚書右丞制勅朕仰承天休中外康乂嘉與黎獻守兹太平肆求一德之臣俾與萬幾之政具官某氣節剛毅才猷靖深道學貫於淵微明識開於倫􅁼夙以文采擢置甲科險夷備更趣尚堅正曩司風憲進長儀曹忠讜屢聞國是允賴宜膺柄任修輔朕躬於戯綱轄之地庶工所瞻其尚體朕用汝之意使命令之出於中臺者罔有不臧職業之𨽻於六官者罔有不肅是為克稱尚欽念哉可尚書右丞鄧洵武可尚書左丞制勅朕敷求一德之臣與之共治惟中外萬務總於文昌而左右二丞實司筦轄更踐厥次必惟其人具官某識度髙明謀謨忠亮夙以儒學揚歴要塗業履之優簡在朕志曩自憲部擢與機衡居多建明國是允賴宜膺寵命進服左綱於戯惟虚厥心乃能振舉樞憲惟正厥已乃能紏率官聨往服朕言勿替素守可梁子美除尚書左丞制勅朕宵旰圖治以承天休迺睠樞憲之臣均任股肱之寄簡知滋久褒陟為宜具官某材猷閎深器識淳大夙由學行之懿寖膺問譽之華踐揚居多險夷備歴靖共不撓公論所嘉比自民曹擢與大政業履休顯益契朕心宜服寵章序陞左轄於戯惟公惟正乃能振舉機要惟和惟一乃能協賛廟謨往服朕言尚加厲勉可吏部侍郎杜常可工部尚書制勅朕總覈名實凡小大之臣必惟詳擇庶幾協於克一守兹太平矧中臺六卿品秩髙顯選用之體得人惟艱具官某操履謀謨濟以問學持槖侍從望實兼隆疇若予工宜以命汝惟程衆藝飭五材咸總於汝尚其勉哉可承議郎試刑部尚書侯䝉可朝奉郎試刑部尚書制勅考績之政掌於有司雖吾八座之臣亦率是法具官某踐揚要路業履清優輟自中司分長憲部㑹課来上宜以序遷錫兹命書往其欽佩可御史中丞侯䝉可刑部尚書制勅中臺六卿時謂八座秩品隆峻選授攸艱具官某曩以材猷寖膺推擇擢自𤨏闥任予中司整飭憲綱克有譽處秋官之長往惟汝諧其既乃心以倡厥屬惟刑之恤庶紹前休可尚書左丞何執中可中書侍郎制勅朕宵衣旰食厲精萬幾惟二三執政大臣均任股肱之寄而發號施令根本於中書必惟忠良乃克有濟具官某器識端亮謀猷廓深早膺搜揚進講潜邸經術行誼朕所簡知曩繇銓曹擢總綱轄守正不撓為時老成是用延登西臺進聮右弼蔽自朕志協於師言於戯立政用人惟爾宣奉其尚益尊所聞迪朕以先王之典夙夜靡懈期厎成功罔専美於前人兹有辭於永世可鄧洵武除中書侍郎制勅朕考擇臣鄰與圖邦治惟右省號令所自實司化原用人於兹夫豈輕授具官某直方不撓寛裕有容學總六藝之文識通萬微之要揚歴華貫致位近司謀猷惟嘉翼賛國是比以序進延寘左綱忠恪之誠益契朕志宜膺寵命陞貳西臺於戯立政惟其當故徳澤下流用人惟其能故職業交舉往攄逺業勿替朕言可何執中除門下侍郎制朕詳延儒臣與之共政惟東臺出納命令緝熈皇極登建厥貳盖難其人具官某純誠不欺莊重有守識該通於倫類學兼綜於古今侍朕初潜舊膺睠察擢寘近弼師言允諧比服寵章進直西掖任屬加峻忠恪益彰宜以序陞位於黄闥於戯惟守正可以斷國論惟同寅可以亮天工往服訓詞圖休於永可左光祿大夫守門下侍郎吳居厚可資政殿學士充太一宫使制勅朕體貌大臣恩紀維厚任均佚勤之異禮全進退之宜具官某早服寵榮寖踐華貫再尹京甸兩冠民曹曩擢近司初持右轄洊由西掖進直東臺參贊政機屢更歳籥兹援引年之義數形避位之言封奏繼来悃誠莫奪宜從爾請昭示朕恩用加祕殿之名仍領真祠之秩是為優遇無怠欽承可御史中丞席旦可吏部侍郎制勅六官之貳皆予侍臣而吏部職任銓綜至於封爵䇿勲與夫㑹課殿最之法悉以咨之具官某曩直詞垣進陞𤨏闥繼自盾省擢摠憲臺文昌貳卿今以命汝惟朝廷所以馭羣吏者其法既具往祇厥服尚其懋哉可光祿卿除户部侍郎制朕以義理財庶幾家給人足國用饒羨如熈寧元豐之時間者修水土之政行鹽茗之法廣山澤之利復抵貸之令凡所以緝熈先猷者罔不備舉雖内則羣有司外則四方郡縣推行之至於逆其治聽其㑹以稽其勤惰登耗之寔則其責蓋在於民部故二卿之選今難其人具官某才識敏明操守純正踐揚中外練達事為比膺選掄長於勲寺凡邦國酒醴膳羞之事以修其儲備謹其出納節其等差量其豐約為職今予命汝以貳民部任雖不同舉斯以加諸彼擴而充之其則蓋不逺也往哉惟欽勿替朕命通直郎顯謨閣待制席旦可户部侍郎管勾右曹制勅朕總覈名寔為官擇人凡内外小大之臣罔不考勾矧中臺貳卿秩望華顯俾踐厥次必惟端良具官某學術純明操履堅正詞垣盾省憲府銓曹揚歴滋多休有譽處曩罹憂制既逮祥琴宜還近班往副民部體兹眷寵無替欽承可朝請郎試光祿卿韓持可戶部侍郎管勾右曹制勅朕總覈名實為官擇人凡内外小大之臣罔不考勾矧中臺貳卿秩望華顯俾踐厥次必惟端良具官某性資䟽通心術宏贍揚歴事任見謂詳明頃膺選掄擢長勲寺率職有裕朕所眷知宜服命書往副民部邦國材用汝實總之圖稱所䝉無替忠恪可廣西經略使王祖道除龍圖閣直學士制勅朕操爵祿之柄以褒勵庶工察其勞能雖微必錄矧服在帥閫而以四方之功達於朕聽宜優慶賞昭示寵嘉具官某䟽通有謀莊重不撓奉行詔㫖開闢土疆三至平州靡憚衝冐舊城既築新境来歸績效若兹良副眷倚用錫明命進直西清尚懋厥成嗣膺召擢可樞宻直學士知成都府虞䇿降充龍圖閣直學士制勅朕惟神考稽古驗今制免役之法以子恵天下紹聖纂承推原美意緝熈訓典垂休無窮朕嘉與公卿大夫守兹成憲其嘗紛更沮壊於其間者必治而懲之具官某頃任民曹職當遵奉迺懐私意妄改詔條彈章以聞考寔具在肆加貶黜用儆官師往省前愆毋重後悔可侍御史余深可除御史中丞制勅中司之任肅正朝端明法直繩國是允賴具官某氣莊以毅學博而醇曩膺選掄揚歴憲屬望實之峻朕不弭忘比自螭㘭延寘横榻風節勁特知無不言忠藎若兹良副朕志宜加褒顯擢總臺綱往服命書豈俟多訓可朝奉大夫充顯謨閣待制知瀛州張近可朝散大夫依前充顯謨閣待制差遣如故制勅叙進羣吏邦有典常雖吾從臣亦率是法具官某擢在帥閫克以材稱㑹課當遷有司條上宜陞品秩以示寵嘉往服朕恩無忘厲勉可衞尉少卿韓持可光祿卿制勅具官某光祿置卿班序視七寺為髙故常擇望實久次者居之惟爾累更事任往踐為宜凡邦國酒醴膳羞之政隨其等差務協於度時乃稱職尚欽念哉可朝請大夫光祿卿李閎可顯謨閣待制提舉宮觀制勅朕寵遇羣臣務全禮意均勞之典時乃異恩具官某服采於朝實長勲寺朕思處之不失其宜又念其頃帥師湖外討蕩蠻猺克復疆土且神考選㧞之臣是用假以宫祠聮職華閣從任優秩尚慎厥思可起居郎席震可衞尉少卿制勅具官某衞尉掌邦國器械文物之政令凡武庫之備與夫祭祀朝㑹羽儀節鉞之屬總焉汝比擢記史日侍螭㘭司衞副卿今以命汝往踐厥次尚其懋哉可
