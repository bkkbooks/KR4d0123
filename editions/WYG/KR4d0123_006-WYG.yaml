body:
  text: 摛文堂集巻六宋慕容彦逢撰制西蕃大首領皇城使某與轉遥郡團練使制勑具官某爾奉其方貢來造闕廷載考所有克效誠欵名使團結品秩優隆錫兹寵嘉庸示奬激無忘忠報以稱恩章可故左蔵庫使趙從義可贈皇城使惠州刺史充本州團練使制勑設館以待四方之臣置使董之品峻地親朕不輕授具位某貴主之子端謹慈良引例自陳祈恩于朕宜遷品序以示眷懐服兹命書往祇厥事可入内皇城使資州刺史王仲千可遥郡團練使制勑具官某朕操爵賞之柄以褒勵庶工必稽其行治勞列而後加焉以爾賦材明敏持已恪勤祇事禁廷夙彰譽處比膺推擇往視解池措置協宜克有成績大邦團結遥領使名錫兹恩章以為爾寵往加懋勉副朕眷知可右武衛大將軍合州刺史蔽之可遥郡團練使制勑具官某屬籍之親恩紀所厚其以恪謹聞者朕必察而進之惟爾序於内朝循理不越宜陞位秩昭示寵嘉益務欽承以稱朕命可皇城使合州刺史權發遣髙陽關路鈐轄李浦可特授廉州團練使制勑具官某惟爾効職邊圉總予兵鈐克以材能達於朕聴宜加甄奨示不弭忘團練寵名品秩隆顯服兹恩命無替忠勤可入内皇城使通州刺史藍安石可通州團練使依舊入内皇城使制勑具官某惟爾之父率職克勤復置茶塲㑹課增羨移恩子姪錫爾命書團結隆名選授尤慎往其欽佩務稱邦榮可皇叔右監門衛大將軍康州刺史仲證可特授依前右監門衛大將軍榮州團練使皇叔右武衛大將軍昌州刺史仲柔可特授依前右武衛大將軍貴州團練使皇叔右監門衛大將軍昌州刺史仲華可特授泰州團練使依前右監門衛大將軍皇叔右監門衛大將軍康州刺史仲瑳可特授海州團練使依前右監門衛大將軍制勅具官某等朕永懐孝思念兹祖考推原所自褒顯近親豈惟示敦睦之恩亦以彰忠厚之化爾等列于屬籍夙奉内朝恪謹有常祇循憲度宜錫命書之寵進陞團結之榮尚體眷勤克綏祉福可皇城使開州刺史黄式可恩州團練使依舊皇城使賈祥可開州刺史依舊皇城使制勑具官某等汝等咸以材能服采近密閲嵗云久勤恪靡愆序進厥官庸示嘉奨欽予時命尚其懋哉可莊宅使帶御器械凌文昞可轉皇城使依舊帶御器械制勑具官某爾以忠敢自勵累有戰功邉臣若兹朕所嘉懌宜加甄錄擢進使名恩典之優惟以示勸往服朕命尚欽念哉可入内左蔵庫副使梁敦可入内皇城副使制勑具官某叙進之法雖在疎逖㑹課以時况予宮省之臣哉惟爾持己之謹率職之勤稽其嵗勞宜有甄陟用錫名命昭示寵嘉往勵爾能尚有異擢可客省使興州防禦使張誡可除正任防禦使制朕慎擇疆塲之臣俾共武服稽其功次褒賞以時爾具官某勇而尚謀選任邊要肅軍捍冦積有戰多迨兹造朝宜錫恩命大邦禦侮擢正使名往克欽承尚多後祉可東上閤門使成州團練使張藴可依前官遥郡防禦使制勑朕考覈羣臣務先功實爵祿之賞資以勸能爾具官某材力之優揚厯事任總按肄武克有顯勞宜錫恩章擢陞厥位禦侮寵秩俾為汝榮往其欽承勿替勤恪可皇城使忠州團練使兼翰林醫官使李師祖可轉防禦使依前皇城使兼翰林醫官使制勑具官某爾以潛邸舊臣有勞可錄宜超常格擢進厥官防遏隆名選授惟慎今以命爾其往欽承可皇叔右武衛大將軍榮州團練使仲珙可特授威州防禦使依前右監門衛大將軍制勑具官某朕永懐孝思念兹祖考推原所自褒顯近親豈惟示敦睦之恩亦以彰忠厚之化爾列于屬籍夙奉内朝恪謹有常祇循憲度宜錫命書之寵進陞禦侮之崇尚體眷勤克綏祉福可皇叔右金吾衛大将軍降授通州團練使叔儺可特授依前右金吾衛大將軍成州防禦使皇叔右金吾衛大將軍降授真州團練使叔勻可特授依前右金吾衛大將軍虢州防禦使制勑具官某等爾曩掛吏議貶秩示懲既閲嵗時法當甄序名城禦侮復爾故官往勵恪恭副予敦睦可皇伯右金吾衛大将軍蘄州防禦使世闡可正任防禦使制勑具官某屬籍之親朕所惇睦以時叙進兹為典常惟爾序于内朝迪已恭恪稽其嵗月在法當遷宜正禦侮之名以序陟明之典往其欽佩務稱邦榮可皇城副使王務民可西京左蔵庫使制勑具官某爾舊服職宮省克有顯勞比加褒陞許以囘授用進爾秩時惟異恩往服命書宜思所稱可入内左蔵庫使張汝弼可左蔵庫使制勑具官某惟爾嬰恙滋久難任事勞宜解内侍之名往即真祠之秩尚加衛養以克有瘳可文思副使董惟正可左蔵庫副使制勑具官某惟爾精於推測中騐為多宜進官榮以示褒勸錫兹寵命往其欽承可西京左蔵庫副使馮熙可左蔵庫副使制勑具官某爾於服職有勞宜膺賞典許其囘授時乃特恩序進爾官以彰孝治往祇新命圖稱所䝉可入内内侍省供備庫副使張奭可入内内侍省西京左蔵庫副使制勑具官某朕設考績之法掌于有司其叙進羣吏必閲其嵗月稽其行治而後授之爾夙稱謹良服勤宫省校功數最宜有甄陞褒序厥官惟以示勸往服朕命思稱所䝉可入内文思使劉淵可入内左蔵庫使制勑具官某品秩異等褒勵庶工稽勞序遷厥有常格惟爾持己之慎服職之勤㑹課以時宜進厥位錫兹明命昭示寵嘉往承朕恩益思報稱可入内供備庫副使楊軫可入内西京左蔵庫副使制勑具官某校嵗月以叙遷有司之常格也爾率職恪勤功緒可考㑹課來上宜錫恩章往克欽承尚有異數可供備庫副使陳仲穆陳仲稀可兼閤門通事舍人制勑具官某等朕永念欽慈弗逮榮養恩加外氏式慰孝思爾等毓徳慶門夙稱勤毖參華上閤時庸展親往服寵章保兹譽處可文思副使曹慎可除兼閤門通事舍人制勑具官某賛謁殿中資望清美以爾迪己勤毖積有譽言宜膺寵嘉擢兹華職往服朕命尚懋承之可西京左蔵庫副使趙稱可文思副使仍除閤門通事舍人制勑具官某閤門置舍人以宣傳啓奏為職資望清優朕不輕授以爾服勤疆埸顯有勞能用加褒陞俾領厥次進官一等併示異恩往其欽承勉圖報稱可内殿承制閤門祇候劉安國可閤門通事舍人制勑具官某閤門通奏之職賛謁殿中事任親近惟爾詳練儀矩祇奉有勞宜加褒陞俾踐厥次欽予時命無替恪勤可内殿崇班閤門祇候藍安民可閤門通事舍人制勑具官某爾綴班内殿聫職上閤能以勤毖逹于予聞通事華資典司宣贊舉以褒陟昭示寵嘉往稱所䝉無替譽處可左蔵庫副使鄭璋可依前左蔵庫副使閤門通事舍人制勑具官某爾奉事潛宮勤毖可尚宜加褒擢示不弭忘上閤華資職任親近今以命爾往其欽承可右侍禁閤門祇候閻諶可閤門通事舍人制勑具官某軍器建局爾與有勞錄其囘授之恩叅以叙遷之法擢職通贊併示褒優往務欽承無忘報稱可入内西京左蔵庫使邵希直可入内文思使制勑具官某等戚藩進爵邦有常恩惟爾見謂恪勤以名來上序陞位秩昭示寵嘉往其欽承益思勵勉可入内西京左蔵庫使董舜臣可入内文思使制勑具官某朕考績之法按羣吏功緒而進之以示褒勸矧宮省之臣職任親近㑹課應法朕豈弭忘叙進爾官往其祇服可入内西京左蔵庫使陳宥可文思使制勑具官某宮省之臣率職靡懈有司㑹課在法當遷序進厥官以示褒奨往服寵命無替爾勤可入内西京左蔵庫使劉淵可特授文思使制勑具官某六尚奉御之臣職任親近勤毖不懈以及終更宜進厥官昭示奨激肆予命汝往其欽承可入内内侍省西京左蔵庫副使何沔可文思副使制勑具官某考績之法掌于有司非朝廷爵祿可計日以取亦惟念其率職之勞閲嵗之久而無罪悔是亦宜於有賞也進官一等為爾之榮往其欽承益思報稱可入内内侍省文思副使霍肅可入内内侍省左蔵庫副使入内内侍省西京左蔵庫副使黄彦可入内内侍省文思副使制勑具官某等考績之法惟以勸能汝等祇事宮庭恪慎不懈校功數最序進厥官往其欽承益思勵勉可皇城使成州團練使某人可依前成州團練使充昭宣使制勑具官某朕惟爵賞之施以勵天下茍有勤績其可弭忘爾曩以能稱往督藝事稽考其㑹宜示褒優序進使名品秩增顯惟克祇服尚有寵嘉可昭宣使福州管内觀察使同知内侍省事任瑞可宣政使餘依舊制勑曩命有官修夏人入貢之儀以垂永制成書來上用錫恩章具官某藴識疏通更練庶務資其典領條列該詳功緒為優宜膺懋賞宣政置使班秩加隆擢兹榮名昭示寵奨往其祗服無替忠勤可皇姪右千牛衛将軍不溢可荘宅副使制勑具官某屬籍之親領秩衛府願試吏事朕所嘉從易授使名往即銓任汝其勉哉可文思副使尹正可内園副使制勑具官某汝以勞進秩乞避名嫌有司具聞朕命昜授官雖次等於汝為安可軍器庫副使兼翰林醫官副使王處厚可翰林醫官使制勑具官某爾弟師厚以勞當遷移恩于兄朕所嘉聴用遷爾秩其往欽承可太醫承直翰林醫官局李袞可翰林醫官副使制勑具官某爾以醫診之勤久直主第特蠲嵗閲寵進厥官往其懋承務稱恩命可醫官杜日遷杜日思可並翰林醫官使制勑具官某等爾等進由方技勞效可稱宜加褒陞昭示奨激特蠲餘考寵以使名服兹異恩無替勤恪可左藏庫副使董惟正可授禮賔使制勑具官某禮賔置使褒遇武聯惟爾夙以恪勤獲事潛邸迨膺眷擢祇奉有勞宜錫恩章超進厥位往承無替保兹寵榮可河州岱爾族首領斯多特經與禮賔副使制勑具官某爾忠力武材雄于種族捍敵取勝積有戰多用加超陞以示奨激惟克祇服尚有寵榮可空名招納諸司使官制勑具官某効順之臣朕恩所厚榮名寵祿褒賞惟優爾稟資驍雄著聞族部奮忠歸義誠節可嘉宜錫命書列于使秩往其欽佩益懋事功可四方館使榮州刺史樞密副都承㫖朱孝孫可正任防禦使依前樞密都承旨制勑朕明發不寐有懐哲宗推原同氣之恩申錫外家之寵具官某操修端静識慮詳明欽成之親爾為近屬宜加進擢俾領使華正兵防之顯名仍樞筦之舊職與承密命秩峻地親惟時褒榮往其祇服可賈徳明任承睿可都承㫖制勑具官某等樞宥之府所承禀而宣行者皆禁密之命必求謹厚之材乃可備於陪屬以爾等有恪愿之資加肅給之敏麗名機務實惟勞舊按其資望擢總綱領勉思勤盡尚副褒寵可西京左蔵庫副使兼閤門通事舍人殿中省尚輦奉御兼勾當祇候庫劉景宣可候今任滿日特令再任制勑具官某惟爾祇奉輦輿兼職筦庫恪勤不懈能譽可嘉宜錫恩章命爾再任體予寵奨其懋承之可從事郎試辟廱博士馮師忠可候今任滿日令再任制勑具官某爾服職膠庠訓講有譽宜久厥任俾副士心往其欽承以待推擇可樞密直學士朝請大夫知定州管師仁可左朝議大夫依前樞密直學士候今任滿日令再任制勑持槖從臣出入閫寄聲績之茂達於朕聞宜錫恩章昭示褒賞具官某夙膺推擇揚歴清華兹守中山總護諸将經營保聚建築西闗峙積芻糧訓練師旅顯有勤勞之實仍加鎮静之能擢進文階寵以再任蔽自朕志爾其懋承可太學博士蘇睿可候今任滿日令再任制勑具官某爾以術業行義與太學師儒之選克有譽處達於予聞宜久厥官以訓多士欽承無怠嗣有寵嘉可将仕郎試辟廱錄朱承可候今任滿日令再任制勑具官某爾由太學陞選寖服官榮擢寘辟廱閲日滋久率職有譽達於予聞爰錫命書寵以再任欽承毋替嗣有褒甄可從事郎試太學錄孫疇可候今任滿日令再任制勑具官某爾以經術行能服在太學效實之美達于予聞宜錫命書寵以再任尚有異擢爾往懋哉可奉聖㫖米芾罷郎官差知淮陽軍制勑具官某春官總禮樂學校之政令為郎於此時謂崇途惟爾險怪詭譎好為竒言異行言章以聞理宜斥罷黜守軍壘有社與民往省厥愆無重後悔可左朝議大夫試兵部尚書兼侍讀劉拯御批劉拯操藴姦邪詆沮朝廷已行之命言涉不遜在理豈容可落職差知蘄州制勑六官之長時予邇臣獻納謀謨當體國是茍愆素守罰其可逃具官某召自遐方寖更顯擢弗思砥礪以報寵章迺操藴姦邪濟以狠愎詆沮成命言涉不恭彈章亟聞朕不汝赦黜守支郡有社有民尚為寛恩無忘循省可龍圖閣學士朝散郎知河南府范致虚可特降兩官制勑侍從之臣朕所信任茍弗務忠實懐私誕謾宜昭典刑以示禁戒具官某曩繇疎逺擢備清華而自蹈匪彞犯干公義訟田積嵗汝實建謀訴牘具存豈不信與連興犴獄煩紊有司追兹考證之明灼見欺誣之迹黜官二等時迺寛恩往省厥愆無重後悔可張轂特降兩官制勑具官某朕念屯戍之師服勞于外故撫寧其家唯恐弗至比命汝察其廩給蓋以防猾夫侵漁其間也汝弗往躬省老稚籲聞獄辭具孚朕不汝赦黜官二等俾懲厥愆祗服寛恩勉圖後効可蔡王府都監入内西京左蔵庫副使李永言降兩官制勑具官某黜罰之施昭示禁令爾弗克毖慎自干典刑閲辭具孚宜有懲責特衝舊服仍降兩官尚為寛恩往省厥咎可宗室金吾衛大将軍代州防禦使克如降兩官勒住朝參制勑具官某朕敦睦宗族以隆親親黜賞之施時惟政典爾弗務恪慎自蹈匪彞達於朕聞按騐不爽宜加懲責以允明刑特降兩官仍罷朝謁尚為寛宥無重後愆可淮東提刑章縡降兩官送吏部與逺小處監當制御批崇寧五年六月二十一日指揮不帶舊鈔在帶舊鈔之上蓋為三分鈔立法今香鹽司将三分鈔舊法擅在七月十三日五分新鈔之上仍一面行下鹽塲支鹽五分鈔行之未久始克就緒而香鹽司官挾情沮壊御前處分身任其事公害其法不正典刑何以懲勸其本司官可先次衝替仍降兩官送吏部與逺小處監當吏人杖一百決訖勒停勑具官某鈔法之行始克就緒爾身任其事所宜遵承而迺挾情自私阻壊詔㫖遂非無憚良駭朕聞不正典刑何以示戒宜先衝罷仍黜厥官俾還銓曹逺司筦庫往加循省勿重後愆可端明殿學士朝散大夫曾孝寛可差知鄆州降授奉議郎趙卨可差知徐州制勑朕仰稽前世督正治官使暨乃僚以倡守牧眷惟巨屏屬在真才具官曾孝寛朕所簡知勲徳之後惠和詳慎克紹其門汶陽之田風醇土沃往諧共治以康元元俾邦咸喜曰有良翰時爾稱職其益懋哉可勑具官趙卨通敏宏毅志欲有為朕所簡拔列之法從比縁小眚謫莅軍壘言念省循是遷徐土爾維布宣朕徳以恵元元俾邦咸喜曰有良翰時爾稱職其益懋哉可趙靖特降一官仍衝替制勑具官某爾為獄官聴辭爽實逮加覆按具得厥情降秩示懲仍特衝罷兹惟政典用戒不䖍可城南廂安濟坊提轄使臣左班殿直蒋迪可降一官衝替制勑具官某朕置安濟坊以療疾病之民法令既備尚慮有司奉行不䖍命官按視惟爾弛慢失職達於朕聞宜黜厥官仍加衝罷以昭示訓懲為羣吏之戒可承議郎黄彦承制劉亦侍禁王運殿直張大忠各先降一官送大理寺取勘制勑具官某等汝等服在大官弗克勤毖宴饌廢缺良駭予聞降秩示懲仍俾推治往思厥咎毋重悔尤可循化城守禦將佐等京東第六副將供備庫副使郭昱特與轉兩官同總領河州蕃將兵内殿承制王徳厚特與轉西上閤門副使知城寨東頭供奉官劉歆特與轉兩資安强寨守禦將佐等秦鳳第三將左蔵庫使呂整大通城知城供奉官楊徳管押餘丁使臣供奉官孫元各特與轉一資内楊徳特更與減一年磨勘制勑具官某等爾等擐甲執兵服戎疆埸招納守禦咸有顯勞條狀以聞第遷位等無忘忠報以稱寵休可使臣安質劉誠時惲可並轉一官大將耿宗言孫吉可並轉一資制勑具官某惟爾預修城堡工役不愆稽其勞能宜有甄奨錫兹恩命無怠欽承可西京左蔵庫副使兼閤門通事舍人陳仲佾供備庫副使兼閤門通事舍人陳仲俅陳仲偉可各轉兩官制勑具官某等朕追懐欽慈弗逮榮養於其遷祔施澤外家爾等恪謹慈良實在近屬比還姓氏抗疏自陳惟兹叙進之恩時乃已行之命往綏寵祿以副朕心可内殿崇班王祥趙暉郝軫各轉一官張吉朱定各轉兩官皇城使劉法轉遥郡刺史供備庫副使石舜舉轉兩官制勑具官某等朕恢復河湟遹追先志爾等出入行陣積有戰多幕府以聞朕用嘉止爰考功次序進厥官往服恩章益勵後效可皇城副使兼閤門通事舍人折可大特與轉西上閤門副使内蔵庫使王亢左騏驥副使卓裕勒左蔵庫副使經諾爾各轉一官西京左蔵庫副使鄂特寜與轉兩官制勑具官某等朕以文徳武威撫寧疆埸爾等出入行陣克懋忠勤論次厥功第加賞拔益思奮勵以副恩章可從事郎充熙河蘭湟路轉運司勾當公事程固可改合入官差遣如故制勑具官某士由遷調以升京秩者朕必引之陛見親閲其人爾今居職而朕就命之爾之膺此可謂榮矣其究乃心以圖報稱可直龍圖閣權發遣河北路都轉運使梁子美可特落發遣字制勑具官某朔部被邊帶河國之根本總司漕輓委用不輕爾才力有餘濟以勤恪宣勞外服所至可稱比繇簡知專往使事率職愈勵朕豈弭忘用加褒陞寵以資任祇服恩命尚其懋哉可承直郎趙知機可換右職制勑具官某爾數犯刑典難齒左銓昜授武階俾有餼廩往其兢慎尚免後愆可京畿轉運副使張杲可陞充轉運使仍遷一官制勑具官某置使京畿總司漕輓職專刺舉權任匪輕爾頃膺選掄擢貳厥事與建北輔勞力可嘉宜正使名乃遷秩序兹為褒寵無忘欽承可詳定編修國信條例所㸃檢文字喬永慶及左班殿直梁善王宗望三班借職是清三班奉職聶通可各轉一官管勾都亭西驛所前行陳公昂可借職制勑具官某朕推恩書局不掩爾勞寵以官榮往其祇服可朝請大夫知鄧州向宗賢可轉一官差遣依舊制勑具官某師帥之長與予共治有勞可錄夫豈弭忘惟爾材力之優率職有裕葺完東郡成績可嘉宜錫恩章以示甄奨進官一等時乃異恩往其欽承益思所稱可右侍禁充翰林書藝局祗候睿思殿御前文字庫祇應鄧惟賢特與轉一官依舊帶破見請驛料待詔請給制勑具官某惟爾書藝有勞進遷位等餼廩稱事亦以勸能往服恩章無忘勤毖可蕃官皇城使昭州刺史韋順明皇城使嶽州刺史劉延壽特與換漢官左蔵庫使折可名内殿崇班格節各與轉一官制勑具官某等爾等奮身效順來造闕廷忠義若兹朕所嘉尚載加褒擢以示寵榮祇服命書無忘報稱可宣徳郎王雲為進崇寧奉使雞林志文理可採特轉一官與諸軍差遣制勑具官某比嘗遣使往撫三韓爾以牋筦從行實紀其事文理可採宜有褒榮序進厥官俾守軍壘往加勵勉以稱所䝉可
