body:
  text: 摛文堂集卷十四宋慕容彥逢撰祭文祭葛朝奉文某罪逆不孝故春三月扶護東下秋七月與丈人相遇於維揚時丈人氣貌恱懌步趨輕捷瞻視有力飲啖倍常咸謂壽祉方未艾也拜别不半年凶問奄至嗚呼哀哉尚忍言之邪承靈柩至毗陵某泣血待盡不敢違几筵前詣喪次謹遣弟某往致薄奠伏惟尊魂特垂鑒察祭壽光夫人文某等罪逆不孝酷禍上延俾我慈親奄棄遐壽夏五月自京師扶侍神柩循汴東下逹于淮泗又東濟于江秋七月至於宜興爰得吉卜以翼日甲申安厝於邑南篠嶺之原嗚呼痛哉自今以往一之日二之日永千萬年無復見我慈親號呼劈踊心肝摧裂罪逆深重蒼天蒼天尚饗三省祭蔡顯謨母金郡君文惟靈有婉其德有淑其儀閨閫之譽協於聲詩厥初告吉夢維熊羆是生賢子蔚為庭芝長從持橐仲飭朝緌清規雅望寵膺眷知方隆榮養溫凊具宜奄其淪謝何痛如之奠有芳醴薦有明粢尚其未泯監此忱辭尚饗墓志宗室故騏驥使贈博州防禦使追封博平侯墓志銘惟博平侯叔樂字和甫昭化軍節度使觀察留後彭城郡公克孚之子深州團練使承訓之孫廣平郡王德隆之曽孫也母曰南康郡夫人石氏治平元年賜名授右內率府副率兩遷至右千牛衛將軍改莊宅副使五遷至右騏驥使勳上柱國爵天水郡開國侯食邑一千五百户食實封一百户歷陳州堰閘西京窰務汾揚二州郡監濵州鈐轄崇寧元年十一月十九日終享年五十三贈博州防禦使追封博平侯以大觀元年某月某日葬於汝州梁縣公恩性淳至好學自強居官恪勤所至有譽在濵時方嵗飢饉公以招軍為請繼修城壁樓櫓俾食其力賴是全活者甚衆娶張氏封壽安縣君子四人輔之左班殿直翼之右班殿直直之得之皆三班奉職輔之直之早喪女四人長適左侍禁馮澄次適右班殿直王楫餘尚幼銘曰氣升清明魄降沉翳升與陽俱孰窺其際降宅在兹銘於新竁宗室故贈武康軍節度使觀察留後封洋川郡公墓志銘公諱叔淡字靖之保康軍節度使留後南康侯克凝之子虔州觀察使南康侯承睦之孫宣德軍節度使同中書門下平章事兼侍中廣陵郡王德雍之曽孫也母安平縣太君張氏慶厯八年賜名授右內率府副率纍遷金吾衛大將軍秀州防禦使改宫苑使遷皇城使歷泰唐二州兵馬鈐轄崇寧二年三月十五日卒於唐州享年五十有三贈武康軍節度使觀察留後追封洋川郡公以大觀元年某月某日葬汝州梁縣娶宋氏封長安縣君子八人千之右武衛大將軍簡之理之明之鯉之皆左侍禁畀之左班殿直賚之右班殿直琠之三班奉職女九人長適三班奉職宋宜孫餘在室孫十一人翊三班借職􅀈竦餘未名孫女六人長適三班奉職潘唐餘尚幼公少嗜學問尤工為詩章事親盡孝居喪盡禮嵗時薦享盡誠治家嚴肅居官廉謹以故姻族莫不賢之銘曰進德不怠以克有終曄曄愍册洋川之公納銘幽竁永詔無窮宗室故左侍禁墓志銘宗室叔忞字傳道廣陵郡王德雍之曽孫虔州觀察使南康侯承睦之孫保平軍節度使成國公克戒之子母曰同谷夫人李氏所生母王氏初授右班殿直纍遷左侍禁歷監蔡州褒信酒務監在京倉耀州兵馬監押性剛正喜立事功居官為當路稱薦崇寧二年五月三日卒享年三十有六以大觀元年三月二十九日葬汝州梁縣子三人誨之誼之諝之銘曰窽土為宫既寧既密刻石同藏始終尚吉宗室故懷州防禦使河內侯墓志銘公諱徽之字天和武信軍節度使循國公承慶之曽孫開府儀同三司建國公克繼之孫開府儀同三司榮國公叔敖之子初授太子左清道率府副率纍遷右監門衛大將軍崇寧二年舉進士女適姓某孫四人曽祖某祖某父某知微有賢行豫女弟歸焉將葬請豫為銘義不可辭銘曰性淳謹言行慈良積善在躬宜吉祥受祉未豐今也亡天之報施窅難量詵詵子孫來者長有如不信考銘章宗室右金吾衛大將軍河州防禦使贈保慶軍節度觀察留後追封房陵郡公墓志銘公諱叔尊字應之鎮寧軍節度使濟國公克彰之子相州觀察使克矩之孫潁川郡王德彛之曽孫也母曰永嘉郡君楊氏嘉祐四年授太子右內率府副率纍遷至右金吾衛將軍河州防禦使崇寧二年二月十八日終享年四十有九贈保康軍節度使觀察留後追封房陵郡公大觀元年三月二十九日葬汝州梁縣娶潘氏封永康縣君先公卒子五人祚之故右侍禁襲之左班殿直襄之右班殿直一不及名卒女三人長適左班殿直徐肩餘卒孫五人公明公忠公哲二尚幼公仁厚端謹事親以孝聞善與人交久益親韙平居耽玩經籍口不挂臧否晚得釋氏書説之頗謂有得宗正狀公行實如此銘曰稟質之粹蹈慈祥兮操行之潔好端莊兮學務該綜士自強兮晚誦內典悟津梁兮有賢如公令譽彰兮刻銘幽石永有光兮宗室故西頭供奉官墓志銘宗室叔璫字君玉華州觀察使華隂侯克告之子鎮寧軍節度使同中書門下平章事陳國榮僖公承錫之孫潁川安簡王德彞之曽孫也母曰安定縣君杜氏六嵗賜名授右班殿直纍遷西頭供奉官歷監相州廣濟軍庫𣙜貨務最後監真定府市易務不赴崇寧二年十二月二十九日卒享年三十有四以大觀元年三月二十九日葬汝州梁縣妻張氏子五人相之樞之皆業進士某幼未及名卒女五人在室者三人餘早卒君事親以孝涖官以勤與人交以信壽雖不延位雖不顯其嚮善有足嘉者銘曰質幹之良尚多後祉壽弗克延命也天只宗室故左班殿直石志左班殿直叔圭紹聖二年正月十九日生崇寧二年六月八日卒享年九嵗大觀元年三月二十九日葬汝州梁縣曽祖德彝故潁川郡王祖承錫故鎮寧軍節度使同中書門下平章事陳國公父克家見任右千牛衛將軍謹志宗室故右武衛大將軍真州刺史開國公贈密州觀察使追封髙密侯墓志銘公諱叔鄭字季武右領軍衛將軍克省之子武信軍節度使觀察留後遂寧郡公承衎之孫潁川郡王德彞之曽孫也母曰長壽縣太君王氏治平二年賜名授右內率府副率纍遷右武衛大將軍真州刺史勳上柱國爵開國公食邑一千六百户實封五百户崇寧三年三月十五日卒享年四十有一贈密州觀察使追封髙密侯大觀元年三月二十九日葬汝州梁縣娶郭氏封永寧縣君公性孝友善與人交中外姻戚罔不歡韙國有大禮擇宗室執事公多與焉銘曰德之吉矣受祉維寧天胡嗇之弗永齡刻此幽石揚芳馨宗室故右金吾衛大將軍雄州防禦使贈安化軍節度觀察留後追封髙密郡公墓志銘公諱叔納字才元曽祖德雍廣陵郡康簡王祖承睦虔州管內觀察使南康侯父克彚安化軍節度使昌國公皇祐六年賜名授右內率府副率纍遷右武衛大將軍階州刺史改康州團練使進右金吾衛大將軍雄州防禦使公莊重沉默無聲色嗜好獨喜誦書尤有得於老莊之言居昌國公喪哀毁盡禮嗣濮王宗晟往弔之曰若公家父子孝義復何用宗官乎奉朝請三十年未嘗有過崇寧三年八月三日卒享年五十有二贈安化節度使觀察留後追封髙密郡公以大觀元年三月二十九日葬汝州梁縣娶彭氏封宣城縣君子二人堅之左侍禁早卒琠之三班奉職女二人長適右侍禁梁甡次適右侍禁馬慶嗣女一人尚幼銘曰儀儀髙密慎終如初聲色在前委而勿趨開卷有得資以自娛吁其賢矣視此銘書宗室故金吾衛大將軍淄州防禦使贈安化軍節度觀察留後追封髙密郡公墓志銘公諱叔峙字德瞻鎮寧軍節度使濟國公克彰之子相州觀察使承矩之孫潁川郡王德彝之曽孫也母曰永嘉郡君楊氏公幼莊重七嵗誦書日至數百言長益邃於學事親孝永嘉夫人有疾公刲股進之遂愈居喪水不入口者三日終制疏素性多巧思自奕射聲律咸精其能纍官至右金吾衛大將軍淄川防禦使勳上柱國爵開國公食邑三千七百户食實封七百户崇寧三年六月十日卒享年四十有七以大觀元年三月二十九日葬汝州梁縣子九人延之左班殿直進之右侍禁縱之承議郎在之三班奉職緝之靖之竦之竑之翊之皆未仕而縱之中進士第進之在之緝之皆薦於有司女四人長適內殿承制閣門祇候張益次適故右班殿直閣門祗候兼尚書局奉御鄭純次在室次早卒孫十有一人公恂公望公佐公似公仁公倚公才餘早卒孫女四人銘曰宜泰而莊宜佚而勵操行之淳學問之邃以振厥聲以綏厥位刻詩方砥以質幽竁宗室涇州觀察使第十七子石志嚮之元祐七年正月五日生崇寧四年四月二十五日卒享年十四以大觀元年三月二十九日葬汝州梁縣曽祖承亮故樂平郡王祖克沖故右驍衛大將軍父叔皮見任涇州觀察使謹志宗室故西頭供奉官墓志銘宗室升之字君儀涇州觀察使叔皮之子右驍衛大將軍克沖之孫感德軍節度使同中書門下平章事追封樂平郡王承亮之曽孫也初授三班奉職纍遷西頭供奉官歷潁昌府商稅務在京麥界牧養馬監後調潁州界溝鎮不赴君七嵗能誦書見謂敏悟既長益嗜學問所著歌詩雜文甚多居官勤恪數為當路稱薦又以勞列被賞崇寧四年九月二十四日卒享年三十有四以大觀元年三月二十九日葬汝州梁縣娶張氏子二人公輔嘗薦於有司公輅尚幼女六人長適張天祐餘在室銘曰諏日既吉卜宅既寧發揮行實尚監兹銘宗室故三班殿直石志右班殿直叔官元祐元年四月二十六日生崇寧四年閏二月二十八日卒享年二十大觀元年三月二十九日葬汝州梁縣曽祖德彝故潁川郡王祖承襲故鎮寧軍節度使同中書門下平章事陳國公父克家見任右千牛衛將軍謹志宗室故右武衛大將軍文州刺史贈同州觀察使追封馮翊侯墓志銘馮翊侯爵之字子厚保度軍節度使房國公叔武之子光州團練使克虔之孫青州觀察使樂安侯之曽孫也母曰長安郡君劉氏初授率府副率纍遷右武衛大將軍文州刺史崇寧四年五月八日卒享年四十有五贈同州觀察使追封馮翊侯娶范氏封永安縣君先公卒子四人公謹三班奉職早卒公倬公俅皆右班殿直公佑三班奉職女三人一卒餘尚幼公事親盡孝待人盡禮而奉巳甚約獨喜誦五經諸子之言以大觀元年三月二十九日葬汝州梁縣銘曰祿位之寵有曄有華德雖稱之壽弗遐安此吉宅宜其家宗室故右金吾衛大將軍鳳州防禦使贈安化軍節度觀察留後追封髙密郡公墓志銘公諱叔耘字勤之宣德軍節度使兼中書令廣陵康簡王德雍之曽孫太尉樂平恭靜王承亮之孫定州觀察使博陵侯克暨之子也母曰壽安縣君王氏所生母曰永福縣太君宋氏嘉祐三年賜名授太子右內率府副率纍遷右金吾衛大將軍鳯州防禦使勳上柱國爵天水郡開國公食邑四千五百户食實封一千户崇寧五年九月五日終享年四十有九贈安化軍節度觀察留後追封髙密郡公娶李氏封永康縣君子節之左侍禁理之左班殿直資之右班殿直握之三班奉職恭之翼之和之立之孫公巽公懋公事親孝祖母篤疾齋戒燃肌以禱於神幼失所生母嵗時愴感揮涕終日天資淳厚言不及臧否喜誦道書晨昏不懈大觀元年三月二十九日葬汝州梁縣銘曰事親惟孝守身惟誠本既立矣如木之榮殁而不朽尚監兹銘宗室故濮州團練使贈潤州觀察使追封丹陽侯墓志銘丹陽侯叔前字伯先中正軍節度使同中書門下平章事江國公之曽孫青州觀察使樂安侯承遵之孫蔡州觀察使汝南侯克觀之子母曰廣平縣君宋氏公幼喜誦書長益敏於學文詞筆札衆所歎譽事父母孝汝南侯有疾公刲股進之遂愈人以為誠孝所感崇寧四年三月二十四日卒享年五十有二公初授太子右內率府副率纍官至濮州團練使贈潤州觀察使追封丹陽侯以大觀元年三月二十九日葬汝州梁縣娶張氏封和順縣君先公卒子八人孝之左侍禁成之右侍禁禮之匱之皆左班殿直祐之三班奉職尚之漢之餘未名女二十有二人左侍禁曹綬右班殿直黃珫三班借職徐演三班奉職曹滵左班殿直夏儒其壻也一適三班奉職郭才卿先卒餘在室孫公俞公愈公恕公忞餘未名孫女九人銘曰敏學問善文辭事親誠孝身可刲祿豐位顯惟其宜享年勿遐人所悲耀茲潛德有銘詩宗室故右班殿直墓志銘宗室翊之字望弼曽祖承亮感德軍節度使同中書門下平章事樂平郡王祖克沖左驍衛大將軍父叔峩右武衛大將軍濵州團練使元祐二年補三班奉職改右班殿直崇寧四年十一月二十五日卒享年二十有八以大觀元年三月二十九日葬汝州梁縣君幼不喜弄長益孝謹好學問屢試於有司兩娶皆石氏子一人公侃銘曰遵彼汝墳卜竁云吉世次行能考兹芳石宗室故贈密州觀察使追封髙密侯墓志銘公諱矢之字伯直右金吾衛大將軍汝州防禦使叔縱之子左驍衛大將軍克沖之孫感德軍節度使同中書門下平章事樂平郡王承亮之曽孫也初賜名授右內率府副率纍遷右武衛大將軍渝州刺史崇寧四年正月十九日卒享年四十有三贈密州觀察使追封髙密侯娶陳氏封永寧縣君先卒子八人公澤左班殿直公濟右班殿直公潤公溉公泳公淨公湜女二人長適右侍禁楊京次在室孫四人公莊重寡言喜誦書能為文辭其事親以孝大觀元年三月二十九日葬汝州梁縣銘曰爵祿之盛既克保之贈襚之優亦克稱之行實可考銘以昭之宗室故左班殿直墓志銘宗室叔濋字德源莫州防禦使克施之子河東郡王承衍之孫武昌節度使同中書門下平章事德存之曽孫也母曰壽昌縣君王氏元祐元年賜名補右班殿直改左班殿直崇寧四年授滑州倉草場未赴五年二月二十一日卒享年二十有五娶夏氏繼室郭氏君性敏悟八嵗能誦書得升中學長益親翰墨嘗獻崇寧聖德頌其趨尚為士大夫所稱處家孝友不喜聲色以大觀元年三月二十九日葬汝州梁縣銘曰如蘭之馨方茁其芽忽云悴矣姻族之嗟宗室故左班殿直石志宗室田之字耕道深州團練使承訓之曽孫昭化軍節度使觀察留後髙密郡公叔建之第四子也母曰永安縣君朝氏熙寧二年賜名授右內率府副率纍官至右千牛衛將軍勳上護軍爵開國公崇寧三年坐法廢五年四月十六日卒享年四十有二以大觀元年三月二十九日葬汝州梁縣娶鄭氏封仙源縣君先君一年卒子公式三班奉職三女在室銘曰名秩之寵自其幼時終以無祿嗚呼可悲宗室丹州防禦使第五子石志殤子安之元符元年八月二十四日生崇寧五年六月十四日卒年九嵗大觀元年三月二十九日葬汝州梁縣曽祖承操故涇州觀察使安定侯祖克助成德軍節度觀察留後常山郡公父叔履見任右金吾衛大將軍丹州防禦使謹志宗室故右監門衛大將軍贈懷州防禦使追封河內侯墓志銘河內侯諱叔佾字子儀同州觀察使馮翊侯克貺之子寧國軍節度使原國公承炳之孫宣德軍節度使同中書門下平章事兼侍中樂平郡王德雍之曽孫也母曰北海縣君王氏熙寧元年賜名授太子右內率府副率纍遷左監門衛大將軍勳上柱國爵開國公崇寧五年六月一日卒子五人裕之􅀈之皆三班奉職祚之早卒餘未名女六人適右班殿直杜彥侯進士郭俅曽允誠一在室餘早卒公性純孝母疾革刺肌血以禱於神未幾康復幼喪其母言及必涕泗交下姻族稱之大觀元年三月二十九日葬汝州梁縣銘曰至矣孝德一言而該公之事親終身之哀刻兹方石以播清埃宗室故左班殿直墓志銘宗室叔􅜜字彥直五嵗賜名授左班殿直崇寧五年三月二十四日卒享年二十有二以大觀元年三月二十九日葬汝州梁縣曽祖德彝潁川郡王祖承錫鎮寧軍節度使同中書門下平章事陳國公父克􅐅右千牛衛將軍母曰永春縣君夏氏總角讀書日至數百言稍長益勤講習上初建宗子學考選之法悉視成均君為多訓齋諭以稱職被恩云娶曹氏銘曰質淑賦之壽孰嗇之終以無子吁其可悲宗室故贈泉州觀察使追封清源侯墓志銘公諱叔紺字子春忠正軍節度使開府儀同三司秦國公克愈之子樂平郡王承亮之孫廣陵郡王德雍之曽孫也母曰平陽郡太夫人于氏所生母曰大寧郡太君郭氏五嵗賜名授太子右內率府副率纍遷右武衛大將軍興州團練使勳上柱國爵開國公實封八百户崇寧五年正月二十七日卒享年五十有四贈泉州觀察使追封清源侯娶白氏封壽光縣君先公二十年卒子十一人益之西頭供奉官和之右侍禁進之左班殿直信之三班奉職德之舉進士嶽之教之勝之髙之感之未名女六人長適三班奉職郭滌次適曹激二在室早卒公事親孝居喪以毁聞天資剛正守禮不越治家訓子肅如也以大觀元年三月二十九日葬汝州梁縣銘曰孝以事其親禮以禔其身守貴若兹亶惟善人哀榮終始勒於幽珉宗室東頭供奉官夫人王氏墓志銘宗室東頭供奉官叔琠之夫人王氏曽祖潛定武軍節度觀察留後祖中庸左衛上將軍父承昭皇城副使母曰長安縣君李氏夫人性柔慧事父母孝既嫁上承下撫無不得其歡心崇寧三年九月五日卒享年三十有一大觀元年三月二十九日葬汝州梁縣子七人元之逺之未仕逵之遷之迪之述之通之皆卒女七人適進士胡琳三班奉職李伯總餘尚幼銘曰慈祥柔順婦德維嘉宜壽而夭命邪非邪故仁和縣君王氏墓志銘宗室右金吾衛大將軍秀州防禦使惠之夫人王氏世開封人曽祖審琦贈中書令追封秦王祖承佑贈左武衛大將軍父世彥朝散郎夫人在家以孝聞既嫁事姑如事其親防禦君少有譽於宫邸夫人能相以恭順撫諸子均一人不知嫡庶之異崇寧四年四月二十一日卒享年五十有九子十人詠之右內率府副率進之益之皆左侍監説之餘未及仕者六人皆早卒女九人左班殿直武立西頭供奉官王琪左班殿直衛元之三班奉職李棠左侍禁羅逵右殿直白粹中右班殿直王公倬其壻也餘早卒孫男九人公泰三班借職餘未仕孫女三人夫人之歿術者以陰陽拘忌為言再浹日乃殮方暑肌色如生人以為積善之報云大觀元年三月二十九日葬汝州梁縣銘曰善必有報天理之常乃如夫人終以吉祥云誰不信監此銘章宗室左侍禁夫人龔氏墓銘左侍監欣之夫人龔氏幼聰慧既嫁能相其夫以義疾雖革亦以忠孝為言崇寧元年正月一日卒於處州之官舍享年二十有七以大觀元年三月二十九日葬汝州梁縣女二人尚幼夫人蓋金紫光祿大夫世昌之曽孫左藏庫副使意之孫西頭供奉官咸之子也銘曰嵗時協吉宅兆允臧吁其葬矣刻志同藏故德安縣君彭氏墓志銘宗室濮州防禦使叔干之夫人彭氏左藏庫使崇正之女左千牛衛將軍再問之孫武昌軍節度使贈中書令睿之曽孫年二十一歸於防禦封德安縣君夫人治家訓子有法奉已雖約至賙人之急弗吝焉嵗時薦享如見所祭喜誦釋氏書朝夕靡懈崇寧二年二月二十日終享年五十有八以大觀元年三月二十九日葬汝州梁縣子十人勴之右武衛大將軍逹州刺史贈滄州觀察使景城侯劼之前右侍禁助之左班殿直劤之績之皆左班殿直餘早卒女已嫁者二人壻內殿崇班許彭年右班殿直任仲述三人尚幼八人早卒孫十有一人公侃右班殿直公偉公佐公僅公義公順一未名餘早卒孫女十人曽孫二人銘曰生宜厥家殁安此室刻志同藏惟德之述華隂侯妻杜氏墓志銘宗室故贈華州觀察使追封華隂侯克告之夫人杜氏世家鎮陽自昭憲皇后貴始為開封人曽祖審進靜江軍節度使贈太師中書令兼尚書令追封京兆郡王祖彥彬禮賔副使父贊仁閣門通事舍人贈左屯衛大將軍夫人幼端莊不喜嬉戲年十七歸華陰侯事舅姑以孝率媵妾以正訓子孫以義自奉清約頗通內典持五戒行終身不廢崇寧元年十月二十三日卒享年六十有六封安定縣君子十有一人叔陶贈建州觀察使追封建安侯叔瑚故率府率叔莆內殿崇班叔鞶故左侍禁叔璫故西頭供奉官叔靄叔鍵皆西頭供奉官叔躬左侍禁叔麃左班殿直餘不及名卒女十有二人長七人早卒次故金華縣君適右侍禁呂哲次長壽縣君適左侍禁李佾次永壽縣君適前右班殿直馬宇次適左班殿直杜珫次適右班殿直王宗文孫三十有四人保之伋之皆左侍禁傳之故三班奉職修之靖之相之端之誼之訓之傑之價之樞之禮之説之澤之潤之俊之皆習進士而靖之相之端之𨽻業宫學以行誼稱愈之翊之説之竴之早卒餘不及名孫女二十有六人長適故右侍禁假希顔次適右侍禁華鎮次適通仕郎周士堯次適將仕郎宋亶次適三班借職郭授次適進士劉公輔次適三班借職鄭公寀次適三班奉職髙公柔次適三班借職王公總在室者十有二人餘早卒以大觀元年三月二十九日葬夫人於汝州梁縣銘曰宜佚宜豐不怠不侈宗婦若兹允也賢只詵詵子孫報施在此故和義郡君胡氏墓志銘夫人姓胡氏開封人衛尉少卿令儀之曽孫耀州三原縣主簿規之孫渭州軍事判官潛之女也治平元年歸於宗室成州防禦使叔彖初封金華縣君進和義郡君崇寧二年四月三日卒享年五十有五子三人但之右侍禁次升之景之女適左班殿直王仲瑞其二早卒夫人事舅姑以孝相夫以義訓子以學撫媵妾以慈晚喜釋氏持誦不懈以大觀元年某月某日葬汝州梁縣銘曰維嵗丁亥日吉辰良卜兹新竁萬嵗之藏故仙源縣君鄭氏墓志銘宗室前千牛衛將軍田之夫人鄭氏贈太師開府儀同三司兼尚書令守忠之曽孫左驍衛上將軍惟懿之孫左藏庫使價之女也母曰華源郡君趙氏夫人幼聰慧事父母盡孝既嫁事舅姑盡禮喜誦書能為詩章崇寧三年九月一日卒享年三十有五以大觀元年三月二十九日葬汝州梁縣子公式三班奉職女在室銘曰嵗月惟吉宅兆惟寧歸從其夫考德有銘宗室右侍禁夫人李氏墓志銘宗室侍禁叔旄之夫人姓李氏世開封人曽祖德昭昭化軍節度使贈太師尚書令兼中書令追封崇國公祖惟賢榮州團練使贈右金吾衛上將軍父宗述供備庫副使夫人幼敏慧年二十歸於叔旄性謹約不喜華侈崇寧三年七月十四日卒享年二十有八以大觀元年三月二十九日葬汝州梁縣子一人未名卒女二人尚幼銘曰有粹其質有淑其聲考兹幽石殁有餘榮趙叔慈妻賈氏墓志銘縣君宗室故懷州防禦使河內侯叔慈之夫人賈氏世開封人曽祖常左羽林衛將軍祖德滋右金吾衛將軍父世奕右屯衛大將軍夫人性端靖平居寡言笑治家有法宗姻稱之封永壽縣君崇寧四年十二月二十四日卒享年五十大觀元年三月二十九日葬汝州梁縣子二人得之待之皆左班殿直早卒女二人長適進士郭俅次在室銘曰猗嗟夫人柔德靜専宜壽宜貴誰其嗇焉視銘考德宗婦之賢宗室東頭供奉官夫人方氏墓志銘宗室東頭供奉官叔驍之配方氏世開封人曽祖景贈左金吾衛將軍祖琬右班殿直父倜夫人性柔淑在家勤女工既嫁事舅姑盡禮順承其夫睦若賔友喜誦佛經能行其所戒崇寧二年十一月三日卒享年三十有五以大觀元年三月二十九日葬汝州梁縣子四人貫之翼之拱之充之女五人銘曰歸儷其淑既相諧熙曷不偕老吁其可悲宗室東頭供奉官夫人張氏墓志銘夫人張氏蓋文定公齊賢之後曽祖宗禮工部尚書祖子奕中散大夫父仲昌內殿承制年十九歸於宗室東頭供奉官叔寄上承下撫無不得宜疾革謂其夫曰無以情傷理其送終從儉嗚呼可哀也已崇寧二年八月二日卒享年二十有八以大觀元年三月二十九日葬汝州梁縣子三人女二人皆幼銘曰泠泠緒言不愆於理刻諸幽珉襲芬圖史宗室內殿崇班第三女石志殤女元符元年十月十九日生崇寧三年九月十二日卒年七嵗大觀元年三月十九日葬汝州梁縣曽祖承操故涇州觀察使崇安侯祖克勍故建寧軍節度使開府儀同三司建國公父叔蓬見任內殿崇班謹志宗室舒州防禦使第四女石志殤女崇寧三年九月十日生明年四月二十八日卒大觀元年三月二十九日葬汝州梁縣曽祖承睦故虔州觀察使南康侯祖克戒故保平軍節度使成國公父叔涉見任舒州防禦使謹志宗室西頭供奉官第四女石志殤女崇寧元年三月二十七日生三年正月二十三日卒大觀元年三月二十九日葬汝州梁縣曽祖承操故涇州觀察使安定侯祖克勍故建寧軍節度使開府儀同三司建國公父叔蹊見任西頭供奉官謹志
