診藝業惟良調治中宫勞效顯著宜陞位秩昭示寵嘉往服恩榮務先謹恪可皇兄右武衞大將軍保州刺史士暕可轉一官制勅具官某宗正言爾學問淹通累中優選朕聞而嘉之召試禁林以觀所藴而程篇來上文理俱通宜進厥官俾為屬籍之勸可右監門衞大將軍仲侃仲維可各轉一官制勅具官某等爾父宗諤受命仁廟敦諭英祖趣定儲極載在信史朕心不忘宜錫恩章以寵厥後擢陞位秩其往欽承可兩朝佑聖太夫人姪孫左侍禁閤門看班秪候張世昌可轉一官制勅具官某朕追懷恭懿褒録近親進爾一官錫兹名命往其欽佩務稱寵榮可郭獻卿男莊宅副使縝可轉兩官制勅具官爾父國之婣戚奄其淪亡遺奏祈恩以為爾寵朕用閔惻進爾官榮圖稱所䝉無忘忠孝可承議郎試户部尚書劉逵翰林學士朝散郎知制誥張康國朝散郎試尚書禮部侍郎王能甫朝奉大夫試尚書工部侍郎管師仁可各轉一官制勅朕集神考詔札既藏之顯謨與詩書並傳垂訓萬世爰推慶典以惠史臣具官某等學問文章時望所屬雍容邇列載筆汗青宸集備成嘗預典領用加甄奬序進厥官往其欽承無或謙避可右武衞大將軍吉州防禦使世設可轉一官制勅朕於羣臣之有功者雖逺不忘録其世類矧宗室近親恩紀宜厚者乎具官某爾父從古受命仁廟敦諭英祖趣定儲極朕所追懷用錫爾祉大邦禦侮擢正使名服兹寵榮務先謹恪可知開徳府顯謨閣直學士朝奉大夫李孝夀可轉一官制勅侍從之臣服采於外有勞當録朕豈弭忘具官某材術之優歴踐煩劇比修北輔供億不愆宜錫恩章褒進厥序體兹異數尚加勉哉可翰林學士鄭居中可轉兩官制勅朕親御翰墨刋定學校之政令科條纎悉取成於心編次之臣以書來上爰推慶賞褒叙其勞具官某氣節端方才猷閎廓文章學問望實顯隆雍容禁林久兹典領宜膺寵命擢進品階往體眷知無忘欽佩可禮部侍郎劉正夫可轉兩官制勅朕親御翰墨刋定學校之政令科條纎悉取成於心編次之臣以書來上特推慶賞時乃茂恩具官某服在儀曹與兹典領例陞位秩朕不汝遺往其欽承無忘稱塞可起居舍人蔡薿可轉兩官制勅具官某朕親御翰墨刋定學校之政令命官編次既獻成書在局之臣宜均慶賞惟爾學術詞采嘗冠諸儒論議純明業履維稱服在右史與兹討論擢進厥官以示甄奬往其欽佩益懋厥修可左藏庫副使楚沙木可轉一官制勅具官某爾躬冒矢石以有戰多幕府奏功按級序賞進官一等於爾為榮可西京左藏庫副使王偉可轉一官制勅具官某爾所進醜虜以克有功閲級叙恩昭示嘉奬服兹名命尚加勉旃可西綾錦副使兼翰林醫官副使蓋演醫官副使盧徳誠翰林醫官賜緋丁銳翰林醫學李師老可各轉一官制勅具官某等爾等秪事衞府醫診有勞宜錫恩章昭示嘉奬進官一等其克欽承可供備庫使李庠可轉一官制勅具官某惟爾率職不愆宜有甄奬用錫名命寵進厥官往務欽承勿替勤恪可翰林學士鄧洵仁可轉一官制勅大禮彛制閤門定儀比命有司特加編次稽其功緒宜錫恩章具官某操履端方問學純粹文章論議夙有顯名兩獻成書條理該盡擢陞品秩以示寵嘉往服邦榮益思報稱可宣德郎尚書膳部員外郎王澤通直郎尚書職方員外郎李康彦可各轉一官制勅具官某等樞筦修書既成來上爾等夙以推擇久與討論宜進厥官昭示寵奬往其欽佩務稱恩榮可朝奉郎大司成兼侍講薛昻可轉一官制勅夏人入貢邦有常儀命官刋修以垂永制成書來上功緒可嘉具官某學問文辭朕所眷任資其詳定條列該明宜錫恩章昭示寵奬進官一等往惟欽承可右藏庫副使柴定官可轉一官制勅具官某數級塞下爾預有功宜進厥官以勵忠勇錫兹名命其克欽承可文思副使馮鐸可轉一官制勅具官某爾父與修貢儀例有褒賞移恩子姓朕所嘉從進爾一官往其秪服可奉議郎歐陽大椿可轉一官制勅具官某惟爾弗徇請謁舉發其私吏守若兹氣節可尚擢陞官次副以優恩今命近官特加審察體予甄奬往其懋承可閤門秪候劉敷可職上轉劉媫妤弟劉牧劉敏可轉一官制勅具官某等宫闈嗣慶恩及外官爾等俱以恪勤之資列於戚里與兹寵典兄弟聨榮或擢進職名或序遷品秩徃其欽佩務稱所䝉可左藏庫副使蘭日政可轉一官制勅具官某爾服職有勞逹於朕聽宜加褒陟示不弭忘序進一官往承無斁可太醫丞趙宗元翰材醫官趙嗣先可轉一官制勅具官某等軍器建局爾與有勞擢進厥官以示甄奬往秪乃服無替恪勤可醫官熊希賢可轉一官制勅具官某惟爾醫診之良克有勞效宜優常格序進厥官往務欽承無替勤恪可醫官王舜康張節可各轉一官制勅具官某等爾父醫診有勞移恩子姓宜遷爾秩錫以命書往服恩榮益勤世業可醫官卓遵國可轉一官制勅具官某惟爾醫診之良克有勞效宜遷位秩以示寵嘉往服命書益勤厥藝可軍器庫使兼醫官使卓遵國醫官使王處厚軍器庫副使兼醫官副使張希房蓋演髙明之西綾錦副使兼醫官副使趙廣文醫官副使張漸王舜民太醫丞直醫官劉景溫太醫丞張永醫官任元善可各轉一官制勅具官某等朕荷天之休後星嗣慶爾等或與秪奉之賞或膺回授之恩均被寵命序陞品秩往精厥藝務稱邦榮可太史局丞袁惟幾可轉一官制勅具官某新厯成書爾與推測特蠲常格寵進厥官往承朕恩務先恪守可醫官國士英男之實醫官張倚男節可各轉一官制勅具官某等爾父秪事有勞宜膺慶賞許其回授時乃異恩兹錫命書序進爾秩往精世業以稱所䝉可㩁易副使兼翰林醫官副使潘先之可特轉一官制勅具官某爾以方劑之勤奉事王府閱嵗已久宜錫恩章擢進厥官往其秪服可醫官卓遵國可轉一官制勅具官某爾父以醫診之良勞列可奬移恩子姓進爾官榮其往欽承益勤世業可東頭供奉官劉選可轉一官制勅具官某爾出入行陣驍勇有聞稽其戰多宜有優賞進官三等昭示寵嘉圖稱所䝉無忘忠義可崇班張璠與轉兩官東頭供奉官張璪與轉一官制勅具官某等爾等奮武疆埸克有戰多幕府以聞朕所嘉尚賜遷品秩以勵逺臣往復新恩益思報稱可東頭供奉官王世益衞采各轉一官制勅具官某爾等奮武疆埸克有戰多幕府以聞肆遷品秩以勵逺臣往服新恩益思報稱可三班奉職王從善左班殿直李弼各轉一官制勅具官某等宫闥崇封恩加外屬以名來上朕所嘉從往服寵榮勿忘勤毖可左藏庫副使尹正供備庫副使兼通事舍人潘珝可轉一官制勅具官某等宸閤定儀成書來上爾等與有勞勩宜錫恩章序進厥官往承無斁可醫官王處厚可轉一官制勅具官某爾弟師厚宣醫有勞宜錫恩章迺以回授用進爾秩往其欽承可右侍禁藺泰舒世亮右班殿直陳絳可各轉一官制勅具官某等宫闈嗣慶爾等俱以秪奉之勞與陞品秩服兹寵命無替恪勤可降授内殿承制李青鋼可轉一官制勅具官某爾統率所部擊賊有功宜進厥官以示甄奬往服寵命尚加勉哉可朝奉郎劉辟疆可轉一官制勅具官某爾曩奉使軺往按保伍服勤職業克有事勞抗言祈恩朕命甄録進官一等於爾為榮可大理寺捉事使臣朱渙可轉一官制勅具官某惟爾緝捕之勞宜膺賞典進官一等往務欽承可西頭供奉官張彦廓可轉一官制勅具官某祈事宗藩恪勤不懈兹以恩數秪進爾官用錫恩章往其秪服可内殿崇班劉宗彦可轉一官制勅具官某惟爾營繕之勤宜有甄奬進官一等往服恩章可承議郎張勔東頭供奉官辛宗可各轉一官制勅具官某等朕建外宗正於洛師今措置就緒宗子肅戢雖朝廷教養之備爾預有勞序進厥官以示甄奬尚加勉哉可蕃官皇城副使葉吉特可贈三品制勅具官某爾郊職邊郵沒於王事忠義之節有惻朕心優錫愍書以慰窀穸尚其不昧亦克歆承可内崇班閤門秪候殿中省尚贊奉御劉安國可轉一官制勅具官某爾擢在御府勤毖不愆逮兹終更法有褒賞用錫名命叙進厥官往服朕恩愈加勵勉可東頭供奉官黙特博與轉一官制勅具官某爾以驍勇之資遇敵决勝斬馘既多兵無亡失進官一等以示寵嘉徃服恩章愈加激勵可
