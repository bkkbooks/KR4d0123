body:
  text: 摛文堂集卷七宋慕容彥逢撰制蕃官羅保與轉一官制敕具官某爾服勤邊圉克有戰功宜進厥官昭示嘉奬欽豫時命尚懋爾忠可西京左藏庫副使喬伯虎與轉兩官蕃官西京左藏庫副使胡志德與轉一官蕃官文思使羅萬成與轉三官內一官回授與五服內有官親屬蕃官文思副使爾善轉兩官制敕具官某爾等各以戰多逹於朕聽忠勇若此宜有褒嘉擢進厥官益圖稱塞可䇿凌博族首領嘉勒斡進補皇城副使奉聖㫖特與轉兩官制敕具官某爾躬冒矢石追襲冦攘誅斬既多仍有俘獲帥司條上功狀為優擢進兩官以示甄奬服兹明命無替忠勤可文思副使董厚與轉一官制敕具官某惟爾服勤疆埸以有戰多朕不弭忘特加甄叙進官一等其往欽承可開封府捉事使臣韓慶朱渙可各轉一官制敕具官某以汝捕獲之勞宜有甄奬遷資示寵於汝為榮無替恪勤務稱恩命可左藏庫副使莽丹內庭崇班包喜各轉兩官東頭供奉官隆布盤轉一官制敕具官某等爾等夙以材能服勤疆埸河湟之復咸有戰多用加褒升昭示奬激往共乃服尚其勉哉可右騏驥使張晞如京副使兼閣門通事舍人王子曼共特與轉三官內張晞兩官回授與五服內有官親屬內庭承制陳懷遜宮苑副使焦用誠供備庫副使鄧察東頭供奉官王志各與轉兩官供備庫副使髙靖西京左藏庫副使王舜中內庭崇班沈超東頭供奉官王正臣各轉一官制敕具官某等爾等擐甲執兵出入行陳河湟之復咸有戰多功狀以聞第加賞擢益思奮勵以副恩章可蕃官內庭崇班牛伊格與轉一官制敕具官某爾發於忠誠奮身效順朕所嘉尚宜有褒升序進一官昭示奬激往加勵勉以副恩章可左藏庫副使竒多遇內庭崇班李仕吉各與轉一官制敕具官某等汝等冒犯矢石以立戰多宜進厥官昭示奬激往圖後效嗣有寵嘉可如京使趙抃右班殿直王豫可各轉一官制敕具官某等招諭逋逃爾預宣力進官一等以示褒嘉往承朕恩勿替忠恪可三班借職鄭貴妃位掌箋奏陳濟可轉一官制敕具官某惟爾秪事有勞宜加甄奬擢遷位序其往欽承可舊城裏左廂居養院提轄使臣左班殿直楊寧可轉一官制敕具官某朕置居養院以處鰥寡孤獨之民法令既備尚慮有司便文自營命官按視惟汝奉行勤恪民得所歸至於歡呼感激朕甚嘉之擢進厥官以為能吏之勸往嘉懋勉嗣有寵褒可將作監李誡提轄兵匠官曹滋可各轉一官李誡係右朝議大夫曹滋係朝請郎制敕具官某等比營崇報既克考成工役不愆勞列可尚爾等預兹典領咸著恪勤以錫恩章以示嘉奬進官一等其往欽承可內庭崇班李紹與轉三官制敕具官某爾三立戰多兵無忘失宜加優奬以勵邊城超進厥官兹為懋賞往承無替朕不爾忘可保安軍順寧寨蕃弓箭手指揮覺默特族右侍禁阿穆爾與轉五官制敕具官某順寧之役爾預有功斬馘既多仍執强敵進官五等時乃異服往服寵章無替忠勇可左侍禁充學士院待詔巡訓為三次書寫泛使國書特與轉一官制敕具官某爾以書藝承詔三寫國書列狀自陳朕命甄録進官一等於爾為榮可內庭崇班孟逵與轉一官制敕具官某惟爾奮武邊陲抗賊决勝以推恩典以賞戰多序進厥官往其秪服可宣德郎閻騤宣義郎舒彥舉可各轉一官制敕具官某等夏人入貢邦有常儀命官刋修書成來上惟爾咸以推舉獲與討論宜錫恩章昭示嘉奬進官一等其往欽承可西頭供奉官棟智默特與轉四官制敕具官某惟爾以忠效順獲簉班聫克有戰功逹於朕聽宜加倍賞往復優恩宜思報命可得功人內殿承制韓庠加四級西京左藏庫副使李介二級西頭供奉官李夀二級每級轉一官制敕具官某等爾冒犯矢石咸有戰多帥臣以聞按級加賞第遷品秩時乃優恩往服承書益思奮勵可西頭供奉官睢文約可轉一官制敕具官某收復鄯􅙉爾思置郵秪事無違宜有褒賞進官一等往其欽承可勾當修內司使臣張祐鄧述劉道催促修造使臣李景約晉用宋明可各轉一官制敕具官某等朕命有司繕飾原廟爾等恪勤厥事工役不愆宜進官榮以示嘉奬往承寵命益懋爾能可尚衣奉御李鎮可轉一官制敕具官某爾職在尚衣掌於冕服夙夜秪事勤恪可稱序進厥官惟以示勸欽豫時命尚其勉哉可西頭供奉官折可褒與轉三官制敕具官某惟爾冒矢犯石抗賊效忠克有戰多逹於朕聽進官三等以示奬優往服命書愈加勵激可內殿崇班鄒清與轉兩官梁德與轉一官東頭供奉官楊隆西頭供奉官宋伯威各與轉兩官制敕具官某某爾等奮武邊陲誅斬强敵視功輕重叙進厥官爰錫命書昭示奬激往其秪服毋替爾忠可朝散郎家安國可轉一官制敕具官某爾曩膺選掄往按茶事稅課豐裕效勞可稱序進厥官維以示勸秪服恩命無替恪勤可承制武道紀崇班丁克彥皇城副使楊球入內西京左藏庫副使陳思溫供奉官周覺盧贄楊安國王昺耿維康陳諤王方徐中立侍禁秦純吳之紀杜卿張晸樂僖趙士旻殿直孫丹方承約張顯郭璹毋玉王士亨奉職陳子淵徐升借職司孟吕師嚴可各轉一官制敕具官某等朕即英祖舊邸崇建寶坊爾等率職於兹俱有勞勩進官一等以示寵嘉往服恩章益思勵勉可文思使吳元瑜入內供備庫副使張易承制吳永可各轉一官制敕具官某朕即英宗舊邸重建寶坊爾等俱以材力之優協濟厥事稽其功緒恪勤可嘉宜錫恩章擢升位秩往加勵勉無替前勞可入內文思副使胡宗傑入內西京左藏庫使楊茂昌入內文思使何欣入內左藏庫使榮州刺史陳宥入內東頭供奉官黃訓入內內庭承制鄧忠臣凌德臣可各轉一官制敕具官某等朕眷撫庶工録其勞列雖在疏逖褒賞以時矧惟左右之臣乎爾等出入禁庭奉勤夙夜恪謹之節久而益彰宜服朕恩序升品秩尚加勵勉務稱寵榮可入內西京左藏庫使郭禹臣入內供備庫使張奭入內供備庫副使張彥明入內東頭供奉官宋侁可各轉一官制敕具官某等朕追懷恭懿保翊纍朝録其舊人昭示恩紀爾等出入禁闥咸著恪勤以膺寵嘉擢升位秩往加勵勉以稱所䝉可入內文思使舒州刺史楊日言入內左藏庫使黃諶入內文思使范仔入內文思副使閻祖德入內文思副使楊端入內西京左藏庫副使鄧繼英入內內殿承制朱輔世入內崇班王允文鄭諶入內東頭供奉官王褒張令可各轉一官制敕具官某等朕仰膺孚佑弓韣告祥爵賞之施邦有常典爾等率職禁省秪奉有勞察其恪謹宜加甄奬序升位秩錫以命書往其懋承益思報稱可入內內侍省官朱祐之石瑾張補之李雍陳思恭王堯臣張正夫賈䝉江􅖴張欽若許佃容誼趙贄可各特轉一官制敕具官某等朕賴天眷祐錫羡宫闈慶賞之施厥有常典爾等列職禁省勤毖恪恭積有勞能宜加甄奬用錫寵命宜進厥官往務欽承益思稱塞可入內內庭承制張佑入內左藏庫使王佑各轉一官制敕具官某等禁省近臣功緒可考以時叙進兹謂典常爾等出入禁庭勤恪靡懈㑹課來上宜錫恩章往其欽承務稱甄奬可入內左藏庫永州團練使馮鐸可轉一官制敕具官某稽勞叙進不以遐遺矧吾禁省之臣㑹課來上褒能之典厥有故常惟爾禀資溫恭迪已勤毖率職有裕閥閲具存宜進厥官以示甄奬服兹寵命尚加勉哉可內侍省內殿崇班藍惟信可轉一官制敕具官某惟爾從子功緒可嘉爰錫恩章許其回授宜遷爾秩以示寵嘉往服命書毋忘勤毖可入內西京左藏庫副使張僅可轉兩官制敕具官某朕推一心以馭羣臣任無內外必稽其功緒而進之爾服采禁省克自抑畏閲嵗兹久積勞當遷叙進厥官往其秪服可入內內殿崇班鄧宗仁入內左藏庫使梁昭慶可轉一官制敕具官某等宫省之臣出入禁闥恪勤不懈考績維明有司以聞法當叙進宜遷位秩昭示寵嘉往克欽承尚有超擢可供備庫副使蘇球東頭供奉官蕭恭右侍禁張廉張孝忠梁嘉叟右侍禁華鎮崇班劉震右侍禁錢景寬右班殿直蘇絢可各轉一官制敕具官某等浮梁建壘工役不愆爾等咸服事勞協力趣辦宜推恩典以示褒嘉序進厥官往承無斁可入內內侍省西染院使郝平可特轉一官制敕具官某朕考核羣臣録其功緒爵祿之賞資以勸能惟爾賦材敏明迪已勤毖踐揚事任積有顯勞宜錫命書褒進厥位往加勵勉務稱朕恩可入內內侍省供備庫副使張禹稱西頭供奉官武昱可各轉一官制敕具官某等朕在濳邸時嘗造燕府相與講學爾等實預秪奉念之不忘宜錫恩章特遷位秩往加勤毖以稱所䝉可入內右騏驥使裴絢可特轉一官制敕具官某曩築蕭關爾預宣力以時促辦工役不愆勞列之優宜膺厚賞用申舊命加進厥官褒善録勤惟以示勸往服朕訓無怠欽承可入內文思使董舜臣可轉一官制敕具官某朕考核羣臣録其功緒爵祿之賞資以勸能爾出入禁庭謹恪可尚軍器建局率職有勞宜錫恩章以示甄奬擢升厥位其往欽承可入內西京左藏庫副使黃洙可轉一官制敕具官某朕考核羣臣録其功績爵祿之賞資以勸能爾材資之優率職有裕軍器建局宣力為多宜錫恩章以示甄奬擢升厥位往其懋哉可入內西京左藏庫副使張禹稱可轉一官制敕具官某爾秪事皇府閲嵗既多宜錫恩章以示甄奬進官一等其克欽承可入內右騏驥使朱拱之入內左藏庫副使何欣可各轉兩官制敕具官某等爵祿之賞操柄在豫念功簡勞人用胥勸惟爾服職宮省夙著恪恭茶事告成預有勤績宜加甄奬昭示寵嘉用錫命書擢升位秩往承無替尚有異恩可入內內侍省文思使榮州刺史陳宥可轉一官制敕具官某計其嵗月察其行能而後進之此有司考績之政也雖吾宫省之臣耳目所及亦率是法惟爾出入禁闥勤毖可稱㑹課以時既應遷格序升品秩爰錫命書服往寵榮尚加勵勉可入內左藏庫副使黃希叟可轉一官制敕具官某爾秪事宫省勤毖不渝論課有司既應遷格宜升班秩以示褒嘉往服恩榮益思懋勉可入內內殿承制楊軫可轉一官制敕具官某爾報事內省勤毖可稱褒進以官往其秪服可入內內侍省禮賔使及入內內侍省左藏庫副使胡宗傑等並轉一官制敕具官某等考績之法以勵庶工褒善録勤靡間疏逺矧吾禁省之臣義豈當後惟爾宣勞夙夜勤毖不愆㑹課當遷叙進厥位是雖有司之常法非率職勵行其何以稱此可入內內侍省左藏庫副使張璪可轉一官制敕具官某禁省之臣職任親近稽勞叙進時乃舊章惟爾材資之優濟以勤恪有司㑹課率職可嘉宜錫恩章俾升位秩往其勵勉以對寵恩可入內左藏庫副使何欣可轉一官制敕具官某宮闈嗣慶爾父預恩祈以寵章屬於子姓惟爾出入禁闥勤毖不愆宜錫命書進升位秩無忘忠孝乃稱所䝉可入內西京左藏庫副使劉光祖可轉一官制敕具官某汝涖職恪勤達於朕聽進官一等以示寵嘉往服恩章勿替厥志可入內內侍省內東頭供奉官熙河路走馬承受公事秦肅之特轉兩官制敕具官某汝出入戎行以駿奔承命為職乃能審度事機率先士卒奮身鋒鏑之間决戰取勝誅斬首惡閲級既多幕府以聞朕用嘉止進官二等以懋汝功服我寵榮愈加勵勉可朝請大夫尚書省都事呂昭敏韓祥可轉一官制敕具官某等朕命儒臣編次學制成書來上爾與有勞擢進一官以示甄奬往承茂渥無替恪勤可手分借職邵淵左安仁廉公謹可轉一官制敕具官某等爾奉行文書勞勩宜賞進官一等其往欽哉可宣政使深州防禦使賈祥可使額上轉行一官制敕朕親御翰墨刋定學校之政令命官編次既獻成書應奉之臣宜膺慶賞具官某持身祗肅涖職恪勤揚歷既多休有譽處惟兹建局承命不愆宜進厥官昭示嘉奬往其欽佩益懋厥修可西京左藏庫副使邢從善可轉一官制敕具官某惟爾昔應奉常援例祈恩寵進一官以示甄録往服朕命無替恪勤可皇城副使權發遣本路都監新差權發遣保安軍耿端彥莊宅副使本路第六將孫廣如京副使本路第六副將梁璋各特與轉兩官係鄜延路制敕具官某等朕率惟敉功以固封宇西陲招納爾克有勞超進厥官以示奬激往加勉勵尚有寵榮可監成都府上供機王隨可轉一官制敕具官某織絍之工在成都者汝實總之克勤乃職勞列可嘉宜進厥官俾乃舊服體豫甄奬尚加懋哉可宣德郎魏當可轉一官制敕具官某朕重建琳宮修嚴像設爾預供億宜錫恩章擢進一官往其秪服可朝請郎集賢殿修撰知荆南軍府董必特轉三官制敕具官某朕操八柄以馭羣臣爵賞之施非迪有功未嘗虛授爾以書殿華貫作帥荆湖經理封疆既克就緒進官三等以懋爾勞圖稱所䝉尚有顯陟可通直郎提舉䕫州路常平等事張杲與轉一官制敕具官某朕秪遹先猷恢崇學校庶幾道德一風俗同汝為部使者能糾察異論助朝廷所以訓迪多士之意朕甚嘉之進官一等為汝寵榮往其欽承益勵治行可通直郎李亘可轉兩官御批鰥寡孤獨王政所先條令雖具施行在人溧陽縣分為八室男女異處各得其所宜在褒勸其知縣特轉兩官候任滿日與堂除差遣制敕具官某朕閔鰥寡孤獨之民困窮無告廣建居養所以安集之有司供億事為之制朕之撫綏斯民亦已勤矣顧條令雖具而施行在人惟爾究宣德意分治室廬男女異居各得其所設施之美逹於朕聞不有褒升何以示勸進官三等時乃異恩俟其終更别加除擢往服朕命無替恪勤可榷貨務監官朝奉大夫宋康年吳薦朝請郎丁維買鈔所監官文思副使左厚之奉議郎周中可各轉一官制敕具官某等鈔法之行爾實推奉㑹課饒羡良見恪勤宜錫寵章擢升品秩往加勵激務稱所䝉可承務郎知鄭州管城縣范世修奉議郎通判永興軍王直臣奉議郎僉書陜州節度判官㕔公事王觀國可各轉一官制敕具官某某爾等招諭逋逃俾還尺籍效實可尚逹於朕聞褒進厥官維以示勸往思報稱無替恪勤可朝奉郎張伯昌宣義郎王萬承議郎徐宅供備庫副使魏伯成李彭年皇城使京畿提舉保甲兼提刑劉戒朝奉大夫趙士宇朝奉郎提舉京畿常平王仲原承議郎孫奎周廷堅奉議郎向濤宣德郎樓光翟敦仁宣奉郎向滌應安道入內內侍省供備庫副使黃希叟左藏庫副使王朗皇城使河東第六將開德府駐劄劉永德可各轉一官制敕具官某某爾等預修比輔各迪有功宜錫寵章以示甄奬進官一等時乃茂恩往其欽承益圖稱塞可涇原路定戎鹽池提舉措置官夏仙勾管種收給納劉雄陳開並各轉一官制敕具官某等鹽池奏課嵗額遞增經畫於兹惟爾勞勩宜推恩典以示褒嘉序進一官往其秪服可朝請郎知北外都水丞公事葛仲良朝奉郎權發遣通利軍句仲甫可各轉一官制敕具官某等營建新壘役不愆期惟爾供億之勞宜加甄賞用錫寵命擢進厥官務往欽承無替勤恪可通直郎河北路運判張翬可轉一官制敕具官某爾以材選往佐漕臺工役造成與有勞勩擢升位秩維以勸能往服恩章尚加懋勉可朝散官同管勾成都府利州陜西等路茶事兼提舉陜西等路買馬監牧公事㕔龎寅孫轉一官制敕具官某爾比擢使軺監摧監牧鬻馬三萬差擇惟良勞列之優宜示甄奬用錫名命寵進厥官往其欽承愈加勵勉可知岷州降授左藏庫使威州刺史馮瓘通判岷州奉議郎石緝岷州都監供備副使魏允中可各轉一官制敕具官某等爾效職外邦預吾馬政鬻數登足功緒可嘉宜進厥官昭示甄奬往加勵勉以稱茂恩可太常博士單暐可轉兩官兩浙提舉學事路瓘可轉兩官制敕具官某等朕親定學校政令付之儒臣俾加編次爾等俱以文行被選披閲于兹書成叙恩擢升位秩往服寵命益懋厥修可朝散大夫直龍圖閣提舉成都府利州陜西等路茶事兼陜西等路買馬監牧事孫鼇抃可與轉一官制敕具官某惟爾心術疏通濟以勤恪市兹萬馬差擇惟良稽勞叙恩擢升品秩體豫嘉奬其懋承之可朝散郎權發遣陜府兩路轉運判官公事孫琦朝奉郎權知解州宋表微承事郎權通判河中府李釡可各轉一官制敕具官某爵祿之柄在豫一人褒善録勤夫豈虛授爾等協力鹺事各迪有功宜錫恩章俾遷位秩往其秖服益懋厥修可宣德郎通判乾寧軍王雲可轉兩官制敕具官某朕嘗遣使往撫三韓爾以箋管從行實紀其事成書來上文理可嘉擢進厥官仍佐軍壘往思勉勵以稱寵褒可引進副使雄州防禦使姚古可使額上轉一官制敕具官某爾統吾虎士修築有勞帥臣以言朕所嘉尚特遷品秩為爾榮寵往服命書益圖顯效可右監門衛大將軍仲毊可轉一官制敕具官某屬籍之親領秩環衛能以勤毖逹於朕聞序進厥官昭示嘉奬欽承無替乃稱所䝉可左朝議大夫蹇序辰可轉一官制敕具官某朕既寶藏宸集加惠史臣例進一官汝其秪服可左侍禁方榮可轉一官制敕具官某爾以緝捕之勤討獲羣冦部使者條上朕用嘉之擢進厥官往其秪服可太醫丞直翰林醫官局王舜卿可轉一官制敕具官某爾諸父周道醫診有勞許以恩章屬於從子用遷爾秩往其欽承可太醫丞直翰林醫官局李仲章可轉一官制敕具官某爾父士爽醫診有勞許以恩章屬於子姓用遷爾秩往其欽承可司勳員外郎陳噩可轉一官制敕具官某閣門彛制既獻成書惟爾久與討論宜有甄奬進官一等示不弭忘往其懋承益思所稱可天文官介玉仲孚康永昌可各轉一官制敕具官某等爾等推測之精考驗不爽宜升位秩以示寵嘉往服恩榮益加懋勉可太史局天文院學生蘇亮可轉兩官制敕具官某厯書之成爾與秪奉錫兹恩命往其欽承可醫官潘用中可轉一官制敕具官某爾服勤醫診藝業惟良調治中宫勞效顯著宜升位秩昭示寵嘉往服恩榮務先謹恪可皇兄右武衛大將軍保州刺史士暕可轉一官制敕具官某宗正言爾學問淹通纍中優選朕聞而嘉之召試禁林以觀所藴而程篇來上文理俱通宜進厥官俾為屬籍之勸可右監門衛大將軍仲侃仲維可各轉一官制敕具官某等爾父宗諤受命仁廟敦諭英祖趣定儲極載在信史朕心不忘宜錫恩章以寵厥後擢升位秩其往欽承可兩朝佑聖太夫人姪孫左侍禁閣門看班秪候張世昌可轉一官制敕具官某朕追懷恭懿褒録近親進爾一官錫兹名命往其欽佩務稱寵榮可郭獻卿男莊宅副使縝可轉兩官制敕具官爾父國之姻戚奄其淪亡遺奏祈恩以為爾寵朕用閔惻進爾官榮圖稱所䝉無忘忠孝可承議郎試户部尚書劉逵翰林學士朝散郎知制誥張康國朝散郎試尚書禮部侍郎王能甫朝奉大夫試尚書工部侍郎管師仁可各轉一官制敕朕集神考詔札既藏之顯謨與詩書並傳垂訓萬世爰推慶典以惠史臣具官某等學問文章時望所屬雍容邇列載筆汗青宸集備成嘗預典領用加甄奬序進厥官往其欽承無或謙避可右武衛大將軍吉州防禦使世設可轉一官制敕朕於羣臣之有功者雖逺不忘録其世類矧宗室近親恩紀宜厚者乎具官某爾父從古受命仁廟敦諭英祖趣定儲極朕所追懷用錫爾祉大邦禦侮擢正使名服兹寵榮務先謹恪可知開德府顯謨閣直學士朝奉大夫李孝夀可轉一官制敕侍從之臣服采於外有勞當録朕豈弭忘具官某材術之優歷踐煩劇比修北輔供億不愆宜錫恩章褒進厥序體兹異數尚加勉哉可翰林學士鄭居中可轉兩官制敕朕親御翰墨刋定學校之政令科條纎悉取成於心編次之臣以書來上爰推慶賞褒叙其勞具官某氣節端方才猷閎廓文章學問望實顯隆雍容禁林久兹典領宜膺寵命擢進品階往體眷知無忘欽佩可禮部侍郎劉正夫可轉兩官制敕朕親御翰墨刋定學校之政令科條纎悉取成於心編次之臣以書來上特推慶賞時乃茂恩具官某服在儀曹與兹典領例升位秩朕不汝遺往其欽承無忘稱塞可起居舍人蔡薿可轉兩官制敕具官某朕親御翰墨刋定學校之政令命官編次既獻成書在局之臣宜均慶賞惟爾學術詞采嘗冠諸儒論議純明業履維稱服在右史與兹討論擢進厥官以示甄奬往其欽佩益懋厥修可左藏庫副使楚沙木可轉一官制敕具官某爾躬冒矢石以有戰多幕府奏功按級序賞進官一等於爾為榮可西京左藏庫副使王偉可轉一官制敕具官某爾所進醜虜以克有功閲級叙恩昭示嘉奬服兹名命尚加勉旃可西綾錦副使兼翰林醫官副使蓋演醫官副使盧德誠翰林醫官賜緋丁鋭翰林醫學李師老可各轉一官制敕具官某等爾等秪事衛府醫診有勞宜錫恩章昭示嘉奬進官一等其克欽承可供備庫使李庠可轉一官制敕具官某惟爾率職不愆宜有甄奬用錫名命寵進厥官往務欽承勿替勤恪可翰林學士鄧洵仁可轉一官制敕大禮彛制閣門定儀比命有司特加編次稽其功緒宜錫恩章具官某操履端方問學純粹文章論議夙有顯名兩獻成書條理該盡擢升品秩以示寵嘉往服邦榮益思報稱可宣德郎尚書膳部員外郎王澤通直郎尚書職方員外郎李康彥可各轉一官制敕具官某等樞管修書既成來上爾等夙以推擇久與討論宜進厥官昭示寵奬往其欽佩務稱恩榮可朝奉郎大司成兼侍講薛昻可轉一官制敕夏人入貢邦有常儀命官刋修以垂永制成書來上功緒可嘉具官某學問文辭朕所眷任資其詳定條列該明宜錫恩章昭示寵奬進官一等往惟欽承可右藏庫副使柴定官可轉一官制敕具官某數級塞下爾預有功宜進厥官以勵忠勇錫兹名命其克欽承可文思副使馮鐸可轉一官制敕具官某爾父與修貢儀例有褒賞移恩子姓朕所嘉從進爾一官往其秪服可奉議郎歐陽大椿可轉一官制敕具官某惟爾弗徇請謁舉發其私吏守若兹氣節可尚擢升官次副以優恩今命近官特加審察體豫甄奬往其懋承可閣門秪候劉敷可職上轉劉媫妤弟劉牧劉敏可轉一官制敕具官某等宫闈嗣慶恩及外官爾等俱以恪勤之資列於戚里與兹寵典兄弟聨榮或擢進職名或序遷品秩往其欽佩務稱所䝉可左藏庫副使蘭日政可轉一官制敕具官某爾服職有勞逹於朕聽宜加褒陟示不弭忘序進一官往承無斁可太醫丞趙宗元翰材醫官趙嗣先可轉一官制敕具官某等軍器建局爾與有勞擢進厥官以示甄奬往秪乃服無替恪勤可醫官熊希賢可轉一官制敕具官某惟爾醫診之良克有勞效宜優常格序進厥官往務欽承無替勤恪可醫官王舜康張節可各轉一官制敕具官某等爾父醫診有勞移恩子姓宜遷爾秩錫以命書往服恩榮益勤世業可醫官卓遵國可轉一官制敕具官某惟爾醫診之良克有勞效宜遷位秩以示寵嘉往服命書益勤厥藝可軍器庫使兼醫官使卓遵國醫官使王處厚軍器庫副使兼醫官副使張希房蓋演髙明之西綾錦副使兼醫官副使趙廣文醫官副使張漸王舜民太醫丞直醫官劉景溫太醫丞張永醫官任元善可各轉一官制敕具官某等朕荷天之休後星嗣慶爾等或與秪奉之賞或膺回授之恩均被寵命序升品秩往精厥藝務稱邦榮可太史局丞袁惟幾可轉一官制敕具官某新厯成書爾與推測特蠲常格寵進厥官往承朕恩務先恪守可醫官國士英男之實醫官張倚男節可各轉一官制敕具官某等爾父秪事有勞宜膺慶賞許其回授時乃異恩兹錫命書序進爾秩往精世業以稱所䝉可榷易副使兼翰林醫官副使潘先之可特轉一官制敕具官某爾以方劑之勤奉事王府閲嵗已久宜錫恩章擢進厥官往其秪服可醫官卓遵國可轉一官制敕具官某爾父以醫診之良勞列可奬移恩子姓進爾官榮其往欽承益勤世業可東頭供奉官劉選可轉一官制敕具官某爾出入行陳驍勇有聞稽其戰多宜有優賞進官三等昭示寵嘉圖稱所䝉無忘忠義可崇班張璠與轉兩官東頭供奉官張璪與轉一官制敕具官某等爾等奮武疆埸克有戰多幕府以聞朕所嘉尚賜遷品秩以勵逺臣往復新恩益思報稱可東頭供奉官王世益衛采各轉一官制敕具官某爾等奮武疆埸克有戰多幕府以聞肆遷品秩以勵逺臣往服新恩益思報稱可三班奉職王從善左班殿直李弼各轉一官制敕具官某等宫闥崇封恩加外屬以名來上朕所嘉從往服寵榮勿忘勤毖可左藏庫副使尹正供備庫副使兼通事舍人潘珝可轉一官制敕具官某等宸閣定儀成書來上爾等與有勞勩宜錫恩章序進厥官往承無斁可醫官王處厚可轉一官制敕具官某爾弟師厚宣醫有勞宜錫恩章乃以回授用進爾秩往其欽承可右侍禁藺泰舒世亮右班殿直陳絳可各轉一官制敕具官某等宫闈嗣慶爾等俱以秪奉之勞與升品秩服兹寵命無替恪勤可降授內殿承制李青鋼可轉一官制敕具官某爾統率所部擊賊有功宜進厥官以示甄奬往服寵命尚加勉哉可朝奉郎劉辟疆可轉一官制敕具官某爾曩奉使軺往按保伍服勤職業克有事勞抗言祈恩朕命甄録進官一等於爾為榮可大理寺捉事使臣朱渙可轉一官制敕具官某惟爾緝捕之勞宜膺賞典進官一等往務欽承可西頭供奉官張彥廓可轉一官制敕具官某祈事宗藩恪勤不懈兹以恩數秪進爾官用錫恩章往其秪服可內殿崇班劉宗彥可轉一官制敕具官某惟爾營繕之勤宜有甄奬進官一等往服恩章可承議郎張勔東頭供奉官辛宗可各轉一官制敕具官某等朕建外宗正於洛師今措置就緒宗子肅戢雖朝廷教養之備爾預有勞序進厥官以示甄奬尚加勉哉可蕃官皇城副使葉吉特可贈三品制敕具官某爾郊職邊郵沒於王事忠義之節有惻朕心優錫愍書以慰窀穸尚其不昧亦克歆承可內崇班閣門秪候殿中省尚贊奉御劉安國可轉一官制敕具官某爾擢在御府勤毖不愆逮兹終更法有褒賞用錫名命叙進厥官往服朕恩愈加勵勉可東頭供奉官默特博與轉一官制敕具官某爾以驍勇之資遇敵决勝斬馘既多兵無亡失進官一等以示寵嘉往服恩章愈加激勵可
