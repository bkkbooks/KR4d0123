body:
  text: 摛文堂集巻七宋慕容彦逢撰制蕃官羅保與轉一官制勅具官某爾服勤邊圉克有戰功宜進厥官昭示嘉奬欽予時命尚懋爾忠可西京左藏庫副使喬伯虎與轉兩官蕃官西京左藏庫副使胡志徳與轉一官蕃官文思使羅萬成與轉三官内一官回授與五服内有官親屬蕃官文思副使爾善轉兩官制勅具官某爾等各以戰多逹於朕聽忠勇若此宜有褒嘉擢進厥官益圖稱塞可䇿凌博族首領嘉勒斡進補皇城副使奉聖㫖特與轉兩官制勅具官某爾躬冒矢石追襲冦攘誅斬既多仍有俘獲帥司條上功狀為優擢進兩官以示甄奬服兹明命無替忠勤可文思副使董厚與轉一官制勅具官某惟爾服勤疆埸以有戰多朕不弭忘特加甄叙進官一等其往欽承可開封府捉事使臣韓慶朱渙可各轉一官制勅具官某以汝捕獲之勞宜有甄奬遷資示寵於汝為榮無替恪勤務稱恩命可左藏庫副使莽丹内庭崇班包喜各轉兩官東頭供奉官隆布盤轉一官制勅具官某等爾等夙以材能服勤疆埸河湟之復咸有戰多用加褒陞昭示奬激往共乃服尚其勉哉可右騏驥使張晞如京副使兼閤門通事舍人王子曼共特與轉三官内張晞兩官回授與五服内有官親屬内庭承制陳懐遜宮苑副使焦用誠供備庫副使鄧詧東頭供奉官王志各與轉兩官供備庫副使髙靖西京左藏庫副使王舜中内庭崇班沈超東頭供奉官王正臣各轉一官制勅具官某等爾等擐甲執兵出入行陣河湟之復咸有戰多功狀以聞第加賞擢益思奮勵以副恩章可蕃官内庭崇班牛伊格與轉一官制勅具官某爾發於忠誠奮身效順朕所嘉尚宜有褒陞序進一官昭示奬激往加勵勉以副恩章可左藏庫副使竒多遇内庭崇班李仕吉各與轉一官制勅具官某等汝等冒犯矢石以立戰多宜進厥官昭示奬激往圖後效嗣有寵嘉可如京使趙抃右班殿直王豫可各轉一官制勅具官某等招諭逋逃爾預宣力進官一等以示褒嘉往承朕恩勿替忠恪可三班借職鄭貴妃位掌牋奏陳濟可轉一官制勅具官某惟爾秪事有勞宜加甄奬擢遷位序其往欽承可舊城裏左廂居養院提轄使臣左班殿直楊寧可轉一官制勅具官某朕置居養院以處鰥寡孤獨之民法令既備尚慮有司便文自營命官按視惟汝奉行勤恪民得所歸至於歡呼感激朕甚嘉之擢進厥官以為能吏之勸往嘉懋勉嗣有寵褒可將作監李誡提轄兵匠官曹滋可各轉一官李誡係右朝議大夫曹滋係朝請郎制勅具官某等比營崇報既克考成工役不愆勞列可尚爾等預兹典領咸著恪勤以錫恩章以示嘉奬進官一等其往欽承可内庭崇班李紹與轉三官制勅具官某爾三立戰多兵無忘失宜加優奬以勵邊城超進厥官兹為懋賞往承無替朕不爾忘可保安軍順寧寨蕃弓箭手指揮覺黙特族右侍禁阿穆爾與轉五官制勅具官某順寧之役爾預有功斬馘既多仍執强敵進官五等時乃異服往服寵章無替忠勇可左侍禁充學士院待詔巡訓為三次書寫泛使國書特與轉一官制勅具官某爾以書藝承詔三寫國書列狀自陳朕命甄録進官一等於爾為榮可内庭崇班孟逵與轉一官制勅具官某惟爾奮武邊陲抗賊决勝以推恩典以賞戰多序進厥官往其秪服可宣徳郎閻騤宣義郎舒彦舉可各轉一官制勅具官某等夏人入貢邦有常儀命官刋修書成來上惟爾咸以推舉獲與討論宜錫恩章昭示嘉奬進官一等其往欽承可西頭供奉官棟智黙特與轉四官制勅具官某惟爾以忠效順獲簉班聫克有戰功逹於朕聽宜加倍賞往復優恩宜思報命可得功人内殿承制韓庠加四級西京左蔵庫副使李介二級西頭供奉官李夀二級每級轉一官制勅具官某等爾冒犯矢石咸有戰多帥臣以聞按級加賞第遷品秩時乃優恩往服承書益思奮勵可西頭供奉官睢文約可轉一官制勅具官某收復鄯􅙉爾思置郵秪事無違宜有褒賞進官一等往其欽承可勾當修内司使臣張祐鄧述劉道催促修造使臣李景約晉用宋明可各轉一官制勅具官某等朕命有司繕飾原廟爾等恪勤厥事工役不愆宜進官榮以示嘉奬往承寵命益懋爾能可尚衣奉御李鎮可轉一官制勅具官某爾職在尚衣掌於冕服夙夜秪事勤恪可稱序進厥官惟以示勸欽予時命尚其勉哉可西頭供奉官折可褒與轉三官制勅具官某惟爾冒矢犯石抗賊效忠克有戰多逹於朕聽進官三等以示奬優往服命書愈加勵激可内殿崇班鄒清與轉兩官梁徳與轉一官東頭供奉官楊隆西頭供奉官宋伯威各與轉兩官制勅具官某某爾等奮武邊陲誅斬强敵視功輕重叙進厥官爰錫命書昭示奬激往其秪服毋替爾忠可朝散郎家安國可轉一官制勅具官某爾曩膺選掄往按茶事稅課豐裕效勞可稱序進厥官維以示勸秪服恩命無替恪勤可承制武道紀崇班丁克彦皇城副使楊球入内西京左藏庫副使陳思溫供奉官周覺盧贄楊安國王昺耿維康陳諤王方徐中立侍禁秦純吳之紀杜卿張晸樂僖趙士旼殿直孫丹方承約張顯郭璹毋玉王士亨奉職陳子淵徐昇借職司孟吕師嚴可各轉一官制勅具官某等朕即英祖舊邸崇建寳坊爾等率職於兹俱有勞勩進官一等以示寵嘉往服恩章益思勵勉可文思使吳元瑜入内供備庫副使張易承制吳永可各轉一官制勅具官某朕即英宗舊邸重建寳坊爾等俱以材力之優協濟厥事稽其功緒恪勤可嘉宜錫恩章擢陞位秩往加勵勉無替前勞可入内文思副使胡宗傑入内西京左藏庫使楊茂昌入内文思使何訢入内左藏庫使榮州刺史陳宥入内東頭供奉官黄訓入内内庭承制鄧忠臣凌徳臣可各轉一官制勅具官某等朕眷撫庶工録其勞列雖在疎逖褒賞以時矧惟左右之臣乎爾等出入禁庭奉勤夙夜恪謹之節久而益彰宜服朕恩序陞品秩尚加勵勉務稱寵榮可入内西京左藏庫使郭禹臣入内供備庫使張奭入内供備庫副使張彦明入内東頭供奉官宋侁可各轉一官制勅具官某等朕追懐恭懿保翊累朝録其舊人昭示恩紀爾等出入禁闥咸著恪勤以膺寵嘉擢陞位秩往加勵勉以稱所䝉可入内文思使舒州刺史楊日言入内左藏庫使黄諶入内文思使范仔入内文思副使閻祖徳入内文思副使楊端入内西京左藏庫副使鄧繼英入内内殿承制朱輔世入内崇班王允文鄭諶入内東頭供奉官王褒張令可各轉一官制勅具官某等朕仰膺孚佑弓韣告祥爵賞之施邦有常典爾等率職禁省秪奉有勞察其恪謹宜加甄奬序陞位秩錫以命書往其懋承益思報稱可入内内侍省官朱祐之石瑾張補之李雍陳思恭王堯臣張正夫賈䝉江􅖴張欽若許佃容誼趙䞇可各特轉一官制勅具官某等朕賴天眷祐錫羡宫闈慶賞之施厥有常典爾等列職禁省勤毖恪恭積有勞能宜加甄奬用錫寵命宜進厥官往務欽承益思稱塞可入内内庭承制張佑入内左藏庫使王佑各轉一官制勅具官某等禁省近臣功緒可考以時叙進兹謂典常爾等出入禁庭勤恪靡懈㑹課來上宜錫恩章往其欽承務稱甄奬可入内左藏庫永州團練使馮鐸可轉一官制勅具官某稽勞叙進不以遐遺矧吾禁省之臣㑹課來上褒能之典厥有故常惟爾禀資溫恭廸已勤毖率職有裕閥閱具存宜進厥官以示甄奬服兹寵命尚加勉哉可内侍省内殿崇班藍惟信可轉一官制勅具官某惟爾從子功緒可嘉爰錫恩章許其回授宜遷爾秩以示寵嘉往服命書毋忘勤毖可入内西京左藏庫副使張僅可轉兩官制勅具官某朕推一心以馭羣臣任無内外必稽其功緒而進之爾服采禁省克自抑畏閱嵗兹久積勞當遷叙進厥官往其秪服可入内内殿崇班鄧宗仁入内左藏庫使梁昭慶可轉一官制勅具官某等宫省之臣出入禁闥恪勤不懈考績維明有司以聞法當叙進宜遷位秩昭示寵嘉往克欽承尚有超擢可供備庫副使蘇球東頭供奉官蕭恭右侍禁張廉張孝忠梁嘉叟右侍禁華鎮崇班劉震右侍禁錢景寛右班殿直蘇絢可各轉一官制勅具官某等浮梁建壘工役不愆爾等咸服事勞協力趣辦宜推恩典以示褒嘉序進厥官往承無斁可入内内侍省西染院使郝平可特轉一官制勅具官某朕考覈羣臣録其功緒爵禄之賞資以勸能惟爾賦材敏明廸已勤毖踐揚事任積有顯勞宜錫命書褒進厥位往加勵勉務稱朕恩可入内内侍省供備庫副使張禹偁西頭供奉官武昱可各轉一官制勅具官某等朕在濳邸時嘗造燕府相與講學爾等實預秪奉念之不忘宜錫恩章特遷位秩往加勤毖以稱所䝉可入内右騏驥使裴絢可特轉一官制勅具官某曩築蕭關爾預宣力以時促辦工役不愆勞列之優宜膺厚賞用申舊命加進厥官褒善録勤惟以示勸往服朕訓無怠欽承可入内文思使董舜臣可轉一官制勅具官某朕考覈羣臣録其功緒爵禄之賞資以勸能爾出入禁庭謹恪可尚軍器建局率職有勞宜錫恩章以示甄奬擢陞厥位其徃欽承可入内西京左藏庫副使黄洙可轉一官制勅具官某朕考覈羣臣録其功績爵禄之賞資以勸能爾材資之優率職有裕軍器建局宣力為多宜錫恩章以示甄奬擢陞厥位往其懋哉可入内西京左藏庫副使張禹偁可轉一官制勅具官某爾秪事皇府閱嵗既多宜錫恩章以示甄奬進官一等其克欽承可入内右騏驥使朱拱之入内左藏庫副使何訢可各轉兩官制勅具官某等爵禄之賞操柄在予念功簡勞人用胥勸惟爾服職宮省夙著恪恭茶事告成預有勤績宜加甄奬昭示寵嘉用錫命書擢陞位秩往承無替尚有異恩可入内内侍省文思使榮州刺史陳宥可轉一官制勅具官某計其嵗月察其行能而後進之此有司考績之政也雖吾宫省之臣耳目所及亦率是法惟爾出入禁闥勤毖可稱㑹課以時既應遷格序陞品秩爰錫命書服往寵榮尚加勵勉可入内左藏庫副使黄希叟可轉一官制勅具官某爾秪事宫省勤毖不渝論課有司既應遷格宜陞班秩以示褒嘉往服恩榮益思懋勉可入内内殿承制楊軫可轉一官制勅具官某爾報事内省勤毖可稱褒進以官往其秪服可入内内侍省禮賔使及入内内侍省左藏庫副使胡宗傑等並轉一官制勅具官某等考績之法以勵庶工褒善録勤靡間疎逺矧吾禁省之臣義豈當後惟爾宣勞夙夜勤毖不愆㑹課當遷叙進厥位是雖有司之常法非率職勵行其何以稱此可入内内侍省左藏庫副使張璪可轉一官制勅具官某禁省之臣職任親近稽勞叙進時乃舊章惟爾材資之優濟以勤恪有司㑹課率職可嘉宜錫恩章俾陞位秩往其勵勉以對寵恩可入内左藏庫副使何訢可轉一官制勅具官某宮闈嗣慶爾父預恩祈以寵章屬於子姓惟爾出入禁闥勤毖不愆宜錫命書進陞位秩無忘忠孝乃稱所䝉可入内西京左藏庫副使劉光祖可轉一官制勅具官某汝涖職恪勤達於朕聽進官一等以示寵嘉往服恩章勿替厥志可入内内侍省内東頭供奉官熙河路走馬承受公事秦肅之特轉兩官制勅具官某汝出入戎行以駿奔承命為職廼能審度事機率先士卒奮身鋒鏑之間决戰取勝誅斬首惡閱級既多幕府以聞朕用嘉止進官二等以懋汝功服我寵榮愈加勵勉可朝請大夫尚書省都事呂昭敏韓祥可轉一官制勅具官某等朕命儒臣編次學制成書來上爾與有勞擢進一官以示甄奬往承茂渥無替恪勤可手分借職邵淵左安仁廉公謹可轉一官制勅具官某等爾奉行文書勞勩宜賞進官一等其往欽哉可宣政使深州防禦使賈祥可使額上轉行一官制勅朕親御翰墨刋定學校之政令命官編次既獻成書應奉之臣宜膺慶賞具官某持身祗肅涖職恪勤揚歴既多休有譽處惟兹建局承命不愆宜進厥官昭示嘉奬往其欽佩益懋厥修可西京