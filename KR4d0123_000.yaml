body:
  text: 摛文堂集十五卷别集類二宋提要臣等謹案摛文堂集十五卷宋慕容彥逢撰彥逢字淑遇宜興人元祐三年進士調銅陵主簿復中詞科遷淮南節度判官崇寧元年除祕書省校書郎歷官刑部尚書卒諡文友宋史不為立傳其生平行履僅見永樂大典所載墓志中志稱所著文集二十卷外制二十卷內制十卷奏議五卷講解五卷藏於家合計之當為六十卷而宋史藝文志載有慕容彥逢集三十卷其目與志頗不合今據彥逢孫綸原序稱因兵火散失綸搜訪所得分為三十卷命工鏤板目以摛文堂集則是集乃綸所重編宋史據以著録故與墓志互異也彥逢才藻富贍當紹聖初設宏詞科實首中其選後受知徽宗列禁近官侍從者十有五年一時典册多出其手今集中存者尚幾數百篇其榮遇不為不至而檢核所作希睹讜言惟多以獻媚貢諛熒惑主聼如以刑部獄空及天下奏案斷絶具劄稱賀至三四上殊可嗤鄙又如理會居養院學校諸劄子亦皆希廟堂意旨所尚曲加文飾吕祖謙輯宋文鑑不録彥逢一篇其擯斥之意當由於此特因其沒於政和七年時事尚未潰裂故不至附會童蔡以成其惡名耳然其文章雅麗制詞典重溫厚尤為得體詞采殊有可觀就文論文固亦未可竟廢也謹據永樂大典所載分類裒輯釐為詩二卷雜文十三卷而以諡議墓志别為一卷附之庶讀者尤得以考見崖略焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序古今以文名家者多矣其有兼作者之妙為百代之師者文忠蘇公而已是以皇上萬幾之暇親御翰墨為之序贊有曰他人之文或得或失多所取舍至於軾所著讀之終日亹亹忘倦常置左右以為矜式大哉王言誠萬世不刋之典也當時學士大夫有經品題皆足以垂世况深蒙見知者乎尚書文友公家世伊洛河南王之逺裔也天姿秀拔自幼篤學之老不倦家藏書數萬卷手親是正不憚寒暑蓄諸中者既豐故發諸外者汪洋大肆浩浩乎莫之禦也元祐間弱冠登進士第至紹聖初屬設詞科一試而首中之雅為蘇公所器重誠以道德文章有默契於言意之表宜乎聲相應氣相求也公司鳯閣直鑾坡登八座五知貢舉天下服其文鑑之髙名公巨卿多出其門揚厯華途垂三十載惜乎位不滿德未足究其所學而恭和御製敷演辭命忠言讜論髙文大册每篇奏御必蒙褒嘉真足以造作者之淵源垂將來之軌範也平生所著百有餘卷因兵火盜賊之後散失幾盡慕容太守為公嫡孫力於親舊間搜訪所藏尚及千篇患其先後踳駮且命興祖訂正之興祖善太守之志能使乃祖鴻筆麗藻光傳後世孝也天下學者有所師法仁也仁且孝君子之能事畢矣奚敢以不敏辭若乃孝友之行忠誼之節謀猷之嘉德量之廣操履之正建明之公有朝廷諡議與夫行狀志銘在開卷昭然固無待僕措辭而後見也輒因其文而次第之以為不朽之傳公諱彥逢字叔遇文友其諡云淳熙十有四年嵗次丁未正月上日從政郎象州州學教授劉興祖謹序先大父少師文友公弱冠登元祐進士第逮紹聖初首中詞科之選自會稽教官被召際遇明主遍厯臺省進登八座平居暇日未嘗釋卷有文集二十卷內制十卷外制二十卷講解五卷奏議五卷因兵火盜賊之後散失幾盡綸近於親舊間搜訪所得尚及千篇分為三十卷命工鏤板目以文友公摛文堂集時淳熙十四年嵗次丁未下元日第四孫朝奉郎權知象州軍州兼管內勸農事借紫綸謹書
