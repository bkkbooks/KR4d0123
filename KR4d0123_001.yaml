body:
  text: 摛文堂集巻一宋慕容彦逢撰賦瓦瑞賦祝令之治金華家問以瑞告曰兹十有二月癸酉立春櫩瓦有花色雜青紫拂之可去留之不瘁文彩鮮榮兩兩夾峙瓦首鱗次花舉相似謂予不信并以瓦寄予佐金華獲觀焉曰嘻靈物効祥胡可勝記彼陶而花未覩兹美夫豈無因而至耶祝令請賦之予曰唯唯協洽之嵗辛月季冬十有九日春令已融日維癸酉東風解凍蟄蟲始振草木萌動旦興覩異惋愕未詳非刻非畫雜以青黄托髙甍以耀藻濡湛露之清光靡纎祗以自固舍翠縹而外揚質糝糝兮可拂色葱蒨而煒煌状卿雲之敷葉始膚寸而未将于是晨輝俯映宿靄盡滌秘艶發散奪人目力非卉木之常姿集孔翠之文翼蹇将蔓而莫承紛既絶而未極疑飄颻以騰上不終悴於埏埴是日也閭巷驟傳觀者如堵詢於黄髪于時語語曰惟祝氏舊有令人詒厥隠徳庇貺子孫惟子惟孫前人是似儒行聿修世有清議惟兹降祥神實司之我儀圖之歌以叙之乃歌曰江山之陽有祝氏奕世清芬靄蘭蕙神之聽之錫器瑞所居有光霄燭地旦出土牛知改嵗瓦上雙花應春至神巧無宗奪人偽瓦衆花繁舉相類毫素模傳示來裔積善之家葢如是巖竹賦元祐六年某道中有感而作予佐金華言從吏役方暑藴隆仰畏炎日載馳載驅道阻且修我僕痡矣憇於道周念兹迅翮向夕知還予行未息揮汗于顔情悁悁以遐想思欝欝而永嘆欲吐辭兮囁嚅歩芳芷兮蹣跚乆乃指並巖之竹曰始予之閒居愛竹成癖挹之而後飲翫之而後食或攀枝而歌或就䕃而息或宻之以來風聲或踈之以招月色與竹為友時予三益如接晤言具韙莫逆惟今予懐與昔逈殊為斗粟以罄折曽匏𤓰之不如從卑喧之末務殆心勦而形癯悵願言之契濶詠瞻彼以躊躇是竹也滴露如泣倚風如愧如怨如慕姿態特異雖不能言請對以意曰植物之生春榮秋悴嵗寒後凋予實同類禀虚中以襲道擢圓質以象智筠外飾兮中禮節孤聳兮近義以比君子考徳云備昔子之予悦也謂不可以日無此君今不予顧也猶友生之離羣學雖不以干禄仕有時乎為貧知達人之吏隠志奚往而不申夫山林不必静江海不必閒勿撓勿攖湛然乎有為之間乗田委吏擊柝抱闗所遇皆適亦何有乎夏患若是則與子相忘不必形遇未始有物孰好孰惡語意已畢予亦驚悟登車詠歌風清月素雙楠軒賦南郭夫子養素丘園于室之右面楠為軒客謂夫子曰予昔放浪迹如漂萍南逰北渉舟車靡停睠彼通邑豪俊誇矜崇飾土木以麗争聲青樓朱閣䆳室危亭月臺嶢甃風軒霧甍列嘉植以助䕃裒名葩而播馨聆珍禽之巧啄玩恠石之殊形洽比婚友意氣相傾飲何拘於卜晝醉夜色之澄眀今夫子之軒廣不數椽攬幽僻以自誑甘寂寞以窮年豈願言而弗獲將懐土而樂旃夫子拊髀而歎斂袵而對曰予樂在内子觀在外思莊生之貴真與老氏之去泰審予心之所安雖容膝以為大予之為軒也雙楠在前環以茂林來清音於南澗挹爽氣於西岑方春之陽予楠向榮萌芽葱蒨錯以瓊英入夏扶踈芘我墻屋翠隂正繁秀色可掬商秋既肅凄兮向彫凝露丹葉凉風韻條凛凛隆冬雪景尤勝玉幹髙聳瑶枝互映四時代謝此景循環載欣載矚獨寐寤言罇中芳酒暢予情瀾勸言酌之亦既酡顔荒徑自掃衡門晝闗乗化委分顧何有乎憂患予自謂此樂無窮而豪俊之樂不可保彼樂以物而此樂以道嗚呼昔居此邦胡可勝記同歸乎盡逝若湍水釣臺嚴子茶舍陸公遺址雖在荆棘揺空予有安宅亦曰廣居匪土匪木巻舒在予予軒足矣將復何慕客聞若驚腆墨而去韓信背水破敵賦井陘之役信提孤軍師出間道兮輕騎傳發敵據便地兮髙旗紏紛乗喋血之新勝建背水之竒勲卒破强敵進兵席巻清四海之妖氛原夫項氏暴興漢師數潰屯壘蚌鷸形勢腹背將軍以上惟敵所愾指揮迴天地叱咤摧嵩岱擄魏豹于陣禽夏説于代彼趙人兮擁全軍之盛據空道之隘登山以望衆寡既非其倫即鹿之圖得失於是乎在我雖攻戰屢捷威武益張然師實逺鬬兮法之所忌士非素拊兮用或不臧欲以生之必䧟諸死欲以存之必置諸亡于是對大陣之整整背廣澤之湯湯還途塞兮議不返顧衆志竭兮鋒何可當爾乃棄鼓以驕敵人之心易幟以惑敵人之視洪瀾無際兮軍焉用殿怒濤有聲兮神若同恚雷谹雷掃風起炎至血陳餘以染諸鍔擄趙歇而併厥地國歩寖廣羣心愈親斷楚之臂亡楚之唇故初軍滎陽不能寸進者數嵗及垓下卒集大統於真人由是知兵法貴竒將謀在智雖背山阜者彼難於衝突而驅市人則我易以携貳惟變通不窮故勝可决惟洶湧在後故退無自于時也望而大笑者多矣聞而未然者有之計非常兮故所不載神莫測兮敵無以為不然安能以一當百而取之不疑以勞制逸而用之不疲古有擊虚排術家之多忌易稱左次違經㫖而從宜故得智勇兩全功名兼擅由漢以來言兵者莫不稱淮隂之善戰五言古詩感春橋門並馳道車轂聲摩空重廊隔囂鬨閴若林巒中黎明寮寀集聫騎紛蹄騣交情金蘭契晤語藥石攻翰墨時間作辭氣争豪雄㣲蹤幸接武徒愧勞無功軒牕鑒晴日簷外鳴春蟲沉迷驚節物飲啄嗟樊籠沂風漸澹蕩璧水初冲融坐想名園花芳菲衒青紅儒宫異拘窘胡為苦匆匆來時招客醉駕言與君同夜深偶成同舍諸稚子初更坦腹眠湏臾起鼻息洶洶如奔泉而我憂且病欲卧輙遷延坐乆覺疲倦就枕如臨淵展轉復長吁情緒更凄然睡思暫彷彿征鴈鳴九天使我不能寐體氣寜不便身心貴攝理事累宜棄捐而我無所荅泣涕但漣漣是時月當午素影隙中圓晝卧偶成用前韻我如邉孝先性愛日晝眠眠眠曷能寐愁思如湧泉東風穆穆和午影遲遲延憂多首自旋猶如瞰面淵人皆喜春色而我今猶然叱奴啟南牕欹枕望青天浮雲來飄飄飛鳥去還還望眼無窮極移卧忩之前焉能夢栩栩徒自腹便便悠思慕范蠡心形得兩捐輕舟泛五湖短棹鼓清漣規矩不我制所意成方圓讀揚子子雲不偶時晏如在空屋席有𤣥虚文門無權倖牘法言譏異户觧嘲懼赤族忿排賦長楊羞愧登天禄立俗思徇道制行依聖讀身死名不朽馨香藹蘭菊讀陶淵明集晉末何所似波心躍長鯨生民畏擾攘蹙額視欃槍淵明當此時棄爵務躬耕葛巾漉家酎盃乾壺再傾恢然聊寄傲無心事將迎眼底不足語筆下漫攄情襟懐有佳趣落紙字字清有如碎寒氷貯之琉璃罃又如湛秋水含茲霜月明秀氣如可掬妙理不可名辭中有餘意此致尤更精班豪誠可厭曹侈無足評斯文孰比擬誦之清風生三月雨霽逰夀聖寺新霽澤國净禽聲落雲天精廬巧營構重扉鎖春妍簷楹曵晴絲池沼鳴細泉卉木互凌沒鉛華刷澄鮮檜樅屹如削榴櫻開欲然零蕊莓苔鮮幽香雜蘭荃俛仰欣所遇塵埃坐自捐云何冩軒曠松風鳴素絃留題聖夀院休征日欲沉晚風薄虚翠深秋景物清蓮宫有佳致踈林速凄凉黄花㺯明媚山煙入寥廓螽聲失幽䆳翻經瞥聞音掃葉不待篲危軒逗寒色飛禽示真意勤役何足辭妙觀良可秘歸歟誠未央爾耳悲所志留題覺慈寺勤役大無悰駕言從勝逰蕭蕭野色净行行村逕修逶迤轉隈隩初見巖巒幽喬木聳霄漢風籟凌清秋稅鞅得精舍雲遶空中樓簷楹列清障下有百丈湫紅塵不到處俛仰銷百憂喟然問圓頂有此能樂不留題智者寺天工剖山腹翻然納虚秀環岡挿修䕃斜巔倚寒溜危軒列層級横梁跨深竇浮烟羃輕縷飛禽引鳴脰冲襟得清眄佳致絶纎垢夢想脱冠來塵縁苦相逗留題婺州智者寺宿雨雖乍晴輕雲猶出岫春深卉木繁千巖衒芳秀誰云山逕幽㳙涓響寒溜時禽助好音百囀引鳥脰老僧邀客留蒲簾捲圭竇側耳石鼎傍蠅聲辯湯候茶品頗自修擊拂振襟䄂勤劬爇鑪香挹試殆三嗅稍定與之言飄然出塵垢坐乆月華生澄潭明列宿和吳顯道澤國破秋仲景物兆冬索囬颷巻林尾宿霧泛寥廓泮水還闤闍層巒瞰籬落啟牖挹蒨葱開徑徒參錯虀鹽雖寂寥文史欣博約論古到鴻荒談經愧穿鑿逸志想鴻𡨕靦顔羞雉啄於焉得真趣豁若觧其縳環窻惟載籍一視等糟粕了了見本來端如契圓覺冲襟逰汗漫髙歩趨廣莫同心有名儒攝官在戎幕學識造淵醇詞章臻炳鑠良驥服鹽車白駒縶場藿念昔始傾盖考正于狐貉韻宇凛可欽標致湛無着觴豆陪餘歡翰墨時間作晨嬉風力勁夜語霜威虐屈指两炎凉流年信廽薄九重躋帝徳四海絶民瘼南征奠蠻侮西戍弭戎掠吾道斯為亨君才顧何怍行當坐天禄看書資筆削不然𡨕成均闡教助飛躍冠綬追英逰林泉謝逺諾胡為懐故鄊逝將依負郭古都富城市比屋麗金艧甲第臨江壖勝槩奪雲壑曲溝環渌塍激澗度危彴升髙或捫蘿厲急輙遺屩馴禽棲几席幽花堕杯杓漁樵頻問訊童稚雜讙懅尋歩陟蘭嶼選勝望菌閣此雖美無度烏知乖所學待時既韞玉税駕宜振鐸忠告冀毋忽投分匪輕託野芹稱美獻行潦資逺酌睠言効悃愊豈止事嘲謔知君湏多暇過我當如昨茗飲無俗情䟽餐有真樂論文窮九疇議武貫三畧誰主復誰賓此意良不惡題諸暨王秀才華軒卜居逺喧闐山中有清意中為風月軒周詩得標置琴書道自樂花栁春争媚紛華非所事安恬養天智君家逸少後芬芬今不墜文章擅塲屋孝弟先閭比小淹何足嗟懿徳天所秘醖藉勿感慨雲雷起平地次韻葉權之南宫春興三年客京華雰埃侵鬢緑花時豈相闗藜藿欣自足故春鎻膠庠庭槐如兎目沂風清晝吟璧水泛晨矚今我復來兹芳菲照華屋日長簾幕深欠伸倦晴燠英英同舍郎文采命騷僕真想寄吟哦詩壇令何肅惟時届清明千官賜休沐我事未渠央矧敢念歸宿何當榜貢書諸生駭神速君歌我乃賡聊以慰局趣再次前韻贈葉權之廣文新决科恩𫀆鬬春緑香名滿衆耳要路䇿髙足阿房得第五中眉嗟志目平明趨省門容儀聳旁矚廪薄雖屢空潤身非潤屋朅來鎻南宫迨此東風燠吟哦夜不休立侍窘童僕詩成字字清華星㸃秋肅中含不盡意往往念歸沐遥知卧鴟夷獨酌慰齋宿云誰可與飲隣有三不速篇巻正沉迷當以從事趣次韻荅翟公巽見戱鞘中長鋏鳴將軍出天山前驅七萃士鐵衣照朱顔萬馬飲瀚海丸泥封玉闗何必學孫吳功成談笑間西顧浄無塵仰視太白閒歸來佐天子坐使淳風還贈明智大師上人真法器根性宿明悟閲書一再過覆誦絶遺誤教乘浩無涯秋毫析紛互援證窮理窟辭源百川注曉堂列圓頂瞻仰祛未晤執熱濯清風中痟飲甘露瑩如壺中氷潔如機上素鱗角雖出羣豹文方隠霧送安宣義還雒陽學省無吏窘官穏如林丘寮寀得之子一語消百憂虀鹽對晨餉菘韭餘時羞淡薄本同適言歸異初謀親庭奉喜慶退有園池幽樂事廼如此攬執安肯留塵區饒滯念役役無時休冲襟得髙躅視身等虚舟嵩少多逸士盍徃從之逰相見試舉似此語頗勝不送趙節推㳂檄還郷蠶月舒以長麥天和更清初荷吐香芽新蒲生紫英濟濟幕中客眉間黄生明膏車指鄊國言歸奉夀觥上堂拜嘉慶喜雨淪飛甍斑衣學古戯芳蘭逗春榮世態今猶昔萬緒水火争奔馳浪自苦心胸沸庖烹賢哉吾景崇養志輕利名効官求便郡晨暮請安平兹行天所佳祥烟送曉征要當感星聚豈徒資月評送曽正直往嵗别君去怱怱殊未饜來兹諧宿願一笑忘虀鹽俛仰復去我促裝難暫淹重江逼潮信掛席程欲兼諸暨號繁劇牒訴紛黎黔君才古循吏公庭耿秋蟾借留適民願坐變六凉炎政術乆彌勵謡頌喧閭閻朝廷方籲俊延訪降宸嚴行矣决顯用此理君奚占李縣丞美替作此詩餞之東陽見夫子格調駭心目相逢恨不早請違何太速咄咄空中字便便榻間腹暫留腸九囬言歸日三卜到家樂應顛登舟喜堪掬題橋釋舊誓彈冠俟新沐偃蹇何足嗟君看松與竹友人有小石數顆以余酷愛將輟恵佳者唯求一詩賦以贈之公子有佳石丹碧非一狀磊磊不盈掬巧奪三山狀貯以白玉斗挹注秋滉瀁有如澄江浄隠映朝霞上頖林官獨冷悦此助清曠唯求詩句易於焉窺雅尚山隂昔換鵝流傳信非妄同呂文剛呉邦獻馬子才賦白菊得采字紅紫春争妍那復俟秋宰兹花如端人凌颷振輝彩英英剪輕雲粲粲絡珍琲天清月色留日淡霜華在髙標比松竹芳氣壓蘭茝飄零飫夕餐韡韡富晨采中有神仙滋收功逸而倍調丹雜樗楮服之毋豫怠能駐好容顔延齡向千載事著抱朴書劉生豈予紿七言古詩次韻張察推詠宻印竹軒衛尉才豪雖卓絶溺志奢滛愧明哲羅綺叢中醉復醒趂拍佳人不成列黄門侍郎天機深傲世忘榮事髙潔侯印公主不解顔好竹之心了無節紛華必竟致青螺恬澹有誰賡白雪此君佳致識者稀千古清風與明月髙僧欲現菩提心種竹滿軒功未徹嬋娟人共得觀臨蕭瑟師當知演説率然相造師勿嗔勝遊本為吾僧設對君不惜洛生吟更待詩酣歌二闋次韻鮮于學録太一宫海棠巍巍樓觀神君宅晝鎖眠魚斷人迹嚻塵不到春自濃海棠繞砌花如織日窺絳彩豔朝霞露浥芳苞㸃靈液枝侵香霧拂桁梧乗風欲鬬蜿虹赩都城三月賞花天争騁纎驪并赭白廣文官冷苦無悰偶到殊庭欣有得嬌嬈初值欲開時逥視羣葩澹無色許昌風雅譏少陵玉壘繞山夸蜀客豈知移根古夀宫瑶草華枝伴蕃殖雨餘濃麗應更妍負賞牽吟心未息赴省試到闕偶成去年隋隄一丈雪雪路苦寒那可行行人畏寒兼畏滑滿蹊堅氷如鑑明行裝人與馬成二身不自惜旁人驚﨑嶇千里到京闕痛定囬思雙淚傾伊予少小親翰墨應敵豈觧前無勍今者西來皆計吏妄與羣俊爭文鳴無田歸耕曷為養得失未易秋毫輕作歌聊用寫情素擁鼻㣲吟同洛生蘭溪葉宰以某阻水治山頂僧舍見邀作此詩以謝月輪一夜離天畢山川吐雲翳朝日飛亷吼空馳霹靂雨勢霶𩃱兩溪溢横流不復相望軼浪花飛起三千尺我時艤舟酣戰慄眼看民居半沉溺邑令之賢誰等匹為治公居寄家室顧眄奔濤心睱逸寓居恰倚青山脊吁嗟此驚身未厯折腰逺來甘恐惕餐霞先生今鎩翼附郭相君無所食愁霖謝子雖非敵少宦徐郎良未懌和岑運使題趙吏部容膝齋詩公不見金谷樓䑓挿寥廓珠璣映出琉璃薄滿甑青螺甲第空富貴囘頭驚旅泊又不見淵明三徑似元卿藍縷茅簷僅容著心知侈汰非逺謀寄傲南牕安所託二子薰蕕古至今遺臭傳芬皆自作中郎天機湛秋水涵泳源流潄芳酌小齊容膝思昜安顧盻俗縁嗟自縛琴書對眼助清閒杖履從人笑踈畧紅塵一㸃不到處只許爐香度帷箔吁嗟淡静世所艱此味要之屬丘壑能以膏粱甘寂寥道德髙風信𤣥邈真長標置自非凡區區乃念東山樂見嗤逸少固所宜詎識此生如寄殻㑹湏掩關友松菊俗子扣門從剥啄揮殘麈尾雖可佳弄絶韋編良不惡為陳秀才題墨妙堂寳池當几潤滑并蟾蜍玉竇寒泉傾墨花泛泛花脚輕雲牋皎皎月色明凝然嗣將先管城一掃神怪吁難名騰龍舞鳯相囬縈倒日飜星草𨽻行或如懸崖倚孤撑又如脱馳萬兵猿攀虎怒勢争鯨奔蜃駭駛波浪驚篆斯𨽻邈草伯英鍾蔡衛索更品評逸少兼之集大成寥寥千載無與京鼠鬚蠶繭秘跡清玉華遺言同誓盟埋藏不計申與庚模蹤間出相光晶太丘佳士天氣清訪求寳字金滿籯編聫軸巻紛縱横名家諸妙皆有聲文餘髙致超八閎深求衆法窺忘情㑹當臨池染澄瀛銀鈎萬字揮峥嶸送葉朝奉夫君才調天所旌胷襟洞然秋月明兩以文章對集英老拳再中匠者驚割鷄已詠劉江陵盤根錯節君所輕斷蛟剸割無能攖懿效翹然宜彚征列章論薦仁且明炎凉三嵗歌有成千室不放休車行斑衣歸學嬰兒聲靈椿丹桂芬芷蘅上堂獻夀樂事并餘歡洽比賦丁丁我之别兮不識情君之愛我勤且誠祝君轉飛九萬程男児功業貴峥嶸上毛運使人各有求心靡同世路奔馳如捕風我獨不願萬戸封悁悁所願識毛公我公髙才真國器醖藉聰明天所秘子師氣格千里駒廣基文章一枝桂學優入仕斯義榮我公所至皆可稱來暮已歌亷叔度去思還似謝吳興天心憂勤念方面外臺遴選皆英彦我公所至綽有聲炯炯精金經百錬昨夜使星入斗牛鵲聲曉送傳書郵報言有詔下天闕公按濱江十四州審報已真驚且喜入户不知摧屐齒拜塵潘子行有縁倒屣蔡公何敢擬自嗟此誠今未通何時垂翅附㝠鴻眉間黄色已可慶襟懐不復歎秋蓬公不見張華一賦致髙位阮瞻三言得清議刻畫無鹽雖有心滓穢太清徒自愧朝廷言路方坦夷比年漢詔下天墀所念淵明方為米㑹湏平子為𤣥題答王及之賢良見寄公圭侯印人所優利鎖名韁吾所羞耿耿有懐非隠憂思得佳士從之㳺今年折腰來佐縣辭采接君心自見懐刺過尋不問程剥啄扣闗諧所願誰云白首交如新傾盖相逢如故人囊中製作絶倫類和璧隋珠無足珍心醉歸來書文室却怪前宵夢椽筆至音寂寞知者稀安得論文永足日可嗟吏道事奔馳信信不見元紫芝胷襟不復憂鄙吝圓緘寄我愁霖詩得詩三復雲牋巻喜氣填膺光滿面一首能輕萬户侯緑髪幸交三語掾我今爾耳何為哉汗漫如君心自灰為君挹盡雙溪水不發纎塵汚兩耳醉歌行次韻甞聞醉鄊之樂真且全青州從事郷之賢盃鐺三百沃軒曠眼看萬有心陶然平生不識飲中趣糟漿逆鼻憂頽顛捧甖徒知詠酒頌側弁未始陪賓筵丈人襟懐湛秋水塵埃滌盡中恬淵美哉家釀蔵之乆誓可與飲無留涓宴開設此杯中物意如割炙何勤䖍歡誠感激忘既醉是日飲興輕金船房櫳蠶老舒長晝郊野麥秀清和天主人放懐客盡量談間標韻凌雲煙醉歌耳熱匪吾事兩腋清風同玉川願言乗兹騰倒景清都謁帝羅羣仙酒䦨逸思不可遏筆端詩句如奔泉求畫伯父有畫美且都丹青彷彿顔色渝塵埃漬漬相染汚惟有筆畫存規模隔歩看之有若無想像人物淪煙蕪刲羊刺鹿皆糢糊皮毛狼籍血盤盂巨索懸鼎地為爐薪火炎炎勝西隅庖人握刀眄精麤几上獸肉縱横鋪中有一人與衆殊戴㡌被甲腰屬鏤昂藏形貌長髭鬚眼看手指如典徒一奴禿首携酒壺酌之飲衆蘇勞痡衆人得酒停烹屠延頸飲之舉兩腢有壇數級如闉闍壇側毅然一武夫負弓韜矢手執殳左右不敢肆闞𨵦此是胡中祭天圖故應先日事庖厨㣲生見之甞覬覦好之不啻千金姝
