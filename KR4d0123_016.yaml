body:
  text: 摘文堂集附録慕容彥逢諡議當部準勑定諡據常州申繳到故通奉大夫守刑部尚書致仕河南縣開國伯食邑九百户贈銀青光祿大夫慕容某行狀依例送太常寺擬諡今據回申到擬狀諡曰文友奉議郎太常博士胡交修議曰崇寧紀元之初上方躬親聽斷勵精庶政修遵制揚功之治求賢如弗及輔弼大臣搜簡以副側席之求凡所薦引皆召見便朝天子親訪納焉時公在選中比入對論議有餘喟然動丹扆亟擢儒館上方欲褒顯異才以勸多士於是閲歲未幾不纍遷遂持槖近班要途華貫翺翔殆周公感遇特異思竭底藴以報眷知益自激昻以赴功名之會所歷咸有可紀儒學彬彬譽望蔚然為一時聞人嗚呼亦可尚已既終于官其家狀公行于朝命諡于太常諡法曰德美才修曰文能善兄弟曰友以是易名於行不浮請得而論之公天資頴悟人也自初就傅其默識強記固已過人閲書一再過輒不忘既仕益自力於學藏書至數萬卷退食即研精其間自六經羣史諸子百家之學靡不洽通故其所蓄雄深閎博放為詞章邃然根柢理致代言西掖攝直北門凡所草定援筆立成溫厚典雅炳然可觀士大夫稱之號為近古豈不曰德美才修者乎公天性篤孝事繼母尤極謹順先意承志比終嘗如一日撫先德之遺澤抱弗洎之深悲常慨然曰獨可致力友愛于我諸弟庶慰怵惕之思焉於是撫育訓誨誠意篤備世賞不先其息必遍同氣雖法必任子者亦力請於朝以及之吹噓汲引唯恐後用能咸被采擢華蕚扶踈聮榮一時世之稱友愛者必以公為言豈唯族姻鄉里慕之縉紳之士莫不推之上至於天子亦聞而嘉奬之蓋其因心力行故久而益篤厥聞顯著如此豈不曰能善兄弟者乎考論公行被之以此諡其誰曰不宜方公居諫垣則持論堅明風望隱然二銓曹則籍比情例條目以絶吏姦守汝海則能以寬惠得民心長秋官則禁妄繫正敘法頒斷比以恢讞奏之路寬罪之類者以廣上恩才周於用故所居底績宜不一而已也若夫官師論諡獨綴取行已之善其尤較著者以垂不朽云謹議奉議郎守考功員外郎吳巖夫伏承太常寺諡議如前謹按上公天資警悟學術過人自其少時已能奮勵力取進士第嶄然見頭角識者固知其逺到矣紹聖間朝廷設宏詞以待文學之士公與同輩試于有司一舉而得之自此名聲上逹聖主鋭意圖治網羅英俊用之惟恐不及公於是時首被識拔召對便殿擢置書林更踐華要皆以才能見稱未幾進直西垣一時誥命多出其手文章典雅士夫傳播以為深得代言之體出入禁闥謀謨議論為不少矣而公慎密不泄以故罕有聞者方將進用不幸云亡此朝廷之所深惜也嗚呼公之持槖幾二十年出處進退終始之節皆可夷考至於內行修飭孝友純篤出於天性則又有不可掩者世賞必先同氣而不以私其子撫育教誨迄用有成數年之間諸弟繼踵登朝寖以光顯矣然猶分俸祿以給其不足此又人之所難縉紳之論莫不以此多之天子亦聞而稱奬焉身歿之後室無私藏聖恩矜恤隱終之典於數尤縟太常參稽衆論請以文友二字諡公之名名稱其實不為虛矣當部準例於都省集合省官同參詳皆協令式請有司準例施行謹詳定訖遂具狀申都省取裁奉太宰判準謹具申都省伏候指揮勑旨仍付所司宣和二年二月二十三日奉勑如右牒到奉行宣和二年二月二十四日尚書吏部故通奉大夫守刑部尚書致仕河南縣開國伯食邑九百户贈銀青光祿大夫慕容某諡曰文友牒奉勑牒至準勑故牒宣和二年三月日書令史武統給考功員外郎吳巖夫考功員外郎黃叔敖侍郎王鼎侍郎盧法原尚書蔣猷慕容彥逢墓志銘中大夫充徽猷閣待制提舉南京鴻慶宫蔣瑎撰政和七年夏五月通議大夫刑部尚書慕容公疾病拜疏上還印綬天子閔以職事勤公詔以通奉大夫刑部尚書致仕是月壬子薨于寢享年五十有一上聞震悼制贈銀青光祿大夫賵賻加等又以御府錢二百萬賜其家宣和元年二月甲申葬于常州宜興縣篠嶺之原公諱某某字其先曹魏時建國為率義王歷晉隋唐世有顯人五代時開州刺史贈太保某於公為四世祖太保二子長曰某國初以功封河南王季曰某為磁州刺史生右衛將軍諱某家于滏陽隨子官宜興卒葬焉故今為宜興人右衛生少師諱某於公為考少師三娶周氏沈氏蔣氏纍贈崇榮嘉國太夫人公沈出也幼卓偉不羣六嵗喪母哀毁如成人默識強記讀書一再過輒不忘常有異人語少師曰是兒手有從理足有二黑子他日必貴視之信然初未之見也少長鋭志於學痛自砥礪窮經綴文不少懈出與諸儒試常為魁首弱冠登元祐三年進士第調主池州銅陵簿比少師捐館舍公承訃號絶哀感行路卒喪調主婺州金華簿改瀛州防禦推官知鄂崇陽縣會朝廷初設宏詞科以羅天下文學之士公從試中之遷淮南節度推官越州州學教授推所以教諸生孜孜不倦南方士喟然興於學益繕治黌舍刋印三史讐校精審遂為善書四方士大夫購求之鬻以養士逮今蒙利焉元符元年改宣德郎擢主國子監簿遷太學博士崇寧初元賜對便殿敷納明辨方秋試進士公建言以為邇來學者程文往往尚浮靡畔經術願詔有司凡選擇務先理致後文采詭僻不醇者黜之詔從其請除祕書省校書郎未幾擢監察御史兼權殿中侍御史燕見一再上益才之除左正言遷左司諫章數十上大抵以拾遺補闕輔教化慎命令為先劾按權近無所回撓後言執政以某事當去上亟為罷之論議堅正風望隱然除起居舍人踰月召試制誥擢中書舍人預編修哲宗皇帝御集三年春罹嘉國夫人憂初夫人寢疾公憂見顔間扶承左右殆廢寢食及執喪毁瘠踰制三年不居於內芝草産廬次鄉里歌頌之服闕洊拜中書舍人大觀元年春權翰林學士嵗中除尚書兵部侍郎數月改吏部建請編次差擬近比為書以窒欺謾下諸郡審核圭田有無多寡之實簿正之又為薦舉都簿具注薦士之章毋得隱漏典選凡三年條教張設鉗柅吏姦縉紳大悅便之進兼侍讀又兼議禮武選詳議官前所論執政復登用言官希意誣公以他事朝論不以為然上亦察其無他趣令視職而公力請補外遂出知汝州布宣德意加以亷平民有犯法必求所以寬之罪疑者從輕故下德其賜至相約不犯公令既去而思之不忘尋加集賢殿修撰政和元年復以吏部侍郎召兼侍講并議禮局二年冬擢拜刑部尚書公平日以文學進法律非所習人或難之公曰三尺安出哉顧患不留意爾凡有參決必本於法令而緣飾以儒雅故爰書論報當於理合人心建請開封府捕盜官與緝事使臣敢捕繫無罪人詣吏者並比附政和法縣以杖笞及無罪人為徒以上罪送州杖一百自是吏知畏憚不敢妄捕繫人又論命官負罪除名為重追官為輕而刑部敘法除名人初犯私坐乃除一官敘公坐盡敘舊官而追官者皆除所追官敘輕重不倫願詔有司詳定復請下大理取熙寧以來四方奏讞情法疑憫決事比頒之天下庶幾逺方知所遵用詔皆從之每決四方疑獄必從輕比多所末宥故奏牘之上司冦者屢以罄絶稱慶于朝兼詳定髙麗入貢法六年復知貢舉公自崇寧以來五司文衡一時俊傑多出其門進兼太子賔客上初建儲二以重國本東宫寮寀極當時之選公以宿德巨儒與今丞相白公偕被差擇朝野稱得人既職調護五日一見皇太子必力陳父子君臣之道如是而為孝如是而為忠惓惓輔道開益居多嵗中頻攝翰林學士自居從官凡翰苑缺員輒被旨兼領所草內制自成一集公久服邇聨譽望隆洽忠誼謀謨上所深知天下士指日以冀柄任而平時盛氣揚休未嘗有疾七年仲夏侍祠方澤適隆暑禮成而退體中覺疲勩猶力于朝謁告才數日遂不起病不登三事逺圖弗究豈命也夫將歸葬詔以季弟開封府刑曹掾彥季通判常州典護終事長弟彥許自開封府刑曹仲弟彥傅自太常寺丞亦皆請外同護喪而歸從官舉故事賦斂賻送合數十百萬公子攀棺號慟曰義不傷先人名卒辭不受公孝友蓋天性非強勉致然事繼母盡禮既處顯矣致養怡謹如布衣時友愛三弟所以撫育教誨之甚至稍長進之於學講習琢磨以身率之其後羣處太學皆犖犖為名進士延賞不先與子必遍逮同氣吹噓汲引例被除擢當時貴之其論撰集賢也法得任子不許及旁其時仲弟未命公慨然曰吾子可先吾弟官乎乃以至誠祈懇朝廷多公義特從之自貧約時與諸弟飲食衣服必均絶甘分少逮貴猶然每休沐朝直退必相與論文義或把酒燕衎窮日夜無厭斁暫不見即惘惘若有所失彥許初除天府刑曹公以職事對因辭謝上存慰勤至問及兄弟之數且曰卿之孝友朕固知之聚族千指調胹輯睦中外無間言京城無宅以居僦舍卑陋處之裕如也幼女與孤甥女皆擇命士之賢者歸之齎裝周渥不異已子居家不問有無祿賜所得不給於用妻子衣食才足而已既歿家無餘資天子亦知之故能賚賜特厚及葬狀公之行治上太常太常議曰諡法德美才修曰文能善兄弟曰友今其狀應法乃諡曰文友公之節惠可以無愧矣為人敦大靜重啓處有常不妄笑語雖家人子弟不見其喜愠御下以寬不與物忤人犯之不校也言官誣公者既死其猶子坐殺人州以具獄上刑部人為危之公平心論決卒傅生議論者伏公能損怨起家單平被遇明主列於侍從十有五年初無左右之助小心兢畏以義命自安無所附麗非公事未嘗請對天子思見公至被命乃敢請問自幼嗜學問晚節益篤藏書數萬卷朝夕翻閲不去手自經史諸子百家之言靡不洽通故其所蓄渾雄深博發為詞章雅麗簡古無世俗氣尤長於辭令典嚴溫厚褒貶無溢言詔命或叢委操筆立成初若不經意而輕重適當文采粲然每一篇出多士口傳以熟上尤愛公文以為有古風進見往往摘訓辭之善者稱賞之有文集二十卷外制二十卷內制十卷奏議五卷講解五卷藏于家公官階自宣德郎十四遷至通奉大夫開國自河南縣男至伯食邑自三百户至九百户娶葛氏故贈少保某之女封衛國太夫人賢明淑貞治家有法度二男邦佐承議郎行太府寺丞有美才所居官能舉其職邦用承事郎三女長歸余之子寧祖季歸余之子及祖仲適朝散郎尚書户部侍郎賈安宅孫男九人曰綱承事郎曰紹曰綯皆通仕郎曰綸曰約曰繪曰綖曰絳曰純皆將仕郎孫女四人長適文林郎賈巽次適從政郎任仲恕餘尚幼既葬邦佐以門人之狀與太常之議見示泣且言曰先人葬宜有銘願以纍公余與公居同鄉進同年仕同寮有遊從之好有姻婭之契知公為詳義不得辭也乃為之銘曰棘成之裔世雄朔鄙魏征海邦率義始王國初建功亦享王封乃及其胄右衛之崇維祖維考埋光弗耀是生河南盛德之報道隆以廣學博而奧逢時之休橫厲逺趠騫于禁密以職華要筆舌之峻調護之尊豈曰不貴公志未伸胡弗夀考俾秉國均維皇是悼喪我良臣有藴弗攄亦燾後昆諡以易名萬世是信篠嶺峩峩荆水沄沄既固既安曰公之墳
