body:
  text: 摛文堂集卷九宋慕容彥逢撰制宫正張氏可同知尚書內省公事制勑朕惟國家建省於內以總女官之職政本所繫蓋與外之中臺無以異也肆於用人考擇尤慎具官某氏性識疏通材資敏濟特身端慎涖事恪勤曩膺褒揚位於宫正業履之美門譽益彰宜服絲綸之言進聮喉舌之任往加厲勉務稱寵榮可宫人掌闈蕭氏可封司言制勑具官某氏後宫二十四司分建寮寀協贊內治豈惟示恩以汝性質柔和容儀端懿恪勤毖慎率禮不愆自列備官欽承無替嘉其譽處宜有褒升用錫命書擢升位等宣傳啓奏命汝司之往對寵章益綏祉福可宫人王氏可特授掌言制勑某氏宫廷宣奏職在掌言屬於尚宫秩任清美惟爾恪勤自飭婉靖有儀祇服事勞動遵內則錫兹榮品以示褒優往承欽恩豈俟多訓可宫人掌珍韓氏可典記制勑具官某氏宫廷宣奏職在掌司屬於尚宫秩位清美惟爾服勤禁掖進列備司恪謹有常咸謂敏濟典記之選以示寵嘉往其懋承永綏榮祿可宫人典言喬氏可尚儀制勑具官某氏後宫六尚之職分總二十四司聫事合治與外廷之六卿無以異也品秩既崇選授維慎以爾稟資婉靜履德懿柔恪勤能敏於事為恭穆動循於禮法宜加明陟以示寵褒惟經籍音樂凡賓客朝會班序贊拜皆總于尚儀其任可謂隆矣今以命爾豈不榮哉宮人掌綵楊氏可司樂制勑具官某氏朕閔兹恭懿奄及淪亡褒飾之文恩紀優異肆有寵奬録其舊人惟爾夙以專勤進列宫寀服職愈勵克著譽言宜錫命書擢司音樂往安祉福益保顯榮可媫妤劉氏可特授婉容制勑國家設寀宫闈以聽內治惟九嬪掌教四德名秩隆顯考擇之慎必惟賢柔具官某氏性資敏明儀矩端靚動遵婦學言協聲詩夙興詳求擢參顧侍恪恭不懈持久益彰乃兹獻嵗之初聿有後星之慶疏榮示寵厥惟典常其進聨於六儀以登視於一品服兹茂渥福履宜之可平昌郡君韋氏可才人制勑朕顧諟明命以承天休莞寢吉祥在豫妃輔褒崇之數兹惟典常乃形奏章移恩鞠女察其謙德特有嘉崇具官某氏志慮柔明性資和適言容兼穆禮法交修曩膺眷知肇啓湯沐服寵加懋稱譽日聞宜升五品之封俾為六宫之勸往安祉福茂對邦榮可誥鄭居中除同知樞密院誥勑朕賴帝博臨中外晏肅思與良弼共承天休乃眷西樞實總兵柄登二厥職必惟一德之臣具官某方嚴惇大沈靜粹和學全經術之醇識造古今之要曩自瑣闥延置禁林文章典嚴論議鯁諤閲日滋久聞譽益彰察其公忠國是允賴宜升右府列於近司於戲惟協恭可以謀國惟逺慮可以濟功祗服訓言是為報稱可鄧洵仁除翰林學士承旨誥勑學士視草玉堂極儒臣之寵而承旨專奉密命則又以其久次者為之祖宗已來士之與此蓋無幾也具官某業履端靖學問醇深揚歷清華進掌內制文章論議聲實顯隆閲日滋多朕所眷察宜以舊制冠於禁林往其懋承以副寵渥可殿中少監劉炳可免試除中書舍人誥勑西掖詞臣與聞幾政討論潤色必惟其人具官某學有淵源文知體要揚歷清貫望實兼隆比自螭坳進直御府率職勤毖朕所簡知其蠲給札之儀擢置代言之列往加勵勉副朕異恩可楊願除中書舍人誥勑中書基宥密之地擇屬惟難舍人演絲綸之言非才莫據取諸已試兹謂得人具官某端厚無華清明不撓有聞當世早著盛名仲舒潛心諸儒之論咸服何蕃正色六館之節自髙建歷華途挺然自守頃由柱史兼直禁垣善惡謹於必書文章妙於行逺就升厥次式副僉諧夫大哉王言儻能孚四海之聽則坦然帝制自逺追兩漢之風其懋爾猷益稱朕意龍圖閣直學士中大夫李南公特除落致仕誥勑朕治四海以孝御羣臣以恩矧位列從班事經湔滌子為父請朕所矜從具官某曩嘗廢居洊該赦令寖還職秩猶處於家子誡抗言條舉近旨特加甄敘俾復故常往慎厥修以稱朕命可口宣賜皇子檢校太保鎮海軍節度使開府儀同三司廣平郡王生日禮物口宣卿育粹皇闈承休霄極當誕生之初旦有加賜之彛儀茂對寵光益綏祉福就驛賜大遼國賀天寧節使副銀䤬鑼唾盂盂子錦被褥等口宣卿等使容有恪享禮無違冝膺頒賚之優昭示眷懷之厚往資服用式奉燕私開府儀同三司仲爰四月二十八日生日口宣卿聨上宰之近班總屬籍之重寄德隆宗姓望顯朝倫方誕育之慶辰有寵頒之彛制用馳使指往諭朕恩玉津園賜大遼國賀天寧節使副射弓例物口宣卿等循用賔儀出遊射圃夙間必中之技深嘉多獲之能爰有寵頒以彰優遇宣召翰林學士劉嗣明口宣卿問學之優文詞之美宜演綸言之密仍趨膝席之嚴其副虛懷益攄素藴賜臣寮口宣有勑卿出將明命歸奏膚功升聫上宰之班進視二公之秩用彰優遇其即欽承賜皇子感德軍節度使檢校少保韓國公捷生日禮物口宣有勑卿襲慶皇支分輝霄極當乃生之初旦有加賜之常儀祗服寵恩益綏夀祉賜髙麗使人相國寺燒香乾果子口宣有勑卿等虔依象教申祝宸祺載念逺誠宜優禮遇特加寵賜其體眷懷撫問荆湖南路臣寮口宣有勑卿汝等俱被選掄外分寄任宜加循拊用示記存兹敕使軺往宣德意撫問資政殿大學士宣奉大夫大名尹梁子美口宣有敕卿為時舊弼守豫北門兹履嚴凝諒加葆嗇宜致勞問用彰眷懷就驛賜大遼國賀天寧節使副賜內中酒果口宣卿等並飭使軺來修鄰聘致匪頒於御府資燕喜於賔筵示以寵私體兹優眷班荆館賜大遼國賀天寧節使副回程酒果口宣卿等並將鄰幣舉穆賔儀兹既抗於歸旃已載臨於候館宜膺嘉賜用示異恩賜陜西河東路臣寮御筆敕書奬諭銀合茶藥對衣金帶鞍轡馬及支賜等口宣卿以勳德之隆為余掌武兹巡極塞克奏膚功肆親御於寶跗特寵頒於宸札仍加蕃錫併示褒章其體至懷尚膺多祉賜熙河等賞功諸軍特支併犒設等口宣汝等奮忠禦侮護塞奏功特有匪頒仍加飫賜兹為褒寵其體眷存撫問廣南東路臣寮口宣卿汝等俱被選掄各膺寄任緬懷勞勩宜示拊循兹敕使人往宣德意撫問瀘南梓州路臣寮口宣卿汝等祗奉詔條恪居官次宜加勞免以示記存兹敕使軺往宣朕旨賜知樞密院事鄧洵武已下罷散天寧節道場香酒果口宣有敕卿誠深享上義切愛君兹原甲觀之祥式效華封之祝有蕃賜豫爰示眷懷天寧節尚書省御筵賜知樞密院事鄧洵武已下酒果口宣有敕卿服在帷幄時為股肱兹逢紀慶之辰爰錫示慈之宴仍加好賜其體至恩賜殿前指揮使髙俅已下罷散天寧節道場香酒果口宣有敕卿夙膺眷倚密侍禁嚴欣逢彌月之辰虔奉萬齡之祝宜加寵錫以示茂恩賜寧海軍節度使開府儀同三司永嘉郡王向宗良已下罷散天寧節道場香酒果口宣有敕卿位隆戚畹望竦朝紳屬逢出震之期虔奉後天之祝有嘉終恪式厚匪頒賜判大宗正事仲爰已下罷散天寧節道場香酒果口宣有敕卿德著宗藩任司屬籍兹獻後天之祝載嘉享上之誠宜厚恩頒用彰禮遇賜節度使豫章郡王孝參已下罷散天寧節道場香酒果口宣有敕卿等位顯朝班望隆宗翰慶乘乾之盛節修祝聖之彛儀宜厚匪頒用彰眷遇賜駙馬都尉石端禮等罷散天寧節道場香酒果口宣有敕卿等揚譽朝聨參華戚畹兹逢慶節申祝夀祺冝膺頒賚之優用示眷懷之厚賜大遼國賀天寧節人使朝見訖歸驛賜酒果口宣卿等奉幣宸廷弭節賔館乃眷禮容之飾宜膺好賜之優聊浣途勤少資燕喜賜髙麗國進奉人使臘晨風藥口脂酒果口宣有敕卿等修貢中都適逢蠟日有匪頒之庶品示眷遇之異恩俾奉燕私以介祉福冬節髙麗使人就館御筵賜教坊樂花香藥下酒上醖局白羊御酒酒果兼傳勸尚醖局供進御酒口宣有敕卿等來造明廷適逢令節錫兹燕衎侑以聲文珍劑竒葩上樽嘉果併加存賜用示優恩宣召翰林學士許光疑入院口宣有敕卿問學宏深詞章粹美召自益部再直禁林方資潤色之工仍佇論思之密其攄素藴用副虛懷賜髙麗使人到闕朝見酒果口宣敕卿等夙將禮幣來造宸廷念逺涉於重溟冝特加於好賜用彰異數當體至懷撫問河北東路沿邉臣寮口宣有敕卿汝等俱奉朝恩恪居官次屬兹凝凛宜致拊存爰敕使軺往宣德意送判正旦使副沿路與賀北朝生辰并正旦使副相逢傳宣撫問口宣有敕卿等選自朝紳肅將使指載念馳驅之久諒多跋涉之勞宜示記存特加眷撫撫問成都府利州路臣寮口宣卿等並膺朝寄克守官針念忠馭之逺勤當炎威之方熾特加撫諭以示眷懷宣召翰林學士承旨鄧洵仁口宣卿問學深醇文詞粹美夙簉詞林之直仍參經幄之聨兹錫寵章進承密命其趨官次用副朕心宣召翰林學士馮熙載口宣卿術業之優詞章之美擢自學省延置禁林方資潤色之能仍佇論思之益其趨成命用副虛懷賜新除宰臣鄭居中劉正夫口宣延登宰衡翼贊機政撝章屢至深嘉沖守之光成命已行方仰進為之美賜新除知樞密院鄧洵武口宣擢長樞廷蔽自朕志繼陳遜牘殊咈眷懷趣宜欽承勿勤多訓賜熙河等路茶藥等口宣卿等選繇朝著職在方隅有嘉勞列之優當致匪頒之寵欽承眷撫益勵忠勤奏狀應詔舉官奏狀凖尚書吏部牒奉御筆手詔節文令從官各薦人材聞奏者右臣伏覩從事郎試辟雍博士陳詢術業純明論議堅正前為常州州學教授當貢士之初體朝廷德意推行詔令委曲詳盡多士鄉風雖耆艾老儒白首肄業惟恐居後其所升貢能得元豐舊人又伏覩朝奉郎監在京榷貨務虞芹材質敏達濟以恪勤曩知鄆州平隂縣興修水利墾闢民田三千四百餘頃本路監司嘗以功利尤著奏聞臣謂如詢之儒雅芹之吏能皆有趨事赴功之實臣所偹知伏望聖慈特賜采録謹録奏聞伏候敕旨辭免召試奏狀右臣今月二十二日準中書告報奉聖旨召臣試中書舍人者聞命震恐罔知所措伏念臣幸蒙聖慈擢自踈逺承乏諌省進備螭坳夙夜省循非臣犬馬之力所克報稱叨昧寵靈方懼瘝敗給札明試豈臣敢當矧詞垣以討論潤色為職奬任尤重選掄尤艱如臣材迂學淺拙於文辭儻不自量豈逃宸鑒伏望聖慈察臣誠懇特寢召旨庶幾微臣獲安分義謹録奏聞伏候敕旨除中書舍人舉自代奏狀蒙恩授前件職凖令節文諸侍從官授訖三日內舉官一員自代右臣伏見承議郎守國子司業蔣靜學術精深履行修潔文辭論議咸有本原與臣同鄉偹詳所守臣實不如舉以自代謹録奏聞伏候敕旨辭免侍讀奏狀右臣準閣門告命除臣兼侍讀者聞命震恐罔知所裁伏念臣蓬蓽諸生行能無異誤膺眷察寖歷從班人微望輕涓毫未效金華進讀儒學至榮自揣空踈愈難稱塞儻復叨冒必速悔尤伏望聖慈俯矜誠懇俾安分義特寢贊書所有告命未敢祗受辭免兼侍講奏狀臣聞命震恐不知所措臣頃蒙收召再二銓曹仰惟天地生成之恩至深至厚夙夜圖報顧未有涓毫自效矧金華進講所以詳延儒臣而臣曩誤推擇久陪進讀空踈非稱自知甚明豈當復冒寵榮以速官謗伏望聖慈察臣誠懇特寢成命所有告命未敢祗受辭免太子賔客奏狀右臣準閣門告報已降誥命除臣太子賔客者聞命震恐不知所裁伏念臣出於寒鄉分安卑冗偶緣搜擇寖冒恩榮自列從班逮今十有四載曽微薄效仰稱萬分獨賴聖慈閔憐孤拙坐糜餼廩默愧於心惟東宫寮寀之華以處時望區區自揆敢復叨塵伏望聖慈察臣悃愊特還成命所有誥命臣愚未敢祗受除兼太子賔客舉自代奏狀伏見承議郎權發遣夔州路提舉學事惠柔民性資沖粹職守靖共篤學有文邃於經術歷官中外衆所推稱舉以代臣實允公議辭免再除中書奏狀右臣準常州送到尚書省劄子奉聖旨除中書舍人令乘遞馬疾速發來赴闕供職者聞命震恐罔知所措伏念臣曩冒寵恩備位詞掖才弗克稱默愧於心矧兹艱苦之餘舊學荒廢討論潤色豈分之宜伏望聖慈收還成命别除臣外任差遣臣見為傷暑不安依例乘船起發前去只候稍安復時乘遞馬至國門聽候指揮謹録奏聞伏候敕旨辭免除起居郎奏狀準閣門告報已降告命除臣依前承議郎守起居郎者聖恩深重非臣犬馬之力所能報稱伏念臣材踈學淺聞譽非優誤膺選掄代匱右史夙夜省循實懼叨昧敢圖眷奬復有遷升矧臣載筆螭坳閲日未久儻冒寵榮必速瘝敗伏望聖慈追寢成命俾小臣獲安分義辭免監察御史奏狀右臣今月初五日準閣門告報已降告命除臣依前官守監察御史者聞命震恐罔知所措伏念臣頃繇學官賜對便殿進説淺陋日候罷斥陛下不求備於臣擢置東觀已出叨昧就職未幾又蒙聖恩有此除授方陛下紹隆先烈厲精庶政循名責實允釐事功宜得明敏練逹之士俾任臺察以肅吏政如臣憃愚豈當冒處兼臣之從祖父瓘娶知樞密院事蔣之竒從父兄之女雖臣於之竒非合避親及從祖父從祖母皆已亡歿然終非所安伏望聖慈察臣誠懇特賜追寢成命所有告命未敢祗受謹録奏聞伏候敕旨辭免兵部侍郎奏狀右臣準閣門告報已降告命除試尚書兵部侍郎者聞命震恐罔知所裁伏念臣頃以憂患餘生誤蒙眷録召自田野再冒詞垣方陛下聖神大有為之時立政用人皆出宸斷從容裁處言成典謨而臣猥以荒踈掌帝之制雖聖度優假寵以褒稱顧自知甚明日懼瘝曠二卿之擢豈臣敢當伏望聖慈察臣誠懇收還成命以允師言所有告命臣未敢祗受除吏部侍郎舉自代奏狀伏覩承議郎新授宗子博士邵楹學術醇明操修端潔試藝紹聖占等甚優舉以自代實允公議又舉自代奏狀伏見尚書都官郎中邵濤明於經術議論有餘神考造士之初首應升選歷踐官次恬靜不渝舉以代臣實允公議除兵部侍郎舉自代奏狀右臣伏見辟雍博士陳詢學術純明行義修潔頃為常州教官當諸路貢士之初能體朝廷德意推行學政郡人説服雖白首老儒鼓篋就業自以為晚察其業履可謂成材舉以代臣實允公議辭免除刑部尚書奏狀除臣刑部尚書者聞命以還怔營罔措伏念臣出於寒鄉最為孤進寖緣推擇猥玷使令自簉從班於兹十年心雖許國初乏事勞智昧保身嘗嬰罪悔頃頒召札再二銓曹惟雨露湔滌之私實天地生成之造徒殫千慮曷報萬分敢冒眷憐進膺擢序輒伸危懇上凂聰聞兾追寢於贊書俾獲安於愚分所有告命臣未敢祗受除刑部尚書舉自代奏狀伏見宣德郎守左司員外郎曽開學識醇明行能優異翺翔雍頖進歷省曹靖共不渝衆所嘉尚倘擢華要必有可觀舉以代臣實允公議乞賜神宗御集奏狀右某等叨冒寵靈待罪諌列當陛下紹述大有為之時夙夜黽勉期效萬一而材識卑下加以聞見不廣不能盡知熙寧元豐謨訓之詳故期年於兹涓埃無取伏見神宗皇帝御集已成故事嘗賜兩制以上臣寮臣等出於迫切輒昧萬死欲望聖慈特賜臣等各一部俾得研精覃思於其間庶幾備顧問論朝政咸有依據以稱陛下優假諌臣之意臣等不勝大願謹録奏聞伏候敕旨論黃甲擬官奏狀右臣伏見神宗皇帝既廢明經學究科特設新科明法優為恩例至黃甲擬官俾先進士注諸州司法蓋將以變革舊習故其初不得不然紹聖四年朝議以此法行之既久昔人之為新科者十消八九矣恩例之優宜亦少損乃以司法及其餘判司闕衮從上差注元符三年十二月中因省部勘當遂罷紹聖指揮更不施行臣契勘新科明法等人徒誦其書未必曉其義若以進士素不習法難以輕授司法職任則其餘判司等官或以治獄或以聽訟亦未嘗待其學而後授之也朝廷取士患不得實材果得實材何施而不可伏望聖慈特降睿旨將來吏部注新賜及第進士出身等人並依紹聖四年四月二十三日指揮施行所貴德澤均被上稱陛下造士之意謹録奏聞伏候敕旨乞殿中省别處置局奏狀右臣伏為殿中省見在門下後省權暫置局內殿中丞許似孫見任執政官之子臣為言官與之同省慮涉嫌疑伏望聖慈特降睿旨令殿中省别行踏逐權暫置局去處謹録奏聞伏候敕旨國子監舉主奏狀右臣伏覩陛下追述神考美意自京師下至郡縣恢崇學校以幸教天下增置諸路教官所選惟經術行義之士三代庠序之盛宜無以加此然諸路教官奉行貢士法事體比昔為重今員數既衆又皆一時之選而資任多係選人國子監長二嵗舉主官止八人施之太學正録且猶不給况諸路教官如此其衆耶伏望聖慈特詔有司稍增國子監長二舉官舊格使凡預師儒之選者益知自重以稱陛下長育人才之意謹録奏聞伏候敕旨論武學上舍生奏狀右臣伏覩神宗皇帝聖謨淵逺思患豫防雖天下治安不忘武備自熙寧中特建西學招徠羣材訓以武志凡考選升補之法皆出宸斷士之遊於斯者以程文觀其器識以弓馬閲其藝能以規式察其行義其自上舍免省試者積纍嵗月速不下十年須程文弓馬數在優等又其行義可稱乃為應格雖應免省試格又從上共不得過三人其教之如此其備養之如此其久擇之如此其精逮其授官歷任與夫取一日之長者無甚輕重其非次進拔缺然不聞甚未副建學造士之意伏望聖慈因殿試武舉進士唱名內該上舍免省試以上恩例者命執政審其人材稍加奬擢庶幾學者嚮風罔不激勸以作成其才上稱任使謹録奏聞伏候敕旨論州縣社稷壇壝不修奏狀右臣伏覩近降手詔命有司講究禮樂之情文以幸天下可謂太平甚盛之舉臣竊惟禮有五經莫重於祭祭之秩於典者多矣自京師至於郡縣春秋祈報遍於天下者惟社稷為然今郡守縣令不深推其故以是為不急之祀壇壝不修甚者民得畜牧種藝於其間春秋行事取具臨時乃或器用弗備粢盛弗蠲齋祓弛懈裸獻失度甚不稱陛下秩祀典之意臣契勘社稷之祀敕令該載詳悉欲望聖慈特降睿旨戒敕郡縣務在遵承命諸監司巡歷所至察視壇壝其不如儀者具事以聞庶幾官祗肅祀事神用顧享謹録奏聞伏候敕旨論州縣學講堂及齋名奏狀右臣伏覩神宗皇帝恢崇太學以幸教多士製堂及齋名以寓訓迪學者遊於斯仰之若日星之麗乎上也陛下緝熙先猷州縣學校咸建師長命以貢士而名堂及齋類多前日官司隨意建立或怪僻不馴或稽考無據或違背經旨以此揭示多士甚未稱朝廷育材之意臣愚欲乞府界及諸路州縣學應堂及齋名除不許用太學敦化等堂名及論秀蒸髦等職事齋名外並須用太學諸齋名即不得存留舊名及别有創立如蒙聖允乞下有司頒降施行謹録奏聞伏候敕旨
