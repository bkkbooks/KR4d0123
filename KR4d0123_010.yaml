body:
  text: 摛文堂集卷十宋慕容彦逢撰奏疏論提舉官分巡奏狀右臣伏覩陛下緝熙先猷增置官吏修水土之政行抵貸之法興山澤之利以幸天下常平事任比昔加重諸路提舉官于所部州軍理當每歲徧廵以周知官吏奉行勤惰之實今諸監司歳以所部州軍吏互分巡則提舉官所歴無幾其餘他司于常平職事既非其所任責則凡所檢察特取文具而已雖有二年一徧指揮不惟日月曠逺兼新舊官移昜不常甚未稱朝廷考覈事功之意臣愚欲望聖慈特詔有司應諸路所部州軍數多如兩浙東西通為一路去處更增置提舉官一員并其餘路分並令每歲徧廵更不與他司更互分定仍令諸州軍于次年正月具歲終有無提舉常平官巡到徑申御史臺委本臺彈奏餘依見行條令庶幾職業振舉實恵及民天下幸甚謹錄奏聞伏候勑㫖論諸路弓手奏狀右臣竊惟諸路弓手是為鄉兵州縣之武備莫急於此向緣紛更官司習玩選補鹵莽訓練希濶迺復以工巧技藝之人充占員額私備役使而承行胥吏又用其所親不問老疾疲弱特取具數歳時按閲類以差出為名匿其不中格者故緩急追捕常患乏人矧今推行茶鹽二法唯能禁絶私販然後商賈易售官課充羡欲絶私販則諸縣弓手宜訓齊武事用以處警有犯必獲然後姦民畏沮私販不行臣愚欲望聖慈特降睿㫖命諸路提㸃刑獄司専委官㸃檢選留彊壯斤去老疾疲弱者其本縣官以工巧技藝隠占役使並根勘罪具狀以聞庶幾有司遵承詔令武事加飭以壯守備謹錄奏聞伏候勑㫖論諸路坑冶奏狀右臣伏見諸路坑冶之利所助經費不為不廣其置塲去處有正官無幾餘止係轉運或坑冶司差官權監而逐司又多廢條用例委本州郡官不惟被差者以其置塲皆深山窮谷之中人人規免而官屬稍不闕事即本州倚辦多不遣行獨老疾不任事畏在長吏目前者方始就職或不過半年又復交替豪民猾吏姦弊百出常以不差正官為幸公家利源損失不可勝計臣契勘見行勑令該載坑冶條甚備而有司便文僥倖不能悉心遵奉臣愚謂宜降睿㫖戒諸路提㸃刑獄及坑冶司常切體訪苖脈興廢去處嚴切督察多方措置如合差正官即依條奏舉其轉運及坑冶司差官權監並須選擇能吏不得只要本州郡官仍令本州通判每季躬親㸃檢庶幾闗防始宻上下畏守以副陛下理財之義謹錄奏聞伏候勑㫖論府界旅櫬奏狀伏見神宗皇帝仁心惻隠元豐二年以開封府界寺院旅櫬積多命提舉官専切管幹斂埋恵浹幽明中外感服迨今二十五年乃復充牣棟宇以至露積其間或閱日既乆别無管認或親屬雖存貧不能舉或藏器已毁棄擲道旁此皆掩葬無期尤可傷閔臣愚欲望聖慈特詔有司檢㑹元豐二年指揮及應干措置條件施行謹錄奏聞伏候勑㫖上檢察病囚疏伏覩皇帝陛下矜憫庶獄制為病囚檢察之法蓋謂愚民犯法雖繫留訊治邦有常憲於其疾也飲食醫藥視之猶赤子也臣等尚慮當職官吏不能深體徳意欲望聖慈令諸路提㸃刑獄司嵗終㑹州縣病囚損失分數除依條科罪外取一路最多最少各一處保明以聞特降詔㫖賞罰庶幾知所勸沮以副陛下好生之徳劄子乞外任劄子臣寒鄉孤進望絶顯榮遭遇聖明搜擇疏逺寖膺拔擢備數從班叨冐寵榮積有歳月欲自勉强圖報萬分而才分所拘初無可紀乃多罪悔達於聰聞矧兹銓曹職任要劇臣代匱已乆曽乏建明深虞曠瘝上孤眷奬伏望聖慈除臣一外任閒慢差遣庶俾微臣獲安愚分服闋乞外任劄子右臣曩叨眷知進備詞掖雖更時序碌碌無聞尋遭親喪逺去朝廷偷延視息今已服除伏望聖慈以臣艱苦餘生俾安愚分特降恩告除臣江淮浙或京東一閒慢差遣臣見於常州聽差指揮上凟宸嚴無任恐懼戰栗之至謹錄奏聞伏候勑㫖理㑹三禮圖劄子臣竊惟功成作樂治定制禮方今六府既修三事既和燕及皇天休貺並至功可謂成矣治可謂定矣講明禮樂以幸天下其在今日伏覩見行三禮圖係國初聶崇義撰集其間車服器用之制與元豐頒行經義時有不同自國子監建三禮堂暨州縣學校率繪其圖以示學者乃至有司所掌名物猶雜用其制未稱陛下統一道徳之意臣愚欲望聖慈特詔儒學之臣考據經義改定舊圖俾有遵承及付國子監頒行取進止理㑹架閣劄子臣所領中書後省合管五案凡冊禮及朝㑹應行遣事即上案主之付受諸案文書及本省雜務即下案主之編錄制辭及中書省人吏試補比較功過即制誥案主之在京有司闗報改更差除等即諫官案主之逐月修起居注即記注案主之已上案分之事務要切兼編修㸔詳隨事置局及逐名次召試進士武臣换官之類文字名件至多未曽専置架閣拘管每有檢照率多損失不唯申請煩紊兼證據不明前後牴牾臣契勘中書後省見有空閒屋宇欲乞専置架閣庫以本省逐案見管按沓文簿書籍乃至祖宗以來辭冊及勑令續降等並置簿拘收以千字文為號周而復始應今逐案承受文字已結絶及無行遣限三日發送上簿接續結押仍乞於本省選手分楷書各二名主簿行遣庶幾紀綱整肅以稱元豐建立後省陛下緝熙先猷之誠取進止理㑹守令劄子臣伏見陛下勵精政事比降明詔恵綏庶民教養多士所以訓戒丁寜甚悉真極盛之舉也臣竊謂陛下聖謨高逺固非臣子所能仰望清光至於推行徳意志慮見於事實而與士民尤親者盖在於守令使守令舉皆得人樂事勸功不以便文自幸則太平之基豈復他求乎朝廷制考課之法殿最賞罰既詳且備臣愚欲乞守令任滿課入優等者除合得賞格外其未經選擢之人三省審察如人材果可任使隨其資秩特加奬拔或寘諸省府寺監要劇之選或委以諸路監司按察之寄若此羣吏聞風莫不激勸各以行治自奮豈唯究宣恵澤上以副陛下惻怛之誠又足以搜揚疎逺以盡為官擇人之術其效豈小補哉伏望聖慈特詳酌施行取進止理㑹守令考課劄子伏覩元豐立守令考課之法至崇寜大觀隨事緝熙條目完備真得神考訓迪羣吏之意大觀四年九月因臣寮申請止存元豐舊條餘皆刪廢臣竊謂崇寜大觀緝熙之美務廣徳意比舊條加詳初無違戾欲望朝廷詳酌特降指揮檢㑹施行理㑹常平劄子臣竊惟神考立常平之法加恵元元意㫖深逺著令完具而吏或不䖍便文自營馴致蠧耗出多入寡近因臣寮建言申嚴約束務絶姦弊恵及細民臣愚以為唯納欠多寡最見推行之實使任職者悉心奉法計置及時官無抑勒留難下無詭冒違法之人則良民輸納自無稽違豈有出多入寡之弊臣欲乞應斂常平錢穀逐歳於令佐印紙内批書納欠分數候三考滿日别立殿最之法庶幾知所勸沮罔或偷惰如䝉聖允即乞詔有司施行理㑹抵當孤幼劄子臣伏覩州縣孤幼財産官為檢校不滿五千貫召人借抵當量數借請歳収二分之息資以贍養候其長立而還之法意慈惻盡於事情然間縁形勢户虛指抵當或高估價直冒法請領不唯虧欠歳息迺至并本不納迨其長立合給還之時元檢校錢物並無見在其冐法請領之人或從官逺方或徙居它所或不知存在或妄託事端唯以空文來往因致合給還之人饑寒失所近雖降朝㫖添立須有物力户為保及限歳錢數足等條然於形勢之家未有懲革臣愚欲乞檢校孤幼財産不許形勢户借請及作保其所供抵當委官驗實估定價直方許給借餘依見行修令所貴州縣遵守實恵及民如䝉聖允乞詔有司施行理㑹居養院劄子臣伏見陛下若稽古訓自京師至州縣各置居養所以聚鰥寡孤獨之人詔㫖丁寜臣下遵奉道無莩瘠咸有所歸發政施仁孰大於此臣竊以為鰥寡孤獨雖曰困窮而至於被服禮義之化均太平之民臣居田野聞江東溧陽縣以居養所見管屋宇隔截為八室用發政施仁必先四者為號使男女異處不相雜擾一方之民莫不恱服臣愚欲望聖慈特詔有司應州縣居養所並依前項體式隔截異室分處男女不惟子恵之澤洋溢中外而禮義之化不廢於困窮之民以副陛下愛民誠意取進止理㑹祭祀劄子臣竊惟國家稱秩祀典交百神而禮之考諸令格惟以齋日多寡為大中小祀之辨大祀散齋四日致齋三日中祀㪚齋三日致齋二日小祀散齋二日致齋一日參稽情文各有攸當然祀之通於天下而最顯者社稷釋奠春秋二仲州縣展事四方士民於焉觀禮而皆列于小祀近縁臣僚奏請比附國子監修立外州軍釋奠儀注散齋三日致齋二日則既升為中祀矣所有外州軍社稷齋日義難獨殺臣愚伏望聖慈特詔禮官討論增定乞以假日特引對付史館劄子臣備位詞掖幸以權記注職事日侍清光伏覩陛下辨色視朝延見羣臣雖雪霰風霧凜冽異常辰正奏引上殿十班傳㫖特引嘗近已初乃罷盛寒疇咨玉色無倦十六日入冬至假陛下御延和引上殿十一班十七日又引十班皆人人顧問曲盡事情告戒丁寜切中機㑹節假内批降臣寮章疏及有他處分差除絡繹不絶臣職在奉行捧讀悚激方是時羣臣賜告偃息于家而陛下夙夜省覽憂國愛民未嘗暇逸陛下以天縱之聖而勤政若此盖將訓迪有官永垂憲度而日歴之所紀邸報之所傳循舊襲常舉其大畧而已自非進得陪侍軒墀退得與聞幾政何以盡知其詳臣愚欲望聖慈以臣所陳降付史館及進奏院昭示天下傳之無窮俾中外官吏迺至民庶聞風胥勸罔不克勤上副陛下宵衣旰食之誠取進止理㑹學校劄子臣竊謂諸路學校州有正錄縣有長諭迺至其餘掌事之人皆奉行貢士法令書攷陞選之詳盖根本於此而逺方諸生猶循積習之弊迺或持其短長糾率學衆輒興訴訟以至發其舊愆以快私忿以此職掌類多畏黙求全鮮克振職臣愚伏望聖慈特降睿㫖編修學制所嚴立法禁不惟整肅學政亦以敦厚士風取進止理㑹陳訴劄子契勘命官遇赦恩許訴雪罪犯及用年限舉主除落過名若在降赦二年外投狀陳訴者依條不許受理其諸色人依赦許訴雪過犯或訴用法差誤理與命官事體不異若於赦降後二年外陳訴者亦乞依命官訴理條限施行取進止理㑹捕盗捉事劄子臣竊惟在京及諸路捕盗官捉事使臣雖以捉獲為職其間有縁一時疑誤將贓證之人執縛根問多端恐脅致虚有承伏及送所屬官司初慿元解事狀枷訊禁繫文移追㑹經涉日月直至推究得不係元解情犯方以無罪釋放或招撫一輕罪収坐葢捕盗捉事之人當有厚賞失則無罰伏觀政和勑縣以杖笞及無罪人作徒以上罪送州杖一百臣愚欲望聖慈申詔有司比附上條特立禁約庶幾盡心緝捕必獲犯人不致泛執無辜枉被囚鞫刑部斷絶獄案劄子恭惟皇帝陛下躬建皇極心澄化源徳駿業隆超冠古昔甚盛之舉不可一二數皆章明較著垂休無窮上帝博臨珍祥紹至方將坐陽館而頒治登介丘以告成時和歳豐家給人足薄海内外歡忻交通如在一堂之上宜其民罔犯法而秋官以廷無留讞稱慶于朝矧天寜宻邇蒐講盛儀百辟奉觴異邦欵塞於焉刑措孰不歸仁臣等備數典司獲與擊壤之民上祝億萬歳無疆之夀不勝歡忻鼓舞之至謹具進呈臣等伏覩本部自四月二十日擬斷天下奏案盡絶已具表稱賀仍乞宣付史官訖恭惟皇帝陛下以至德要道纂隆聖緒成功巍巍同符堯禹自中都達於四方萬民樂業家給人足以故獄訟衰息自凡奏讞之在秋官者今已罄絶聞太平刑措實在兹時臣猥司邦憲親逢盛事獲與擊壤之民共陶美化不勝大幸右臣等具到近五年斷大辟數逐歲遞減比政和上二年計減一半以上此蓋皇帝陛下盛德妙道克配上帝良法美意永祐下民由中及外無有逺邇家給人足化行俗成以故獄訟衰息幾至刑措臣等無任歡欣鼓舞之至謹具進呈臣等伏覩本部自三月十五日擬斷天下奏案盡絶已具表稱賀仍乞宣付史官訖恭惟皇帝陛下在躬清明翕受衆甫天德地業超冠古初上帝博臨符瑞創見歲豐家給民有愜志遷善逺罪㒺或抵冒以故邦刑幾措而秋官以讞章罄絶稱慶于朝太平之隆光于載籍臣等實司中典親逢盛際無任歡呼鼓舞之至謹錄進呈臣等伏覩本部自某月日擬斷天下奏案盡絶已具表稱賀仍乞宣付史官訖恭惟皇帝陛下躬藴道真丕冒九有盛徳大業超冠古初格于皇天休貺荐至四民安生樂業家給人足以故遷善逺罪罔或抵冒而秋官屢以時無留讞稱慶于朝凡厥有知孰不歸聖臣等親逢盛事獲與羣倫上祝億萬歳無疆之夀不勝歡欣鼓舞之至謹具進呈臣等伏覩本部自九月二十四日擬斷天下奏案盡絶已具表稱賀仍乞宣付史官訖恭惟皇帝陛下盛徳妙道高出唐虞制作設施自我作古凡歴世願望而不克舉者今悉有成大功巍巍不可一二數是以天地並况殊祥異瑞載籍所未見者踵聞于四方時和歳豐閭里之民日用飲食欣欣愉愉咸有愜志方且扶老攜幼瞻望華闕乞詔清蹕登封告成宜其風醇俗厚遷善逺罪而不犯於有司太平若兹孰謂無象矧天寜在邇聿修盛儀百辟奉觴異邦遣使而秋官以讞章罄絶稱慶于朝凡厥有知孰不歸聖臣等親逢盛事無任抃蹈鼓舞之至臣等伏覩本部自九月九日擬斷天下奏案盡絶已具表稱賀仍乞宣付史官訖恭惟皇帝陛下配天立極執古御今凡法度禮樂所以嘉惠天下者出自獨斷煥然一新由中及外無有逺邇風移俗昜民日遷善逺罪以故刑章幾措秋官論報屢以罄絶聞太平之隆高越前古臣等親逢千載之期不勝歡欣鼓舞之至臣某等言伏覩本部自九月一日擬斷天下奏案盡絶已具表稱賀仍乞宣付史官訖恭惟皇帝陛下躬藴道真黙該衆妙運精神動心術措諸事業以嘉恵天下太平之隆超越唐虞三代之上兹者歸徳穹昊玉檢推尊極欽崇之精意禮成之日秋官以時無留讞稱慶于廷羣倫底豫靈心昭荅和同天人使之無間其在今日臣等備位攸司親逢盛事獲與擊壌之民上祝億萬歳無疆之夀不勝歡呼鼔舞之至謹具進呈表興龍節賀表臣某言高禖錫慶肇膺如達之祥華渚呈輝誕著寖昌之證惟神聖挺生之旦迺文明赫盛之朝傾寰海之誠心獻大君之睿算臣中謝恭惟皇帝陛下承休祖考配徳乾坤擁皇極之珍符叶炎靈之景運九功式叙諸福畢臻屬當彌月之辰敢啓後天之禱奔航重譯執玉盈庭臣生覿清時仕參通籍一人有慶懽同擊壌之氓萬夀無疆夐想稱觴之頌冬至節拜表朋陽來復圭景加長占瑞靈臺謹書雲之令節拜章宸閣脩亞嵗之盛儀恭惟皇帝陛下道與時亨獨包衆有化如天運咸叙九功恩浹寰區治高振古爰屬三微之始方孶萬彚之萌保合太和召嘉祥而有羨緝熈純嘏増睿算於無疆臣獲簉班聨與膺事任重熙累洽共欣千載之逢歸徳謝生知自一人之慶皇后為冬祀禮畢賀皇帝表日涓來復聿修三歳之祠禮迄熙成均錫庶民之慶珍祥丕應協氣交流凡與見聞敷同慶賴恭惟皇帝陛下與乾合徳以道御時擴至治之規模固太平之基本升禋陽位既裒對於百神旋蹕端闈期永膺於多福妾夙緣天幸獲儷宸尊兹欣覩於盛儀實增榮於柔抱内中侍御已下賀皇帝冬祀禮畢表妾等言展寀國南奉明禋而報本涓辰景至備熙事而慶成百順應期千齡接統恭惟皇帝陛下徳侔覆燾明廣照臨揚欽燎以薦誠榮光下燭御端闈而肆宥惠澤横流於赫盛時逈高振古妾等幸陳禁掖均被宸恩初瞻綵衛之還共獻履長之祝貴妃已下賀皇帝冬祀禮畢表伏以乗日至之辰順天正之序親祠陽位還御端闈福祿來寜華夷均慶中賀恭惟皇帝陛下道該衆妙功叙九歌緝振古之彌文聿修大報罄明禋之精意用迄上儀靈心嘉䖍景貺昭格妾等獲塵清禁夙奉至恩聞詔蹕之甫還悚柔襟而載抃内中夫人郡君已下賀冬祀禮畢表伏以欽若禮經聿修禋祀既迄成於熙事用翕受於休祥恭惟皇帝陛下道協彌綸誠通化育夙駕齋輅罄精意以告䖍還御端闈揚至恩而肆宥澤均動植慶浹華夷妾等祗奉嚴宸獲瞻盛際願拜萬齡之祝冀伸千載之逢大長帝姬賀冬祀禮畢表伏以涓辰展寀既奏格於層壇發號施仁用均釐於寰海情文允穆典冊增華恭惟皇帝陛下以天為宗于帝其訓道洽政治九功叙而嘉頌興俗阜時和五韙備而美祥格誕集衆有協成其儀妾夙被恩榮實同慶賴聞初還於綵衛輒仰獻於綈函冬祀禮畢奏謝天尊閣佛閣等處表親祠陽位祗見昊天靈心嘉䖍祥應昭著實繇庇貺獲底備成敢奉熏修以申報謝冬祀禮畢奏謝内中玉虚殿三清諸聖等表親祠泰壇祗見上帝百禮既洽萬福來寜實賴聖真黙垂保佑敢申報謝冀格顧歆同前奏謝内中玉虛殿上九位等表聿修元祀祗報昊穹百禮備成景貺昭答仰資庇佑用格居歆敢率邦彝恭陳禮謝同前奏謝欽先孝思殿帝后表展儀陽位克承上帝之休肆宥端闈均錫萬邦之慶兹迄成於盛典實祗遹於大猷用罄精誠載嚴報謝仰䖍聰鑒永佑昌期同前奏謝萬夀觀景靈宫諸帝后西京嵩山崇福宫等處祖宗表伏以薦一純于上帝獲考盛儀均五福于庶民既孚大號實資庇佑克展靈承敢率舊章式陳報禮謝賜宴表玉陛疏恩方負非才之愧瓊林頒宴更䝉異數之加凡在叨逾舉深慶抃中謝伏念臣等乆安鉛槧素樂簞瓢心徒醉於六經志敢希於五鼎幸千載飛龍之際陪一時振鷺之游名標金榜之中昔稱千佛位列瑤池之上人謂羣仙宫花叢御苑之春帝樂聳鈞天之奏光生韋布榮動縉紳兹盖恭遇皇帝陛下當饋思賢推食待下念臣等虀鹽乆厭備歴艱難賜臣等籩豆有加曲推慈恵時輟大官之奉俯霑一介之微臣等敢不沒齒銜恩終身飽徳愛君憂國不忘頃食之間趨事赴功益謹素飱之戒天寜節謝御筵表三靈效祉聿當彌月之辰百辟稱觴申祝後天之算恭惟皇帝陛下照臨有赫覆幬無私紀流渚之祥虹允符夀節詠零廷之湑露洽被燕慈臣等幸簉近班與陪盛觀糜捐不足以副榮懐之遇鼓舞不足以盡歡欣之誠
