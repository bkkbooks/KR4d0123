body:
  text: 摛文堂集卷十一宋慕容彦逢撰表賀太陽當虧不虧表官占底日預陳薄蝕之期聖德動天遂格休祥之應睠至誠之上達方恊氣之横流凡在照臨敷同慶頼恭惟皇帝陛下福膺百順祐擁三靈行堯道以兢兢秉文心而翼翼基圖増固治永叙於九功精祲交通變宜消於十煇允符瑞貺益著亨辰臣等夙被寵恩過叨榮禄沴收内壤心均四海之懽疏奏前旒壽獻萬齡之祝賀増上神宗徽號表合宫大饗載修崇祀之儀清廟徽稱誕廣遹追之孝人神恊贊典冊用光凡諸含血而有知孰不懽心以胥慶臣中謝國家七葉幅員萬邦巍乎先帝之隆凛乎三代之上神靈如有熊而成之以敦敏濬哲如大舜而輔之以温恭承列聖之寖昌弗有其治跨百王而高蹈克成厥勲于時率土之誠咸請中天之號禹功不伐湯德日新方伏閤而未從遽號弓之莫及逮兹累稔申厥舊章深求典謨愽采雅頌爰因配帝之祀聿嚴宗德之名甚盛無前持外王之土苴其傳罔極著上聖之形容恭惟皇帝陛下剛德有爲達孝善繼率時昭考燕及皇天卜太室之受釐恊羣倫之歸美施諸玉册赫爾金聲孝治式孚蓋原於復命神功不宰尚出于强名臣獲際昌辰預聞休蹟退惟簪履之舊淚灑周南遐思圭璋之儀魂馳魏闕賀甘露降帝鼐表儀盛漢廷方聿修于元㑹祥呈夏鼎如克享于天心凡預榮懐敷同慶頼竊謂湛恩廣被協氣横流精祲于焉交通符瑞必以類至睠霄寒之甘露稟雲表之清英載在遺編稱爲休貺或受諸草木而象德或降于宫室以紀年粤若王正之初爰當帝鼐之上時乃創見昔所未聞恭惟皇帝陛下體御至神道兼全于衆有用揚獨智世用頼于九功民俗阜康邊陲靜謐雨暘咸若稼穡屢豐藹藹治馨宜三靈之底豫瀼瀼和液彰百福之偹膺臣等獲際熈辰幸瞻嘉應班趨上閣共傾向日之誠疏奏前旒更祝後天之算賀改元政和表燎升陽畤既涓饗帝之儀澤沛端闈爰易紀年之號書文所暨民俗交欣臣中賀臣聞二帝之德雖隆其要不外於稽古二典之文可考其詳尤在乎命官夫惟無曠於天工是用克和於邦政紹兹能事屬在聖時恭惟皇帝陛下巍巍成功以丕冐率土業業致孝以祗遹先猷仁洽道豐氣調時豫乃因祀禮更定歲元臣曩備近聯今從左謫莫陪慶列徒緬想於賓傳均浹歡悰竊自同於獸舞謝賜政和元年厯日表迎日前推先天誕告凡備守邦之吏寵頒紀朔之文俾獲珍藏實均慶頼臣中謝竊以唐堯之考厯象虞舜之察璣衡豈惟叙授於人時蓋亦靈承於帝事載在二典訓垂百王恭惟皇帝陛下道體泰元治高振古五辰兼撫致庶績之咸熈九叙可歌方萬世之永頼兹當改歲申飭攸司課宻度於清臺既無差忒錫成書于列郡冀克聞知臣猥玷隆私與膺嘉惠金臺漏永共嬉化日之長玉燭時和預慶豐年之屢賀紅鹽表地符薦祉鹽澤効祥方擬凝雪之姿忽示激丹之彩應唯誠格福以類臻臣中賀自昔牢盆之嬴爲時公家之助當章聖之臨御嘗奏瑞鹺迨政和之紀元再書記史希世難遇有識交欣恭惟皇帝陛下德恊炎靈功昭烈祖寳源恢復既豐足國之儲珍貺薦臻益永承祧之祚臣曩由從槖黜領郡章身逺軒墀莫預稱觴之列職親民社欣聆擊壤之音代三省以下紫宸殿稱賀太陽不虧表誠德誕孚嘉祥丕應沴消内壤既虚十煇之占懽浹中區永頼一人之慶臣中賀恭惟皇帝陛下運乾剛以覆燾居離正以照臨發政施仁靡匹夫之不獲彰善癉惡致庶績之咸熈治馨方格於神明和氣宜通於精祲偉兹榖朔時廼珍符臣等均被恩榮與膺任使仰瞻天路亶爲千載之逢追効嵩呼敢後四方之賀代宰臣以下賀黄河清表天心佑德川后薦祥方兩涘羡溢之時有千載澄清之瑞感由誠格福以類升臣等中賀惟河四瀆之宗惟水五行之首效靈端拱屬更紀歲之元顯應大中適展親祠之禮考今爲備視昔用光矧當乾寧之邦允恊天寧之號恭惟皇帝陛下性堯舜之孝悌躬文武之憂勤利澤汪洋靡匹夫之不獲和氣充塞宜景貺之自臻簡牘屢書華夷均慶臣等具膺寵禄與覿閎休俟河之清豈人謀之可冀如川之至知聖壽之無疆代三省樞宻院請皇帝聽樂表禮縁羣情聖人必爲之節喪從先祖後世靡得而踰恭惟皇帝陛下仁稟乾元恩隆坤極念朱邸來嬪之舊有紫闈占夢之祥制服過期輟朝増數去日已逺而慈軫愈劇䘏典雖厚而誠感未饜廼兹公除尚停雅奏臣等考莊穆之故事本正元之舊章既終祔饗之儀即允叩閽之請伏望寖寛追悼曲狥䖍祈遵景德之詔音禮由義起御鈞天之法部樂與民同代賀皇帝御大慶殿大朝㑹表律厯三陽咸慶王正之序圭璋百辟聿修元㑹之儀凡在有生罔不載躍中賀恭惟皇帝陛下誕隆駿命祗遹孫謀甄商陶周凜凜百王之右參天貳地恢恢上聖之姿九功之叙皆可歌五韙之來罔不備比奉寧真之恤久虚大慶之朝永言孝思化式孚于下土錫兹祉福祐克自于羣倫爰當發春赫舉四觀禮文甚盛典册用光臣獲際昌辰預聞丕纘周南歎滯莫陪鵷鷺之聫魏闕馳誠徒切江湖之想賀康復視朝德音表法座天臨曠恩雨施方永膺於遐福用申錫於羣倫凡預見聞敷同鼓舞臣中賀恭惟皇帝陛下誠贊化育孝通神明以盛德承宗社之休宜萬壽等乾坤之久臣曩由從槖黜守郡章辨色造廷想清班而獨阻焚香拜詔覺恊氣之横流代宰臣以下請皇帝受𤣥圭第二表盛德茂昭珍符申錫將答帝臨之貺必嚴躬受之儀敢冒威尊再陳誠悃竊謂𤣥曰純乾之色圭爲重土之文旁連山岳之形中涵雷雨之象偉兹至寳兼備三才維帝堯俊德之明有神禹成功之告自時厥後歴世靡傳以迄于今蓋天所受恭惟皇帝陛下欽文格于上下孝弟通于神明親九睦以和萬邦釐百工以熈庶績豐年屢應嘉瑞薦臻肆追美於陶唐用發祥於珍物伏望皇帝陛下體三靈眷祐之命納羣臣鼔舞之情特降詔音俯從懇請先期涓告稱事辰儀舉一代之彌文昭有邦之大寳以介無疆之壽以隆不㧞之基賀中宫受冊表羣辟造廷陳有司之備物温詞鏤玉正中壼之隆名凡與見聞胥同鼓舞中賀竊惟乾坤作配以化育日月相須而照臨故三代之興咸資内徳之助而二南之盛實為王化之基恭惟皇帝陛下聰明憲天濬哲稽古念昔家邦之御必始於徽音矧兹宗廟之承莫親於同體肆求茂徳崇建長秋禖燕傳祠将衍多男之慶星軒增耀永符儷極之儀臣職繫左符身遥丹戺瞻母慈之丕冒均民俗以交欣代鄭樞宻辭免樞宻院表驟膺綸制陞冠樞廷聞命以還撫躬罔措伏念臣事勞無紀問學非優獨荷眷知遂陪機要挈缾之量心常戒於易盈伏櫪之材用豈堪於致逺坐糜廪禄徒閱歳時方積懼於瘝官敢益隆於柄任恭惟皇帝陛下道全衆有對時物以皆昌功叙九歌同天人而無間齋居决事旰食視朝以聖明述作之資有文武憂勤之志振曠古已墜之典紹先朝丕顯之謨發政施仁靡一夫之不獲命鄉論秀致比屋之可封嘉祥縁類而並臻殊俗欵闗而來享臣幸當盛際猥備近司海嶽深崇豈效涓埃之補乾坤髙厚難酬雨露之私儻冒寵靈将速罪悔仰祈洞察俯狥䖍祈特還贊書俾安愚分同前准備第二表愚誠盡布冀寢誤恩睿意未從曲加寵諭顧深慙於公義敢再冐於天威伏念臣出本諸生晩叨清貫自陪樞筦寖閱歳華方上主有為之時實千載難逢之會裁决機務取成聖心而臣䝉被寵靈無可論之薄効奉揚明命但知仰於清光儻復超陞必速瘝曠伏惟皇帝陛下循名責實以總覈於羣能公聽並觀以博通於衆志因念怔營之懇特寛逋慢之誅改擇時材追還綸制中書舍人謝表臣言伏奉告命除授臣試中書舍人仍改賜紫章服者代言黄閣請避弗俞視草紫垣疏榮非據仍頒顯服併免常儀賁冒有加怔營滋劇臣誠感誠懼頓首頓首伏念臣行能淺陋術業荒疎本乏才稱偶階仕進初縁采擇獲對燕閒擢自膠庠任更臺閣諫垣論事久莫効于涓埃柱史記言近未淹于歳月方虞叨昧將速譴呵曷意明恩復加寵陟矧聖神述作之御實區宇亨嘉之辰雲漢文章可觀而不可繪其象雷風號令可聞而不可寫其音是宜潤色之尤難夫豈孱微之克稱恭惟皇帝陛下以堯舜之孝弟有文武之憂勤廣延羣材協贊庶績廼兹僥倖亦被褒揚臣敢不激昂懦𠂻紬繹舊學典司訓誥雖慙深厚之辭陪侍禁嚴敢忽靖共之節臣無任謝再除中書舍人表臣言伏奉告命除授臣試中書舍人者訓辭俯逮誤膺求舊之除懇欵冒聞莫遂由𠂻之請叨恩愈厚圗報為難臣誠感誠恐頓首頓首伏念臣寒素諸生迂踈晩學早玷儒林之選濫陪俊域之游曩幸聖知擢陞諫列獲奉清閒之對數陳固陋之言廼縁優容遂至超躐掖垣四禁代司綸綍之嚴省户五花兼與機衡之宻曾微效實徒閲歳時比免苴麻方依丘壠筋骸疲薾偶殘喘之僅存志氣銷磨豈清塗之敢覬忽䝉收召復寘髙華惟内省之甚明宜自慙于非據此蓋皇帝陛下孝治四海禮優庶臣閔艱苦之餘生粗有樸愚之小諒曲垂眷録弗忍遐遺風木易揺既永乖於榮養㳙埃可補顧何憚于糜捐汝州謝表叨榮已久宜速顛隮積咎滋多敢逃誅責恩深譴薄感極涕零臣中謝伏念臣家起寒微望絶榮顯束髪試藝遭時右文偶塵經術之科復玷辭章之選擢自州縣進聨師儒迨登對于燕朝寖踐揚于要路初持從槖距今八年兩貳省曹既書三考侍邇英之史讀議大觀之禮文眷憐毎發于金聲顧逮必康于玉色而臣才短難强噐小易盈曾無可紀之勞廼有自貽之戚致形論列終累保全尚特屈于常刑俾獲臨于便郡此葢伏遇皇帝陛下體乾在上與物為春如日方中容光必照念臣與陪帷幄嘗奉燕閒察臣參掌銓衡粗勤職業用加寛貸薄示小懲臣撫躬深思刻骨永戒才非太史敢興歎于周南心類子牟但馳誠于魏闕謝復修撰表分符汝海方循省於前愆列職書林俄霑濡於霈澤危襟増激感涕交流臣某誠惶誠懼頓首頓首伏念臣系本單微進由孤逺簿書累考安州縣之卑棲廱泮八年甘虀鹽之冷宦偶縁登封寖被使令接鵷鷺之後塵侍槐楓之清燕葑菲之選皆㧞自於聖知絲綸之除毎特從於中出而臣受材譾薄賦分竒艱無可紀之勞能有既彰之罪悔誤膺慈惻獲貸嚴誅假以郡章閲兹時序謂當永黜尚不遐遺恭惟皇帝陛下徳與日新仁如天覆察臣陪扈滋久樸拙無他閔臣擯斥以來憂兢愈劇用加甄復示不弭忘臣昔冒恩私親承訓敕奉法循理敢自替於前修盡節竭誠誓益堅於素志謝除兼太子賔客表臣某言伏奉誥命除臣兼太子賔客者宸毫親灑詔檢中頒即建禮之舊聨兼承華之顯列仰膺賁冒俯積怔營臣某誠惶誠懼頓首頓首竊聞自昔宫僚維時人望蓋毓徳於初載必選賢而與居矧當調䕶之榮尤出捜揚之𦙍如臣者以蹇淺之學問無卓異之行能奮繇寒鄉最為孤宦參粉閨之餘論豈稱所䝉奉銅輦之後塵益慙非據恭惟皇帝陛下端本以御家國因能以用人材謂臣久綴從班講聞謨訓察臣幸陪經幄粗識淵源因誤襃嘉遂階擢序臣敢不砥礪素節激昻懦𠂻念左右前後之人罔非端士陳父子君臣之道敢替前修謝傳宣入伏早下表使華俯逮天語驟傳念兹暑伏之臨錫以夙休之寵拜恩優異揣分兢慚伏念臣問學空疎文辭淺拙叨長憲部權直禁林鼇嶺風清豈覺午隂之燠花甎日永初無内務之繁敢冒慈憐俾從暇豫此蓋皇帝陛下招延時俊優假詞臣特蠲退食之期昭示閔勞之意雖殫千慮曷報萬分兵部侍郎謝表臣言伏奉制命除臣試尚書兵部侍郎仍賜對衣金帶者備員西掖久玷恩私貳職夏官益踰分願仍有匪頒之寵俾爲服飾之華賁冒併優怔營滋劇臣某誠惶誠懼頓首頓首伏念臣屬辭淺陋承學迂疎猥越稠人寢塵清貫方聖神熈洽之運實文物光亨之辰獨幹機衡孰測乾坤之造親御翰墨共瞻雲漢之章而臣重以非才再司外制曩奉燕閒之對特形褒奬之言揣實未安拜嘉増惕敢圖眷録復與甄陞此蓋皇帝陛下溥愽兼容清明旁燭將曲成於萬務靡求備於一夫致兹孱微於焉僥倖臣敢不祗循名節恪赴事功圖報國之涓埃雖難稱塞比向陽之葵藿永勵忠精謝除刑部尚書仍賜對衣金帶鞍轡馬表寳跗親御芝檢中頒進冒寵除曽莫伸於懇避薦叨蕃錫顧曷稱於恩榮臣中謝伏念臣家本寒鄉分安末宦偶縁推擇寖偹使令自簉從班于兹十載心雖許國初乏勞能智昧保身嘗嬰罪悔頃膺召札再貳銓曹惟雨露湔滌之私實天地生成之造於焉圖報豈不知難敢誤眷憐復加擢序矧出笥衣之麗束以兼金仍分廐駟之良附兹沃轡倂深僥倖益重兢慙恭惟皇帝陛下心運道樞躬持慈寳是與神物既符堯禹之隆無曠庶官用襲典謨之美顧如孱陋亦與襃揚臣敢不増勵樸忠愈堅素守䖍共夙夜靡懐出位之思兢慎簡書期副好生之徳賀刑部斷獄表民俗可封刑章幾措當春秋發生之旦無簡書請讞之文囹圄畢空頌聲交作臣等中賀竊謂平國而用中典亦以教民嘉師而監祥刑於焉止辟唯皆進其獨志廼不犯于有司屬在聖時追隆治古鈞金既息丹筆何施恭惟皇帝陛下心宅道真泛觀衆妙躬建皇極丕叙九疇高靈格而百順臻美化行而四維舉肆克清于常憲其永祐于多方臣等獲備有官欣逢盛事紀太平之文物願詔史臣頌至治之本原豈知帝力治定功成風移俗易惟兹臣庶咸自逺於祥刑至于海隅方永清於庶獄報囚悉下奏讞無留凡與見聞敷同慶頼臣某等誠歡誠忭頓首頓首竊以聽兩造之備雖有司存决五辟之疑必從中覆唯空幽圄廼絶丹書若時閎休屬于盛際恭惟皇帝陛下隆追考翼黙藴道真集前聖之成以建有極之㑹體上天之載以澄萬化之原宜致嘉師罔干常憲臣某等優游退食蔑無任事之勞鼔舞抗章願奉維祺之祝甚盛之德既丕冒於羣倫幾措之刑遂追隆于振古赭囚云絶丹筆不施凡與見聞胥同鼔舞臣等中賀竊以幅員至廣獄訟寔繁豈叅讞之攸司無一辭之可聽太平之象兹昭示於多方至治之馨蓋敷聞於在上躋時若此唯聖爲能恭惟皇帝陛下執古御今體元贊化道包衆有對時物以皆昌功叙九歌同天人而無間用永清於綿宇俾不犯於微文臣等位列秋官職司憲牘嘗講聞於盛事不自意於親逢道與時升慶爲民頼邦刑幾措廷讞無留恩浹華夷事光載籍臣等誠歡誠忭頓首頓首竊以臯陶之美帝舜兹不犯於有司周公之戒成王其勿誤於庶獄追隆治古屬在盛時草鞠圜扉吏停丹筆恭惟皇帝陛下躬建皇極心澄化原集前聖之成以欽承乎宗社體上天之載以丕冒乎家邦百度既新九功咸叙用罔干於靈制期永祐於嘉師臣等叨奉恩書與承德意願上萬齡之祝庶伸千載之逢帝德懋昭民風丕變方共陶于美化幾不犯於微文獄靡淹囚廷無留讞謂如盛際實邁前聞臣中賀昔在神宗紹隆列聖敬用三典分建有官凡厥罪疑悉從中覆偉兹率土之衆曽無麗獄之辭致治若斯維聖時克恭惟皇帝陛下濬哲稽古聰明憲天心運道樞以澄清於萬化躬持慈寳以拊育於羣倫百度交修九功咸叙用永綏於綿宇俾自逺於祥刑臣等叨備秋官實司靈制吏停丹筆共欣不世之逢疏奏前旒願奉無疆之祝道洽政治風行俗成民未占而有孚刑幾措而不用報論悉下按鞫無留自昔鮮逢於今屢奏臣中賀竊以疆理至廣簡書實繁維時嘉師罔干常憲當宣室齋居之暇絶季秋請讞之文矧邇誕辰方蒐盛禮朝紳拱極共上萬年之觴使節造廷聿修重譯之貢於焉止辟孰不歸仁恭惟皇帝陛下高拱穆清遹觀昭曠㑹衆府以建皇極執至要以澄化原無疆之休既昭受於上帝百順之福永敷錫于庶民宜幽圄之一空靡微文之可議臣等叨膺推擇均與榮懐恢太平極治之基孰知帝力紀甚盛無前之蹟願詔史臣民知逺罪冒犯寖希吏有奏疑報論即下以盛世土疆之廣無攸司簡牘之繁歡心交通恊氣充塞臣等中賀竊聞堯舜之治章服異而俗已徴成康太平囹圄空而刑不用雖曰古今之異兹如符節之同恭惟皇帝陛下黙運至真獨觀衆妙精神運而心術動美化自孚禮樂著而法度彰庶功咸叙用臻不應克邁前聞臣等叨備秋官與頒中典頌天地之大德難盡形容書帝王之極功願貽筆削企九清之真境初薦鴻名格四海之歡心遂空幽圄當熈事備成之日訖季秋請讞之章和氣横流靈心昭答臣等誠歡誠抃頓首頓首竊以箕子之陳皇極用敷錫厥庶民周公之告徽言其勿誤于庶獄追隆古訓屬在聖時宜多福之聿懐致五刑之幾措恭惟皇帝陛下獨觀衆妙懋建大中叙巍巍之成功増光列聖揚顯顯之令聞高出百王赫兹太平是爲至治廼歸德于穹昊肆展采于禁廷玉檢推尊竭欽崇之精意丹書告慶息祥覆之微文臣等叨備秋官與頒中典覩天人之無間孰測神謨紀時物之皆昌願貽信史民承休德鮮或犯於有司吏絶疑文期永清於庶獄頌聲交作和氣横流維兹至治之興永謂太平之象臣等誠歡誠忭頓首頓首竊聞好生者天地之大德措刑者帝王之極功於鑠盛時乃彰丕應矧届就盈之月聿當兆聖之辰百辟稱觴異邦欵塞有如天保共歌萬壽之章曽是吕刑亦紀一人之慶恭惟皇帝陛下誠參覆載功格神明典章文物之隆百度畢正道德仁義之備萬邦咸孚用格淳風罔干中典臣等獲塵任使祗奉詔條敢抗囊封申獻後天之祝願貽汗簡具形擊壤之謡寳祚無疆届三元之華旦祥刑不試訖五辟之疑文盛事係傳羣心交抃臣等誠歡誠抃頓首頓首竊以周官布治紀正月之始和吕命訓刑美一人之有慶追隆古治屬在聖時恭惟皇帝陛下道心之微獨該衆妙帝德之運丕叙九功天貺傳臨春祺紹至用敷錫於黎庶期永措於丹書臣等獲備憲曹敢後四方之賀願貽史觀時書千載之逢時靡有爭刑措不用當宣室齋居之暇訖季秋請讞之文歡心交通恊氣充塞臣等中賀惟土宇生齒之衆有獄訟簡書之繁於鑠嘉師克承休德兹報論之悉下知逮繫之一空矧邇誕辰方蒐慶禮臣鄰拱極夷裔觀光玉帛駿奔紀虹流於華渚桁楊盡委奏草鞠於圓扉凡厥懐生於焉歸聖恭惟皇帝陛下道侔天運與物皆昌政本日新使民不倦揭太平之備典御假樂之盛時年榖屢豐珍祥沓至顯顯百順之福巍巍九叙之功方將坐陽館以朝諸侯登介丘而禮上帝繇一人之有慶敷錫多方致雅俗之無刑遹追治古臣等優游遵職鼔舞抗章竊効嵩聲共獻萬齡之祝願貽史筆特書千載之逢福以類升慶爲民頼當三朝之勝㑹訖五辟之微文盛事係傳茂恩旁暢臣中謝海宇至廣犴獄實繁唯底時雍乃臻刑措矧正月布治之始方萬民觀象之初百辟奉觴異邦在列由中及外如皆樂於一堂以古况今豈太平之無象恭惟皇帝陛下帝德之運乃聖乃神道心之微惟精惟一懋建皇極永清化原肆丕冒於嘉師罔或干於中典桁楊不用簡牘何施臣等叨備攸司獲觀丕應奉萬齡之祝方幸簉於朝紳書千載之逢願特頒於史觀代宰臣以下賀獄空及大理寺斷絶表日畿嘉靖四陳囹圄之空棘寺肅清兩奏簡書之絶臣隣歸美郡國告成曽未渉於歲時已屢編於史冊謂如盛際實掩前聞臣中賀竊以治格熈淳教化行而爭訟息俗躋富夀衣食足而㢘恥興廼形止辟之風克副好生之德恭惟皇帝陛下神機獨運聖學兼該以文武之憂勤有堯舜之孝悌繼志述事動懐明發之心布政施仁毎頒中出之詔民咸逺罪邦用措刑矧當孟冬甫臨誕節北隣修慶西敵造朝上奉萬年之觴共申善頌下罔一夫之獄昭示閎休臣等均被寵恩共膺榮禄願稱燕雀之賀庶殫葵藿之誠
